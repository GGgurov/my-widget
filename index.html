<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Live Stream Widgets</title>
<script src="https://www.youtube.com/iframe_api"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, push, onValue, onChildAdded, set, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDuxR5hsWmfIWrjgrsU4zVEnIVppUZxNNU",
    authDomain: "tt-widget-88711.firebaseapp.com",
    databaseURL: "https://tt-widget-88711-default-rtdb.firebaseio.com",
    projectId: "tt-widget-88711",
    storageBucket: "tt-widget-88711.firebasestorage.app",
    messagingSenderId: "997435022478",
    appId: "1:997435022478:web:a0ad462f2a7dd074d27ddf"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const urlParams = new URLSearchParams(window.location.search);
const widgetMode = urlParams.get('widget') || 'admin';

document.body.className = `mode-${widgetMode}`;

// --- GLOBAL UTILS ---
const formatCurrency = (num) => new Intl.NumberFormat('ru-RU').format(num) + ' ₸';

// --- ADMIN PANEL ---
if (widgetMode === 'admin') {
    document.getElementById('admin-panel').style.display = 'block';
    
    // Parse Kaspi logic
    document.getElementById('parse-btn').addEventListener('click', async () => {
        const text = document.getElementById('kaspi-input').value;
        if(!text) return;
        
        const lines = text.split('\n').map(l => l.trim()).filter(l => l);
        let amount = 0, name = 'Аноним', message = '', ytId = null;

        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('Пополнение:')) {
                amount = parseInt(lines[i].replace(/[^\d]/g, ''));
                if (lines[i+1] && !lines[i+1].includes('Доступно:')) name = lines[i+1];
            }
            if (lines[i].includes('Сообщение')) {
                message = lines.slice(i+1).join(' ');
                break;
            }
        }

        const ytMatch = message.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
        if (ytMatch) {
            ytId = ytMatch[1];
            message = message.replace(ytMatch[0], '').replace('давай вот этот трек:', '').trim();
        }

        const donationData = { name, amount, message, timestamp: Date.now() };
        
        // Push Alert
        await push(ref(db, 'alerts'), donationData);
        
        // Push Music
        if(ytId) await push(ref(db, 'music_queue'), { ytId, name, amount });
        
        // Update Goal & Top
        const stateRef = ref(db, 'state');
        const snap = await get(stateRef);
        let state = snap.exists() ? snap.val() : { total: 0, top: {} };
        
        state.total += amount;
        if(!state.top[name]) state.top[name] = 0;
        state.top[name] += amount;
        
        await set(stateRef, state);
        
        document.getElementById('kaspi-input').value = '';
        const status = document.getElementById('status');
        status.innerText = 'Отправлено на стрим!';
        setTimeout(() => status.innerText = '', 2000);
    });

    // Settings logic (PC)
    const settingsRef = ref(db, 'settings');
    onValue(settingsRef, (snap) => {
        if(snap.exists()) {
            const s = snap.val();
            document.getElementById('s-goal-title').value = s.goalTitle || 'На мечту';
            document.getElementById('s-goal-amount').value = s.goalAmount || 100000;
            document.getElementById('s-text-content').value = s.textContent || 'Подписывайтесь!';
            document.getElementById('s-music-vol').value = s.musicVol || 50;
        }
    }, { onlyOnce: true });

    document.getElementById('save-settings').addEventListener('click', () => {
        set(ref(db, 'settings'), {
            goalTitle: document.getElementById('s-goal-title').value,
            goalAmount: Number(document.getElementById('s-goal-amount').value),
            textContent: document.getElementById('s-text-content').value,
            musicVol: Number(document.getElementById('s-music-vol').value)
        });
        alert('Настройки сохранены');
    });
}

// --- WIDGET: ALERT ---
if (widgetMode === 'alert') {
    const container = document.getElementById('alert-container');
    container.style.display = 'flex';
    let queue = [];
    let isPlaying = false;

    onChildAdded(ref(db, 'alerts'), (snap) => {
        queue.push(snap.val());
        if (!isPlaying) playNextAlert();
    });

    async function playNextAlert() {
        if (queue.length === 0) { isPlaying = false; return; }
        isPlaying = true;
        const data = queue.shift();

        document.getElementById('alert-name').innerText = data.name;
        document.getElementById('alert-amount').innerText = formatCurrency(data.amount);
        document.getElementById('alert-message').innerText = data.message;
        
        container.classList.add('show');
        
        // TTS
        if (data.message) {
            const msg = new SpeechSynthesisUtterance(`${data.name} отправил ${data.amount} тенге. ${data.message}`);
            msg.lang = 'ru-RU';
            msg.rate = 1.1;
            window.speechSynthesis.speak(msg);
            msg.onend = () => finishAlert();
        } else {
            setTimeout(finishAlert, 5000);
        }
    }

    function finishAlert() {
        container.classList.remove('show');
        setTimeout(playNextAlert, 1000);
    }
}

// --- WIDGET: TOP DONATORS ---
if (widgetMode === 'top') {
    document.getElementById('top-container').style.display = 'block';
    const list = document.getElementById('top-list');
    
    onValue(ref(db, 'state/top'), (snap) => {
        if(!snap.exists()) return;
        const topData = snap.val();
        const sorted = Object.entries(topData).sort((a, b) => b[1] - a[1]).slice(0, 5);
        
        list.innerHTML = '';
        sorted.forEach(([name, amount], index) => {
            const div = document.createElement('div');
            div.className = `top-row rank-${index + 1}`;
            div.innerHTML = `<span class="top-name">${name}</span><span class="top-amount">${formatCurrency(amount)}</span>`;
            list.appendChild(div);
        });
    });
}

// --- WIDGET: MUSIC ---
if (widgetMode === 'music') {
    document.getElementById('music-container').style.display = 'block';
    let player;
    let queue = [];
    let isPlaying = false;
    let volume = 50;

    onValue(ref(db, 'settings/musicVol'), (snap) => {
        if(snap.exists()) { volume = snap.val(); if(player && player.setVolume) player.setVolume(volume); }
    });

    window.onYouTubeIframeAPIReady = function() {
        player = new YT.Player('yt-player', {
            height: '0', width: '0', events: {
                'onReady': () => { player.setVolume(volume); checkQueue(); },
                'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) playNextMusic(); }
            }
        });
    };

    onChildAdded(ref(db, 'music_queue'), (snap) => {
        queue.push({ id: snap.key, ...snap.val() });
        checkQueue();
    });

    function checkQueue() {
        if (!isPlaying && queue.length > 0 && player && player.loadVideoById) playNextMusic();
    }

    function playNextMusic() {
        if (queue.length === 0) { isPlaying = false; return; }
        isPlaying = true;
        const track = queue.shift();
        player.loadVideoById(track.ytId);
    }
}

// --- WIDGET: GOAL ---
if (widgetMode === 'goal') {
    document.getElementById('goal-container').style.display = 'flex';
    let target = 100000;
    
    onValue(ref(db, 'settings'), (snap) => {
        if(snap.exists()) {
            document.getElementById('goal-title').innerText = snap.val().goalTitle || 'Цель';
            target = snap.val().goalAmount || 100000;
        }
    });

    onValue(ref(db, 'state/total'), (snap) => {
        const current = snap.exists() ? snap.val() : 0;
        document.getElementById('goal-text').innerText = `${formatCurrency(current)} / ${formatCurrency(target)}`;
        let pct = (current / target) * 100;
        if(pct > 100) pct = 100;
        document.getElementById('goal-fill').style.width = pct + '%';
    });
}

// --- WIDGET: TEXT ---
if (widgetMode === 'text') {
    document.getElementById('text-container').style.display = 'block';
    onValue(ref(db, 'settings/textContent'), (snap) => {
        if(snap.exists()) document.getElementById('text-content').innerText = snap.val();
    });
}
</script>

<style>
/* BASE */
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Roboto:wght@700&display=swap');
body { margin: 0; overflow: hidden; font-family: 'Roboto', sans-serif; background: transparent; color: white; }
* { box-sizing: border-box; }

/* HIDE ALL BY DEFAULT */
#admin-panel, #alert-container, #top-container, #music-container, #goal-container, #text-container { display: none; }

/* ADMIN PANEL (Mobile first) */
body.mode-admin { overflow: auto; background: #121212; padding: 20px; }
#admin-panel { max-width: 600px; margin: 0 auto; }
.admin-card { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
h2 { margin-top: 0; color: #fff; }
textarea { width: 100%; height: 150px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; font-size: 16px; margin-bottom: 10px; resize: none; }
button { width: 100%; padding: 15px; background: linear-gradient(45deg, #ff0050, #00f2fe); border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; text-transform: uppercase; transition: transform 0.1s; }
button:active { transform: scale(0.98); }
.settings-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
.settings-group label { font-size: 14px; color: #aaa; }
.settings-group input { padding: 10px; background: #2a2a2a; border: 1px solid #444; border-radius: 5px; color: white; font-size: 16px; }
details { background: #222; padding: 15px; border-radius: 8px; cursor: pointer; }
summary { font-weight: bold; outline: none; }

/* ALERT WIDGET */
#alert-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); opacity: 0; flex-direction: column; align-items: center; text-align: center; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: rgba(0,0,0,0.8); padding: 30px; border-radius: 20px; border: 3px solid #ffde00; box-shadow: 0 0 50px rgba(255, 222, 0, 0.5); width: 80%; }
#alert-container.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
#alert-name { font-family: 'Montserrat', sans-serif; font-size: 40px; color: #fff; text-shadow: 2px 2px 0 #000; }
#alert-amount { font-family: 'Montserrat', sans-serif; font-size: 60px; color: #00ff00; text-shadow: 0 0 20px #00ff00; margin: 10px 0; }
#alert-message { font-size: 28px; color: #ddd; word-wrap: break-word; }

/* TOP DONATORS WIDGET */
#top-container { width: 400px; font-family: 'Montserrat', sans-serif; background: #111; padding: 5px; border-radius: 10px; border: 2px solid #333; }
.top-header { text-align: center; font-size: 30px; font-weight: 800; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); margin-bottom: 10px; padding-top: 10px; }
.top-header span { color: #eaff00; }
.top-row { display: flex; justify-content: space-between; padding: 15px 20px; margin-bottom: 5px; font-size: 24px; font-weight: 800; border-radius: 5px; text-transform: uppercase; transition: all 0.5s ease; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
.top-row:last-child { margin-bottom: 0; }
.rank-1 { background: linear-gradient(180deg, #d4af37 0%, #aa8000 100%); color: #fff; text-shadow: 1px 1px 2px #000; border: 1px solid #ffd700; }
.rank-1 .top-amount { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.8); }
.rank-2 { background: linear-gradient(180deg, #e0e0e0 0%, #9e9e9e 100%); color: #fff; text-shadow: 1px 1px 2px #000; border: 1px solid #fff; }
.rank-2 .top-amount { color: #fff; }
.rank-3 { background: linear-gradient(180deg, #cd7f32 0%, #8b4513 100%); color: #fff; text-shadow: 1px 1px 2px #000; border: 1px solid #ffa07a; }
.rank-3 .top-amount { color: #fff; }
.rank-4, .rank-5 { background: #222; color: #fff; border: 1px solid #444; }
.rank-4 .top-amount, .rank-5 .top-amount { color: #eaff00; }

/* GOAL WIDGET */
#goal-container { width: 600px; flex-direction: column; background: rgba(0,0,0,0.7); border-radius: 15px; padding: 20px; border: 2px solid #444; }
#goal-title { font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
.progress-bar { width: 100%; height: 40px; background: #222; border-radius: 20px; position: relative; overflow: hidden; border: 2px solid #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
#goal-fill { height: 100%; background: linear-gradient(90deg, #ff0050, #00f2fe); width: 0%; transition: width 1s ease-in-out; box-shadow: 0 0 20px rgba(0, 242, 254, 0.8); }
#goal-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 900; font-size: 22px; text-shadow: 1px 1px 3px #000; white-space: nowrap; }

/* TEXT WIDGET */
#text-container { font-family: 'Montserrat', sans-serif; font-size: 50px; font-weight: 900; text-transform: uppercase; }
#text-content { background: linear-gradient(to right, #ff0050, #00f2fe, #ff0050); -webkit-background-clip: text; color: transparent; animation: gradient 3s linear infinite; background-size: 200% auto; filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.5)); }
@keyframes gradient { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
</style>
</head>
<body>

<div id="admin-panel">
    <div class="admin-card">
        <h2>Отправка доната (Kaspi)</h2>
        <p style="color:#aaa; font-size: 14px; margin-top: -10px;">Вставьте текст из каспи. Система сама найдет сумму, имя, текст и обрежет ссылку на ютуб.</p>
        <textarea id="kaspi-input" placeholder="Пополнение: 100 ₸&#10;Диас А.&#10;Доступно: ...&#10;Сообщение&#10;Калайсын? https://youtu.be/..."></textarea>
        <button id="parse-btn">Отправить на стрим</button>
        <div id="status" style="color: #00ff00; text-align: center; margin-top: 10px; font-weight: bold;"></div>
    </div>

    <details>
        <summary>Настройки виджетов (для ПК)</summary>
        <div class="admin-card" style="margin-top: 15px;">
            <div class="settings-group">
                <label>Цель сбора (Название)</label>
                <input type="text" id="s-goal-title">
            </div>
            <div class="settings-group">
                <label>Цель сбора (Сумма в тенге)</label>
                <input type="number" id="s-goal-amount">
            </div>
            <div class="settings-group">
                <label>Анимированный текст (Бегущая строка)</label>
                <input type="text" id="s-text-content">
            </div>
            <div class="settings-group">
                <label>Громкость музыки ютуб (0-100)</label>
                <input type="number" id="s-music-vol">
            </div>
            <button id="save-settings" style="background: #00c6ff;">Сохранить настройки</button>
        </div>
    </details>
</div>

<div id="alert-container">
    <div id="alert-name">Имя</div>
    <div id="alert-amount">100 ₸</div>
    <div id="alert-message">Текст сообщения</div>
</div>

<div id="top-container">
    <div class="top-header">ТОП <span>ДНЯ</span></div>
    <div id="top-list">
        </div>
</div>

<div id="music-container">
    <div id="yt-player"></div>
</div>

<div id="goal-container">
    <div id="goal-title">Цель</div>
    <div class="progress-bar">
        <div id="goal-fill"></div>
        <div id="goal-text">0 / 0 ₸</div>
    </div>
</div>

<div id="text-container">
    <div id="text-content">Текст</div>
</div>

</body>
</html>

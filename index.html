<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SUPREME WIDGET V11 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
/* ══════════════════════════════════════
   ROOT VARIABLES
══════════════════════════════════════ */
:root {
  --gold: #ffd700;
  --silver: #c8c8c8;
  --bronze: #cd7f32;
  --red: #ff0044;
  --bg: #080808;
  --panel: #111111;
  --border: #1e1e1e;
  --border-hi: #2e2e2e;
  --text-dim: #555;
  --text-mid: #888;
  --text: #cccccc;
  --text-bright: #ffffff;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --sidebar-w: 390px;
}

*{box-sizing:border-box;outline:none;margin:0;padding:0;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#222;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#333;}

body{
  font-family:'Unbounded',sans-serif;
  background:transparent;
  color:var(--text-bright);
  overflow:hidden;
}

/* ══════════════════════════════════════
   ADMIN LAYOUT
══════════════════════════════════════ */
.admin-shell{
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  height:100vh;
  background:var(--bg);
  position:fixed;inset:0;
}

/* ── SIDEBAR ── */
.sidebar{
  display:flex;flex-direction:column;
  background:var(--panel);
  border-right:1px solid var(--border);
  overflow:hidden;
}

.sidebar-head{
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--red),#880022);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;letter-spacing:-1px;
}
.logo-name{font-size:13px;font-weight:900;letter-spacing:0.5px;}
.logo-name span{color:var(--red);}
.ver-tag{
  font-size:9px;font-weight:700;color:var(--text-dim);
  background:#151515;padding:3px 7px;border-radius:20px;
  border:1px solid var(--border);letter-spacing:0.5px;
}

/* TABS */
.tabs{
  display:flex;gap:3px;
  padding:10px 12px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tab{
  flex:1;padding:8px 6px;
  border-radius:var(--radius-sm);
  font-family:'Unbounded';font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.5px;
  border:none;cursor:pointer;transition:all .2s;
  color:var(--text-dim);background:transparent;
}
.tab.on{background:var(--red);color:#fff;box-shadow:0 2px 10px rgba(255,0,68,.3);}
.tab:not(.on):hover{color:var(--text);background:#1a1a1a;}

/* SCROLL AREA */
.sidebar-body{
  flex:1;overflow-y:auto;
  padding:12px;
  display:flex;flex-direction:column;gap:8px;
}

/* QUICK DONATE PANEL */
.quick-donate{
  background: linear-gradient(145deg, #1a0005, #0a0002);
  border: 1px solid var(--red);
  padding: 14px;
  border-radius: var(--radius-md);
  margin-bottom: 5px;
  box-shadow: 0 4px 20px rgba(255,0,68,.1);
}
.quick-donate .sec-name { color: var(--red); margin-bottom: 10px; font-size: 11px; }

/* COLLAPSIBLE SECTION */
.sec-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 13px;
  background:#151515;
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  cursor:pointer;transition:all .2s;
  user-select:none;
}
.sec-head:hover{background:#1a1a1a;border-color:var(--border-hi);}
.sec-head.on{border-color:var(--red);background:#150007;}
.sec-head-l{display:flex;align-items:center;gap:9px;}
.sec-dot{
  width:18px;height:18px;border-radius:50%;
  background:#1e1e1e;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:900;color:var(--text-dim);
  flex-shrink:0;
}
.sec-head.on .sec-dot{background:var(--red);color:#fff;}
.sec-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text);}
.sec-head.on .sec-name{color:#fff;}
.sec-chevron{font-size:9px;color:var(--text-dim);transition:transform .2s;}
.sec-head.on .sec-chevron{transform:rotate(180deg);}

.sec-body{
  padding:13px;
  background:#0c0c0c;
  border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--radius-md) var(--radius-md);
  display:flex;flex-direction:column;gap:11px;
}

/* FORM ELEMENTS */
.fg{display:flex;flex-direction:column;gap:5px;}
.fr{display:flex;gap:9px;}
.fr > *{flex:1;}

label,.lbl{
  font-size:9px;font-weight:700;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:.5px;
}

input[type=text],input[type=number],select,textarea{
  background:#080808;
  border:1px solid var(--border);
  color:var(--text-bright);
  padding:9px 11px;
  border-radius:var(--radius-sm);
  font-family:'Unbounded';font-size:11px;
  width:100%;
  transition:border-color .2s,box-shadow .2s;
}
textarea{resize:vertical;min-height:54px;line-height:1.5;}
input:focus,select:focus,textarea:focus{
  border-color:var(--red);
  box-shadow:0 0 0 2px rgba(255,0,68,.1);
}
select option{background:#111;}

.rr{display:flex;align-items:center;gap:8px;}
input[type=range]{
  flex:1;accent-color:var(--red);
  cursor:pointer;height:3px;background:var(--border);
  border-radius:2px;border:none;padding:0;
}
.rv{
  font-size:10px;color:var(--text-bright);
  min-width:34px;text-align:right;
  font-variant-numeric:tabular-nums;
  background:#080808;padding:3px 6px;
  border-radius:4px;border:1px solid var(--border);
}

.color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.ci{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:8px;color:var(--text-dim);font-weight:700;text-transform:uppercase;}
input[type=color]{width:100%;height:30px;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:#000;padding:2px;}

.cb-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 0;
}
.cb-row label{font-size:10px;color:var(--text);font-weight:700;text-transform:none;letter-spacing:0;}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--red);cursor:pointer;}

.divider{height:1px;background:var(--border);width:100%;margin:3px 0;}
.sub-lbl{font-size:10px;font-weight:900;color:var(--text-bright);text-transform:uppercase;letter-spacing:.5px;}

/* BUTTONS */
.btn{
  font-family:'Unbounded';text-transform:uppercase;font-weight:700;
  border:none;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
  letter-spacing:.3px;
}
.btn-red{
  background:linear-gradient(135deg,#ff0044,#cc0034);
  color:#fff;padding:15px;border-radius:var(--radius-md);
  font-size:12px;font-weight:900;width:100%;
  box-shadow:0 4px 15px rgba(255,0,68,.2);
}
.btn-red:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(255,0,68,.35);}
.btn-green{
  background:linear-gradient(135deg,#00aa44,#007730);
  color:#fff;padding:12px;border-radius:var(--radius-sm);
  font-size:10px;width:100%;
  box-shadow:0 2px 10px rgba(0,170,68,.2);
}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,170,68,.3);}
.btn-purple{
  background:linear-gradient(135deg,#7700ff,#5500cc);
  color:#fff;padding:12px;border-radius:var(--radius-sm);
  font-size:10px;width:100%;
  box-shadow:0 2px 10px rgba(119,0,255,.2);
}
.btn-purple:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(119,0,255,.3);}
.btn-ghost{
  background:transparent;color:var(--text-mid);
  padding:10px;border-radius:var(--radius-sm);
  font-size:9px;flex:1;
  border:1px dashed var(--border-hi);
}
.btn-ghost:hover{background:#151515;color:var(--text);border-color:#444;}
.btn-del{
  background:rgba(255,0,0,.07);color:#ff4444;
  padding:5px 8px;border-radius:5px;font-size:8px;
  border:1px solid rgba(255,0,0,.15);
}
.btn-del:hover{background:#ff4444;color:#fff;}
.btn-add-panel{
  background:#151515;color:var(--text);
  padding:11px;border-radius:var(--radius-sm);
  font-size:10px;flex:1;border:1px solid var(--border);
}
.btn-add-panel:hover{background:#1c1c1c;}

/* FILE INPUT */
.file-wrap{position:relative;overflow:hidden;display:inline-block;width:100%;}
.file-wrap input[type=file]{
  font-size:100px;position:absolute;left:0;top:0;
  opacity:0;cursor:pointer;height:100%;width:100%;
}
.file-btn{
  background:#080808;border:1px solid var(--border);
  color:var(--text-mid);padding:9px 11px;border-radius:var(--radius-sm);
  font-size:10px;width:100%;text-align:center;
  font-family:'Unbounded';font-weight:700;text-transform:uppercase;
  letter-spacing:.3px;transition:all .2s;cursor:pointer;
}
.file-wrap:hover .file-btn{border-color:var(--red);color:var(--text-bright);}
.file-ok{font-size:9px;color:#00cc44;margin-top:3px;font-weight:700;}
.file-err{font-size:9px;color:#ff4444;margin-top:3px;font-weight:700;}

/* ── PREVIEW ZONE ── */
.preview-zone{
  position:relative;
  background:#0a0a0a;
  background-image:radial-gradient(#1c1c1c 1px,transparent 1px);
  background-size:22px 22px;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.pz-label{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  font-size:9px;font-weight:700;color:#222;
  text-transform:uppercase;letter-spacing:1.5px;
  pointer-events:none;z-index:5;white-space:nowrap;
}
.pz-mode{
  position:absolute;top:14px;right:16px;
  font-size:8px;font-weight:700;color:#1e1e1e;
  text-transform:uppercase;letter-spacing:1px;
  pointer-events:none;z-index:5;
}

/* ══════════════════════════════════════
   WIDGET PANELS
══════════════════════════════════════ */
.widget-scene{position:relative;width:100%;height:100%;transform-origin:center center;}

.draggable{
  position:absolute;cursor:grab;
  z-index:10;user-select:none;touch-action:none;
  transition:box-shadow .15s;
}
.draggable:active{cursor:grabbing;z-index:99;}
.draggable.sel{
  outline:1.5px solid rgba(0,255,180,.7);
  outline-offset:4px;
  border-radius:inherit;
}

/* GOAL */
.goal-wrap{display:flex;flex-direction:column;width:100%;height:100%;}
.goal-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap;gap:4px;}
.prog-track{width:100%;background:rgba(0,0,0,.5);overflow:hidden;border:1px solid rgba(255,255,255,.04);position:relative;}
.prog-fill{height:100%;transition:width .5s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.prog-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shimmer 2.5s infinite linear;}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}

/* Last donor label */
.ld-section{margin-top:13px;}
.ld-label{
  display:inline-flex;align-items:center;gap:5px;
  font-size:8px;font-weight:900;
  text-transform:uppercase;letter-spacing:2px;
  padding:4px 10px;border-radius:20px;
  margin-bottom:8px;
  white-space:nowrap;
}
.donor-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px;}
.donor-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.04);}
.rk-1{background:linear-gradient(90deg,rgba(255,215,0,.13),transparent) !important;border-color:rgba(255,215,0,.3) !important;color:var(--gold) !important;font-weight:900;}
.rk-2{background:linear-gradient(90deg,rgba(200,200,200,.08),transparent) !important;border-color:rgba(200,200,200,.2) !important;color:var(--silver) !important;}
.rk-3{background:linear-gradient(90deg,rgba(205,127,50,.08),transparent) !important;border-color:rgba(205,127,50,.2) !important;color:var(--bronze) !important;}

/* CHALLENGE */
.chal-wrap{display:flex;flex-direction:column;width:100%;height:100%;justify-content:center;}
.chal-row{display:flex;justify-content:space-between;align-items:center;width:100%;}
.chal-brand{display:flex;align-items:center;}
.icon-mask{background-color:#fff;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-size:contain;mask-size:contain;-webkit-mask-position:center;mask-position:center;flex-shrink:0;}
.chal-title{font-weight:800;text-transform:uppercase;letter-spacing:1px;}
.chal-divider{height:1px;width:100%;margin:7px 0;opacity:.1;}
.chal-total{font-weight:900;text-align:right;}

/* EDITABLE */
.obs-mode .draggable{cursor:default !important;outline:none !important;}

/* ══════════════════════════════════════
   ALERT OVERLAY
══════════════════════════════════════ */
.alert-scene{
  width:100vw;height:100vh;
  background:transparent;
  position:relative;overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:50px;
}
.particle-canvas{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;z-index:1;
}
.alert-card{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  padding:28px 36px;
  gap:12px;
  text-align:center;
  min-width:380px;max-width:580px;
  overflow:hidden;
}
.alert-card::before{
  content:'';position:absolute;inset:0;
  background:inherit;filter:blur(0);
  z-index:-1;
}
.alert-media{
  width:100%;max-height:180px;
  overflow:hidden;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}
.alert-media img,.alert-media video{
  width:100%;height:100%;object-fit:cover;border-radius:10px;
  max-height:180px;
}
.a-label{
  font-size:10px;font-weight:900;
  text-transform:uppercase;letter-spacing:3px;
  opacity:.75;
}
.a-name{
  font-weight:900;
  text-transform:uppercase;letter-spacing:1px;
  line-height:1;
}
.a-amount{
  font-weight:900;line-height:1;
}
.a-bar{
  width:80%;height:3px;
  border-radius:2px;
  opacity:.4;
  animation:barShrink linear forwards;
  transform-origin:left center;
}
@keyframes barShrink{
  0%{transform:scaleX(1);}
  100%{transform:scaleX(0);}
}

/* Alert Vue transition */
.alert-enter-active{animation:alertIn .65s cubic-bezier(.34,1.56,.64,1) both;}
.alert-leave-active{animation:alertOut .45s ease-in both;}
@keyframes alertIn{
  0%{transform:translateY(70px) scale(.85);opacity:0;}
  100%{transform:translateY(0) scale(1);opacity:1;}
}
@keyframes alertOut{
  0%{transform:translateY(0) scale(1);opacity:1;}
  100%{transform:translateY(-60px) scale(.9);opacity:0;}
}

/* Staggered text reveals */
.a-label{animation:textUp .4s .15s ease both;}
.a-name{animation:textUp .4s .25s ease both;}
.a-amount{animation:textUp .4s .35s ease both;}
.a-bar{animation:barShrink linear .55s forwards;}
@keyframes textUp{
  0%{transform:translateY(16px);opacity:0;}
  100%{transform:translateY(0);opacity:1;}
}

/* Glow pulse on card */
.glow-card{animation:glowPulse 2s ease-in-out infinite;}
@keyframes glowPulse{
  0%,100%{box-shadow:0 0 25px var(--ac,rgba(255,215,0,.3));}
  50%{box-shadow:0 0 60px var(--ac,rgba(255,215,0,.6)),0 0 100px var(--ac,rgba(255,215,0,.15));}
}

/* Alert preview area inside admin */
.alert-preview-wrap{
  width:100%;height:100%;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:40px;position:relative;
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
.toast{
  position:fixed;bottom:22px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:#151515;border:1px solid var(--border);
  color:var(--text);padding:11px 18px;
  border-radius:var(--radius-md);
  font-size:10px;font-weight:700;
  transition:all .25s;opacity:0;
  z-index:99999;pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:#00aa44;color:#00cc44;}
.toast.err{border-color:#ff4444;color:#ff4444;}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media(max-width:900px){
  .admin-shell{grid-template-columns:1fr;grid-template-rows:55vh 45vh;}
  .sidebar{border-right:none;border-top:1px solid var(--border);order:2;}
  .preview-zone{order:1;border-bottom:1px solid var(--border);}
}
</style>
</head>
<body>

<div id="app" :class="{'obs-mode':mode!=='admin'}">

  <div v-if="mode==='alert'" class="alert-scene">
    <canvas ref="pcvs" class="particle-canvas"></canvas>
    <transition name="alert">
      <div v-if="alertVis" class="alert-card glow-card"
           :style="alertCardStyle">
        <div class="a-bar" :style="{background:alertCfg.amountColor||'#ffd700',animationDuration:(alertCfg.duration||7)+'s'}" :key="alertKey"></div>
        <div v-if="alertCfg.mediaType==='video'&&alertCfg.videoUrl" class="alert-media">
          <video :src="alertCfg.videoUrl" autoplay muted loop playsinline></video>
        </div>
        <div v-else-if="alertCfg.mediaType==='image'&&alertCfg.imageData" class="alert-media">
          <img :src="alertCfg.imageData" alt="">
        </div>
        <div class="a-label" :style="{color:alertCfg.labelColor||'#aaa'}">{{alertCfg.labelText||'НОВЫЙ ДОНАТ!'}}</div>
        <div class="a-name" :style="{color:alertCfg.nameColor||'#fff',fontSize:(alertCfg.nameFontSize||32)+'px'}">{{curDonation.name}}</div>
        <div class="a-amount" :style="{color:alertCfg.amountColor||'#ffd700',fontSize:(alertCfg.amountFontSize||48)+'px'}">{{curDonation.amount}}</div>
      </div>
    </transition>
  </div>

  <div v-else-if="mode==='widget'" class="widget-scene" :style="{ transform: 'scale(' + globalScale + ')' }">
    <div v-for="p in panels" :key="p.id" class="draggable" :style="cardPos(p)">
      <component :is="p.type+'-widget'" :p="p" :is-obs="true"></component>
    </div>
  </div>

  <div v-else class="admin-shell">

    <div class="sidebar">
      <div class="sidebar-head">
        <div class="logo">
          <div class="logo-mark">W</div>
          <div class="logo-name">WIDGET <span>PRO</span></div>
        </div>
        <div class="ver-tag">v11 SOUL</div>
      </div>

      <div class="tabs">
        <button class="tab" :class="{on:tab==='widgets'}" @click="tab='widgets'">🎯 Виджеты</button>
        <button class="tab" :class="{on:tab==='alert'}" @click="tab='alert'">🎉 Alert</button>
      </div>

      <div class="sidebar-body">

        <template v-if="tab==='widgets'">

          <div class="quick-donate">
            <div class="sec-name">💸 БЫСТРЫЙ ДОНАТ (АВТОМАТИКА)</div>
            <div class="fr" style="margin-bottom:8px;">
              <div class="fg"><label>Имя донатера</label><input type="text" v-model="quickName" placeholder="Никнейм"></div>
              <div class="fg"><label>Сумма (ТЕНГЕ)</label><input type="number" v-model.number="quickAmount" placeholder="1000"></div>
            </div>
            <button class="btn btn-red" @click="processQuickDonation">🚀 ДОБАВИТЬ ВЕЗДЕ</button>
          </div>

          <div class="fr">
            <button class="btn btn-add-panel" @click="addPanel('goal')">✚ ЦЕЛЬ</button>
            <button class="btn btn-add-panel" @click="addPanel('challenge')">✚ ЧЕЛЛЕНДЖ</button>
          </div>

          <div v-for="(p,i) in panels" :key="p.id">
            <div class="sec-head" :class="{on:selId===p.id}" @click="selId=selId===p.id?null:p.id">
              <div class="sec-head-l">
                <div class="sec-dot">{{i+1}}</div>
                <div class="sec-name">{{p.type==='goal'?'🎯 ЦЕЛЬ':'⚡ ЧЕЛЛЕНДЖ'}}</div>
              </div>
              <div style="display:flex;gap:7px;align-items:center">
                <button class="btn btn-del" @click.stop="removePanel(p.id)">✕</button>
                <span class="sec-chevron">▼</span>
              </div>
            </div>

            <div v-if="selId===p.id" class="sec-body">

              <template v-if="p.type==='goal'">
                <div class="fr">
                  <div class="fg"><label>Текущая сумма</label><input type="number" v-model.number="p.current" @input="saveData"></div>
                  <div class="fg"><label>Цель</label><input type="number" v-model.number="p.max" @input="saveData"></div>
                </div>
                <div class="fg">
                  <label>Метка перед донатерами</label>
                  <input type="text" v-model="p.lastDonorLabel" placeholder="ПОСЛЕДНИЙ ДОНАТ" @input="saveData">
                </div>
                <div class="fg">
                  <label>Список донатеров (через новую строку)</label>
                  <textarea v-model="p.donorsRaw" placeholder="Иван — 500 ₸&#10;Максим — 300 ₸" @input="saveData"></textarea>
                </div>
              </template>

              <template v-if="p.type==='challenge'">
                <div class="fg">
                  <label>Название</label>
                  <input type="text" v-model="p.title" @input="saveData">
                </div>
                <div class="fr">
                  <div class="fg"><label>Размер лого</label>
                    <div class="rr"><input type="range" min="10" max="120" v-model.number="p.iconSize" @input="saveData"><span class="rv">{{p.iconSize||35}}</span></div>
                  </div>
                  <div class="fg"><label>Отступ лого</label>
                    <div class="rr"><input type="range" min="0" max="50" v-model.number="p.iconGap" @input="saveData"><span class="rv">{{p.iconGap||15}}</span></div>
                  </div>
                </div>
                <div class="fr">
                  <div class="cb-row" style="flex:1"><label>Разделитель</label><input type="checkbox" v-model="p.showDivider" @change="saveData"></div>
                  <div class="cb-row" style="flex:1"><label>Счётчик</label><input type="checkbox" v-model="p.showCount" @change="saveData"></div>
                </div>
              </template>

              <div class="divider"></div>
              <div class="sub-lbl">Размеры и стили</div>
              <div class="fg"><label>Ширина панели</label>
                <div class="rr"><input type="range" min="200" max="1000" step="10" v-model.number="p.width" @input="saveData"><span class="rv">{{p.width||400}}</span></div>
              </div>
              <div class="fr">
                <div class="fg"><label>Отступы</label>
                  <div class="rr"><input type="range" min="5" max="50" v-model.number="p.padding" @input="saveData"><span class="rv">{{p.padding||20}}</span></div>
                </div>
                <div class="fg"><label>Скругление</label>
                  <div class="rr"><input type="range" min="0" max="50" v-model.number="p.radius" @input="saveData"><span class="rv">{{p.radius||15}}</span></div>
                </div>
              </div>

              <div class="divider"></div>
              <div class="sub-lbl">Цвета</div>
              <div class="fr">
                <div class="fg"><label>Цвет фона</label><input type="color" v-model="p.bgColor" @input="saveData"></div>
                <div class="fg"><label>Прозрачность фона</label>
                  <div class="rr"><input type="range" min="0" max="1" step=".01" v-model.number="p.bgOpacity" @input="saveData"><span class="rv">{{p.bgOpacity}}</span></div>
                </div>
              </div>
              <div class="color-grid">
                <div class="ci"><span>Текст</span><input type="color" v-model="p.cText" @input="saveData"></div>
                <template v-if="p.type==='goal'">
                  <div class="ci"><span>Бар 1</span><input type="color" v-model="p.cBar1" @input="saveData"></div>
                  <div class="ci"><span>Бар 2</span><input type="color" v-model="p.cBar2" @input="saveData"></div>
                  <div class="ci"><span>Акцент</span><input type="color" v-model="p.cAccent" @input="saveData"></div>
                </template>
                <template v-if="p.type==='challenge'">
                  <div class="ci"><span>Иконка</span><input type="color" v-model="p.cIcon" @input="saveData"></div>
                  <div class="ci"><span>Акцент</span><input type="color" v-model="p.cAccent" @input="saveData"></div>
                </template>
              </div>
            </div>
          </div>

          <div class="sec-head" style="margin-top:10px;">
            <div class="sec-head-l">
              <div class="sec-name">⚙ Глобальные настройки OBS</div>
            </div>
          </div>
          <div class="sec-body">
            <div class="fg"><label>Масштаб сцены</label>
              <div class="rr"><input type="range" min=".5" max="2" step=".01" v-model.number="globalScale" @input="saveData"><span class="rv">{{globalScale||1}}</span></div>
            </div>
            <div class="fg" style="margin-top:5px;">
              <label>Ссылки для OBS Browser Source:</label>
              <input type="text" :value="obsWidgetUrl" readonly @click="$event.target.select()">
              <input type="text" :value="obsAlertUrl" readonly @click="$event.target.select()" style="margin-top:5px;">
            </div>
          </div>
        </template>

        <template v-if="tab==='alert'">

          <div class="sec-head on">
            <div class="sec-head-l">
              <div class="sec-dot" style="background:var(--red);color:#fff">▶</div>
              <div class="sec-name">Запустить Alert (Вручную)</div>
            </div>
          </div>
          <div class="sec-body">
            <div class="fr">
              <div class="fg"><label>Имя донатера</label><input type="text" v-model="tName" placeholder="Иван Петров"></div>
              <div class="fg"><label>Сумма</label><input type="text" v-model="tAmount" placeholder="500 ₸"></div>
            </div>
            <button class="btn btn-green" @click="doTrigger">▶ ПОКАЗАТЬ В OBS</button>
            <button class="btn btn-purple" @click="doTestLocal">🧪 Тест (только здесь)</button>
          </div>

          <div class="sec-head" :class="{on:alertOpen}" @click="alertOpen=!alertOpen">
            <div class="sec-head-l">
              <div class="sec-name">🎨 Настройки Alert</div>
            </div>
            <span class="sec-chevron">▼</span>
          </div>
          <div v-if="alertOpen" class="sec-body">

            <div class="fg"><label>Текст метки</label>
              <input type="text" v-model="alertCfg.labelText" placeholder="НОВЫЙ ДОНАТ!" @input="saveData">
            </div>
            <div class="fg"><label>Длительность (сек)</label>
              <div class="rr"><input type="range" min="2" max="30" v-model.number="alertCfg.duration" @input="saveData"><span class="rv">{{alertCfg.duration||7}}s</span></div>
            </div>

            <div class="divider"></div>
            <div class="sub-lbl">Медиа</div>

            <div class="fg"><label>Тип медиа</label>
              <select v-model="alertCfg.mediaType" @change="saveData">
                <option value="none">Без медиа</option>
                <option value="video">Видео (URL)</option>
              </select>
            </div>

            <template v-if="alertCfg.mediaType==='video'">
              <div class="fg"><label>URL видео (mp4 / webm)</label>
                <input type="text" v-model="alertCfg.videoUrl" placeholder="https://..." @input="saveData">
              </div>
            </template>

            <div class="divider"></div>
            <div class="sub-lbl">Внешний вид</div>

            <div class="fr">
              <div class="fg"><label>Фон карточки</label><input type="color" v-model="alertCfg.bgColor" @input="saveData"></div>
              <div class="fg"><label>Прозрачность фона</label>
                <div class="rr"><input type="range" min="0" max="1" step=".05" v-model.number="alertCfg.bgOpacity" @input="saveData"><span class="rv">{{alertCfg.bgOpacity||.9}}</span></div>
              </div>
            </div>

            <div class="color-grid">
              <div class="ci"><span>Метка</span><input type="color" v-model="alertCfg.labelColor" @input="saveData"></div>
              <div class="ci"><span>Имя</span><input type="color" v-model="alertCfg.nameColor" @input="saveData"></div>
              <div class="ci"><span>Сумма</span><input type="color" v-model="alertCfg.amountColor" @input="saveData"></div>
              <div class="ci"><span>Обводка</span><input type="color" v-model="alertCfg.borderColor" @input="saveData"></div>
            </div>

            <div class="fr">
              <div class="fg"><label>Размер имени</label>
                <div class="rr"><input type="range" min="16" max="80" v-model.number="alertCfg.nameFontSize" @input="saveData"><span class="rv">{{alertCfg.nameFontSize||32}}</span></div>
              </div>
              <div class="fg"><label>Размер суммы</label>
                <div class="rr"><input type="range" min="20" max="100" v-model.number="alertCfg.amountFontSize" @input="saveData"><span class="rv">{{alertCfg.amountFontSize||48}}</span></div>
              </div>
            </div>

            <div class="fg"><label>Скругление карточки</label>
              <div class="rr"><input type="range" min="0" max="50" v-model.number="alertCfg.borderRadius" @input="saveData"><span class="rv">{{alertCfg.borderRadius||10}}</span></div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <div class="preview-zone" @mousemove="onDrag" @mouseup="stopDrag" @mouseleave="stopDrag">
      <div class="pz-label">ОКНО ПРЕВЬЮ</div>
      <div class="pz-mode">{{tab==='widgets'?'ВИДЖЕТЫ':'АЛЕРТЫ'}}</div>

      <div v-if="tab==='widgets'" class="widget-scene" :style="{ transform: 'scale(' + globalScale + ')' }">
        <div v-for="p in panels" :key="p.id" 
             class="draggable" 
             :class="{sel: selId===p.id}" 
             :style="cardPos(p)"
             @mousedown="startDrag($event, p)">
          <component :is="p.type+'-widget'" :p="p" :is-obs="false"></component>
        </div>
      </div>

      <div v-else class="alert-preview-wrap">
        <transition name="alert">
          <div v-if="alertVis" class="alert-card glow-card" :style="alertCardStyle">
            <div class="a-bar" :style="{background:alertCfg.amountColor||'#ffd700',animationDuration:(alertCfg.duration||7)+'s'}" :key="alertKey"></div>
            <div v-if="alertCfg.mediaType==='video'&&alertCfg.videoUrl" class="alert-media">
              <video :src="alertCfg.videoUrl" autoplay muted loop playsinline></video>
            </div>
            <div class="a-label" :style="{color:alertCfg.labelColor||'#aaa'}">{{alertCfg.labelText||'НОВЫЙ ДОНАТ!'}}</div>
            <div class="a-name" :style="{color:alertCfg.nameColor||'#fff',fontSize:(alertCfg.nameFontSize||32)+'px'}">{{curDonation.name}}</div>
            <div class="a-amount" :style="{color:alertCfg.amountColor||'#ffd700',fontSize:(alertCfg.amountFontSize||48)+'px'}">{{curDonation.amount}}</div>
          </div>
        </transition>
      </div>
    </div>

  </div>

  <div class="toast" :class="[toastType, {show: toastVis}]">{{toastMsg}}</div>
</div>

<script>
// --- WIDGET COMPONENTS ---

const GoalWidget = {
  props: ['p', 'isObs'],
  template: `
    <div class="goal-wrap" :style="{ width: p.width+'px', background: hexToRgba(p.bgColor, p.bgOpacity), padding: p.padding+'px', borderRadius: p.radius+'px', color: p.cText }">
      <div class="goal-top">
        <div style="font-weight:900;text-transform:uppercase;">Сбор средств</div>
        <div style="font-weight:900;color:var(--gold);">{{p.current}} / {{p.max}} ₸</div>
      </div>
      <div class="prog-track" :style="{ borderRadius: (p.radius/2)+'px', height: '14px', background: p.cBar2 }">
        <div class="prog-fill" :style="{ width: percent+'%', background: p.cBar1 }"></div>
      </div>
      <div class="ld-section" v-if="donors.length > 0">
        <div class="ld-label" :style="{ background: p.cAccent, color: '#fff' }">{{p.lastDonorLabel || 'ПОСЛЕДНИЙ ДОНАТ'}}</div>
        <ul class="donor-list">
          <li v-for="(d, i) in donors" :key="i" class="donor-item" :class="'rk-'+(i+1)" :style="{ borderRadius: (p.radius/2)+'px' }">
            <span>{{d.name}}</span><span>{{d.amount}}</span>
          </li>
        </ul>
      </div>
    </div>
  `,
  computed: {
    percent() {
      let max = parseInt(String(this.p.max).replace(/\D/g,'')) || 1;
      let cur = parseInt(String(this.p.current).replace(/\D/g,'')) || 0;
      return Math.min(100, (cur / max) * 100);
    },
    donors() {
      if(!this.p.donorsRaw) return [];
      return this.p.donorsRaw.split('\n').filter(x=>x.trim()).slice(0, 3).map(line => {
         let parts = line.split('—');
         return { name: parts[0]?.trim() || 'Аноним', amount: parts[1]?.trim() || '' };
      });
    }
  },
  methods: {
    hexToRgba(hex, alpha) {
      if(!hex) return 'transparent';
      let r = parseInt(hex.slice(1, 3), 16),
          g = parseInt(hex.slice(3, 5), 16),
          b = parseInt(hex.slice(5, 7), 16);
      return \`rgba(\${r}, \${g}, \${b}, \${alpha !== undefined ? alpha : 1})\`;
    }
  }
};

const ChallengeWidget = {
  props: ['p', 'isObs'],
  template: `
    <div class="chal-wrap" :style="{ width: p.width+'px', background: hexToRgba(p.bgColor, p.bgOpacity), padding: p.padding+'px', borderRadius: p.radius+'px', color: p.cText }">
      <div class="chal-row">
         <div class="chal-brand">
            <div class="chal-title" :style="{ fontSize: p.titleSize+'px', color: p.cText }">{{p.title || 'Челлендж'}}</div>
         </div>
         <div v-if="p.showCount" class="chal-total" :style="{ fontSize: p.textSize+'px', color: p.cAccent }">Активен</div>
      </div>
      <div v-if="p.showDivider" class="chal-divider" :style="{ background: p.cText }"></div>
    </div>
  `,
  methods: {
    hexToRgba(hex, alpha) {
      if(!hex) return 'transparent';
      let r = parseInt(hex.slice(1, 3), 16),
          g = parseInt(hex.slice(3, 5), 16),
          b = parseInt(hex.slice(5, 7), 16);
      return \`rgba(\${r}, \${g}, \${b}, \${alpha !== undefined ? alpha : 1})\`;
    }
  }
};

// --- APP ---
const app = Vue.createApp({
  components: {
    'goal-widget': GoalWidget,
    'challenge-widget': ChallengeWidget
  },
  data() {
    return {
      mode: new URLSearchParams(window.location.search).get('mode') || 'admin',
      tab: 'widgets',
      selId: null,
      globalScale: 1,
      alertOpen: true,

      // Quick Donation
      quickName: '',
      quickAmount: '',

      panels: [],
      alertCfg: {
        labelText: 'НОВЫЙ ДОНАТ!', duration: 7, mediaType: 'none', videoUrl: '',
        bgColor: '#080808', bgOpacity: 0.9, labelColor: '#aaaaaa', nameColor: '#ffffff',
        amountColor: '#ffd700', borderColor: '#ff0044', nameFontSize: 32, amountFontSize: 48, borderRadius: 10
      },

      tName: '',
      tAmount: '',
      curDonation: { name: '', amount: '' },
      alertVis: false,
      alertKey: 0,

      // Dragging
      dragging: null,
      offset: { x: 0, y: 0 },

      // Toast
      toastVis: false,
      toastMsg: '',
      toastType: 'ok',
      toastTimer: null
    };
  },
  computed: {
    alertCardStyle() {
      let r = parseInt(this.alertCfg.bgColor.slice(1, 3), 16),
          g = parseInt(this.alertCfg.bgColor.slice(3, 5), 16),
          b = parseInt(this.alertCfg.bgColor.slice(5, 7), 16);
      return {
        background: \`rgba(\${r},\${g},\${b},\${this.alertCfg.bgOpacity})\`,
        border: \`2px solid \${this.alertCfg.borderColor}\`,
        borderRadius: this.alertCfg.borderRadius + 'px',
        '--ac': this.alertCfg.borderColor
      };
    },
    obsWidgetUrl() { return window.location.href.split('?')[0] + '?mode=widget'; },
    obsAlertUrl() { return window.location.href.split('?')[0] + '?mode=alert'; }
  },
  mounted() {
    this.loadData();
    // Simulate real-time updates via local storage for OBS cross-window sync
    window.addEventListener('storage', (e) => {
      if(e.key === 'supreme_data') this.loadData();
      if(e.key === 'supreme_alert' && this.mode === 'alert') {
        let payload = JSON.parse(e.newValue);
        if(payload) this.triggerAlert(payload.name, payload.amount);
      }
    });
  },
  methods: {
    // 🔥 МАГИЯ БЫСТРОГО ДОНАТА 🔥
    processQuickDonation() {
      if(!this.quickName || !this.quickAmount) {
        this.showToast('Введите имя и сумму!', 'err');
        return;
      }

      const amountStr = this.quickAmount + ' ₸';

      // 1. Запуск уведомления
      this.tName = this.quickName;
      this.tAmount = amountStr;
      this.doTrigger(); 

      // 2. Добавление в цели
      let added = false;
      this.panels.forEach(p => {
        if(p.type === 'goal') {
          added = true;
          // Плюсуем сумму
          p.current += Number(this.quickAmount);
          // Ставим первым в список
          const newEntry = \`\${this.quickName} — \${amountStr}\`;
          if(p.donorsRaw) {
            p.donorsRaw = newEntry + '\\n' + p.donorsRaw;
          } else {
            p.donorsRaw = newEntry;
          }
        }
      });

      this.saveData();
      this.showToast('Донат успешно добавлен везде!', 'ok');
      
      // Очистка полей
      this.quickName = '';
      this.quickAmount = '';
    },

    addPanel(type) {
      let id = 'p_' + Date.now();
      let base = { id, type, x: 50, y: 50, width: 400, padding: 20, radius: 15, bgColor: '#111111', bgOpacity: 0.8, cText: '#ffffff' };
      if(type === 'goal') {
        this.panels.push({ ...base, current: 0, max: 10000, lastDonorLabel: 'ПОСЛЕДНИЙ ДОНАТ', donorsRaw: '', cBar1: '#ff0044', cBar2: '#330011', cAccent: '#ff0044' });
      } else {
        this.panels.push({ ...base, title: 'ЧЕЛЛЕНДЖ', iconSize: 35, iconGap: 15, showDivider: true, showCount: true, titleSize: 16, textSize: 14, cIcon: '#ff0044', cAccent: '#ff0044' });
      }
      this.selId = id;
      this.saveData();
    },
    removePanel(id) {
      this.panels = this.panels.filter(p => p.id !== id);
      if(this.selId === id) this.selId = null;
      this.saveData();
    },
    cardPos(p) { return { left: p.x + 'px', top: p.y + 'px' }; },

    // Alert Logic
    doTrigger() {
      if(!this.tName) return;
      // Save trigger event for OBS window to catch
      localStorage.setItem('supreme_alert', JSON.stringify({ name: this.tName, amount: this.tAmount, ts: Date.now() }));
      if(this.mode === 'admin') this.triggerAlert(this.tName, this.tAmount); // show local preview too
    },
    doTestLocal() {
      this.triggerAlert(this.tName || 'ТЕСТ', this.tAmount || '1000 ₸');
    },
    triggerAlert(name, amount) {
      this.curDonation = { name, amount };
      this.alertKey++;
      this.alertVis = true;
      setTimeout(() => { this.alertVis = false; }, (this.alertCfg.duration || 7) * 1000);
    },

    // Drag
    startDrag(e, p) {
      if(this.mode !== 'admin') return;
      this.selId = p.id;
      this.dragging = p;
      this.offset = { x: e.clientX - p.x, y: e.clientY - p.y };
    },
    onDrag(e) {
      if(!this.dragging) return;
      this.dragging.x = e.clientX - this.offset.x;
      this.dragging.y = e.clientY - this.offset.y;
    },
    stopDrag() {
      if(this.dragging) { this.saveData(); this.dragging = null; }
    },

    // Storage
    saveData() {
      if(this.mode === 'admin') {
        let data = { panels: this.panels, alertCfg: this.alertCfg, globalScale: this.globalScale };
        localStorage.setItem('supreme_data', JSON.stringify(data));
      }
    },
    loadData() {
      let raw = localStorage.getItem('supreme_data');
      if(raw) {
        let d = JSON.parse(raw);
        if(d.panels) this.panels = d.panels;
        if(d.alertCfg) this.alertCfg = d.alertCfg;
        if(d.globalScale) this.globalScale = d.globalScale;
      }
    },

    // Toast
    showToast(msg, type='ok') {
      this.toastMsg = msg; this.toastType = type; this.toastVis = true;
      clearTimeout(this.toastTimer);
      this.toastTimer = setTimeout(() => { this.toastVis = false; }, 3000);
    }
  }
});
app.mount('#app');
</script>
</body>
</html>

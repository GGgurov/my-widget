<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SUPREME WIDGET V11 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
/* ══════════════════════════════════════
   ROOT VARIABLES
══════════════════════════════════════ */
:root {
  --gold: #ffd700;
  --silver: #c8c8c8;
  --bronze: #cd7f32;
  --red: #ff0044;
  --bg: #080808;
  --panel: #111111;
  --border: #1e1e1e;
  --border-hi: #2e2e2e;
  --text-dim: #555;
  --text-mid: #888;
  --text: #cccccc;
  --text-bright: #ffffff;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --sidebar-w: 390px;
}

*{box-sizing:border-box;outline:none;margin:0;padding:0;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#222;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#333;}

body{
  font-family:'Unbounded',sans-serif;
  background:transparent;
  color:var(--text-bright);
  overflow:hidden;
}

/* ══════════════════════════════════════
   ADMIN LAYOUT
══════════════════════════════════════ */
.admin-shell{
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  height:100vh;
  background:var(--bg);
  position:fixed;inset:0;
}

/* ── SIDEBAR ── */
.sidebar{
  display:flex;flex-direction:column;
  background:var(--panel);
  border-right:1px solid var(--border);
  overflow:hidden;
}

.sidebar-head{
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--red),#880022);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;letter-spacing:-1px;
}
.logo-name{font-size:13px;font-weight:900;letter-spacing:0.5px;}
.logo-name span{color:var(--red);}
.ver-tag{
  font-size:9px;font-weight:700;color:var(--text-dim);
  background:#151515;padding:3px 7px;border-radius:20px;
  border:1px solid var(--border);letter-spacing:0.5px;
}

/* TABS */
.tabs{
  display:flex;gap:3px;
  padding:10px 12px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tab{
  flex:1;padding:8px 6px;
  border-radius:var(--radius-sm);
  font-family:'Unbounded';font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.5px;
  border:none;cursor:pointer;transition:all .2s;
  color:var(--text-dim);background:transparent;
}
.tab.on{background:var(--red);color:#fff;box-shadow:0 2px 10px rgba(255,0,68,.3);}
.tab:not(.on):hover{color:var(--text);background:#1a1a1a;}

/* SCROLL AREA */
.sidebar-body{
  flex:1;overflow-y:auto;
  padding:12px;
  display:flex;flex-direction:column;gap:8px;
}

/* COLLAPSIBLE SECTION */
.sec-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 13px;
  background:#151515;
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  cursor:pointer;transition:all .2s;
  user-select:none;
}
.sec-head:hover{background:#1a1a1a;border-color:var(--border-hi);}
.sec-head.on{border-color:var(--red);background:#150007;}
.sec-head-l{display:flex;align-items:center;gap:9px;}
.sec-dot{
  width:18px;height:18px;border-radius:50%;
  background:#1e1e1e;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:900;color:var(--text-dim);
  flex-shrink:0;
}
.sec-head.on .sec-dot{background:var(--red);color:#fff;}
.sec-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text);}
.sec-head.on .sec-name{color:#fff;}
.sec-badge{
  font-size:8px;padding:2px 6px;border-radius:20px;
  background:rgba(255,0,68,.12);color:var(--red);
  font-weight:700;text-transform:uppercase;letter-spacing:.3px;
}
.sec-chevron{font-size:9px;color:var(--text-dim);transition:transform .2s;}
.sec-head.on .sec-chevron{transform:rotate(180deg);}

.sec-body{
  padding:13px;
  background:#0c0c0c;
  border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--radius-md) var(--radius-md);
  display:flex;flex-direction:column;gap:11px;
}

/* FORM ELEMENTS */
.fg{display:flex;flex-direction:column;gap:5px;}
.fr{display:flex;gap:9px;}
.fr > *{flex:1;}

label,.lbl{
  font-size:9px;font-weight:700;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:.5px;
}

input[type=text],input[type=number],select,textarea{
  background:#080808;
  border:1px solid var(--border);
  color:var(--text-bright);
  padding:9px 11px;
  border-radius:var(--radius-sm);
  font-family:'Unbounded';font-size:11px;
  width:100%;
  transition:border-color .2s,box-shadow .2s;
}
textarea{resize:vertical;min-height:54px;line-height:1.5;}
input:focus,select:focus,textarea:focus{
  border-color:var(--red);
  box-shadow:0 0 0 2px rgba(255,0,68,.1);
}
select option{background:#111;}

.rr{display:flex;align-items:center;gap:8px;}
input[type=range]{
  flex:1;accent-color:var(--red);
  cursor:pointer;height:3px;background:var(--border);
  border-radius:2px;border:none;padding:0;
}
.rv{
  font-size:10px;color:var(--text-bright);
  min-width:34px;text-align:right;
  font-variant-numeric:tabular-nums;
  background:#080808;padding:3px 6px;
  border-radius:4px;border:1px solid var(--border);
}

.color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.ci{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:8px;color:var(--text-dim);font-weight:700;text-transform:uppercase;}
input[type=color]{width:100%;height:30px;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:#000;padding:2px;}

.cb-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 0;
}
.cb-row label{font-size:10px;color:var(--text);font-weight:700;text-transform:none;letter-spacing:0;}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--red);cursor:pointer;}

.divider{height:1px;background:var(--border);width:100%;margin:3px 0;}
.sub-lbl{font-size:10px;font-weight:900;color:var(--text-bright);text-transform:uppercase;letter-spacing:.5px;}

/* BUTTONS */
.btn{
  font-family:'Unbounded';text-transform:uppercase;font-weight:700;
  border:none;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
  letter-spacing:.3px;
}
.btn-red{
  background:linear-gradient(135deg,#ff0044,#cc0034);
  color:#fff;padding:15px;border-radius:var(--radius-md);
  font-size:12px;font-weight:900;width:100%;
  box-shadow:0 4px 15px rgba(255,0,68,.2);
}
.btn-red:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(255,0,68,.35);}
.btn-green{
  background:linear-gradient(135deg,#00aa44,#007730);
  color:#fff;padding:12px;border-radius:var(--radius-sm);
  font-size:10px;width:100%;
  box-shadow:0 2px 10px rgba(0,170,68,.2);
}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,170,68,.3);}
.btn-purple{
  background:linear-gradient(135deg,#7700ff,#5500cc);
  color:#fff;padding:12px;border-radius:var(--radius-sm);
  font-size:10px;width:100%;
  box-shadow:0 2px 10px rgba(119,0,255,.2);
}
.btn-purple:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(119,0,255,.3);}
.btn-ghost{
  background:transparent;color:var(--text-mid);
  padding:10px;border-radius:var(--radius-sm);
  font-size:9px;flex:1;
  border:1px dashed var(--border-hi);
}
.btn-ghost:hover{background:#151515;color:var(--text);border-color:#444;}
.btn-flat{
  background:#151515;color:var(--text);
  padding:11px;border-radius:var(--radius-sm);
  font-size:10px;border:1px solid var(--border);
}
.btn-flat:hover{background:#1c1c1c;border-color:var(--border-hi);}
.btn-del{
  background:rgba(255,0,0,.07);color:#ff4444;
  padding:5px 8px;border-radius:5px;font-size:8px;
  border:1px solid rgba(255,0,0,.15);
}
.btn-del:hover{background:#ff4444;color:#fff;}
.btn-add-panel{
  background:#151515;color:var(--text);
  padding:11px;border-radius:var(--radius-sm);
  font-size:10px;flex:1;border:1px solid var(--border);
}
.btn-add-panel:hover{background:#1c1c1c;}

.actions{
  display:flex;flex-direction:column;gap:8px;
  padding:12px;
  border-top:1px solid var(--border);
  flex-shrink:0;
}

/* FILE INPUT */
.file-wrap{position:relative;overflow:hidden;display:inline-block;width:100%;}
.file-wrap input[type=file]{
  font-size:100px;position:absolute;left:0;top:0;
  opacity:0;cursor:pointer;height:100%;width:100%;
}
.file-btn{
  background:#080808;border:1px solid var(--border);
  color:var(--text-mid);padding:9px 11px;border-radius:var(--radius-sm);
  font-size:10px;width:100%;text-align:center;
  font-family:'Unbounded';font-weight:700;text-transform:uppercase;
  letter-spacing:.3px;transition:all .2s;cursor:pointer;
}
.file-wrap:hover .file-btn{border-color:var(--red);color:var(--text-bright);}
.file-ok{font-size:9px;color:#00cc44;margin-top:3px;font-weight:700;}
.file-err{font-size:9px;color:#ff4444;margin-top:3px;font-weight:700;}

/* ── PREVIEW ZONE ── */
.preview-zone{
  position:relative;
  background:#0a0a0a;
  background-image:radial-gradient(#1c1c1c 1px,transparent 1px);
  background-size:22px 22px;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.pz-label{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  font-size:9px;font-weight:700;color:#222;
  text-transform:uppercase;letter-spacing:1.5px;
  pointer-events:none;z-index:5;white-space:nowrap;
}
.pz-mode{
  position:absolute;top:14px;right:16px;
  font-size:8px;font-weight:700;color:#1e1e1e;
  text-transform:uppercase;letter-spacing:1px;
  pointer-events:none;z-index:5;
}

/* ══════════════════════════════════════
   WIDGET PANELS
══════════════════════════════════════ */
.widget-scene{position:relative;width:100%;height:100%;transform-origin:center center;}

.draggable{
  position:absolute;cursor:grab;
  z-index:10;user-select:none;touch-action:none;
  transition:box-shadow .15s;
}
.draggable:active{cursor:grabbing;z-index:99;}
.draggable.sel{
  outline:1.5px solid rgba(0,255,180,.7);
  outline-offset:4px;
  border-radius:inherit;
}

.glass{
  position:relative;width:100%;height:100%;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.05);
  overflow:hidden;
}

/* GOAL */
.goal-wrap{display:flex;flex-direction:column;width:100%;height:100%;}
.goal-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap;gap:4px;}
.prog-track{width:100%;background:rgba(0,0,0,.5);overflow:hidden;border:1px solid rgba(255,255,255,.04);position:relative;}
.prog-fill{height:100%;transition:width .5s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.prog-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shimmer 2.5s infinite linear;}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}

/* Last donor label */
.ld-section{margin-top:13px;}
.ld-label{
  display:inline-flex;align-items:center;gap:5px;
  font-size:8px;font-weight:900;
  text-transform:uppercase;letter-spacing:2px;
  padding:4px 10px;border-radius:20px;
  margin-bottom:8px;
  white-space:nowrap;
}
.donor-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px;}
.donor-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.04);}
.rk-1{background:linear-gradient(90deg,rgba(255,215,0,.13),transparent) !important;border-color:rgba(255,215,0,.3) !important;color:var(--gold) !important;font-weight:900;}
.rk-2{background:linear-gradient(90deg,rgba(200,200,200,.08),transparent) !important;border-color:rgba(200,200,200,.2) !important;color:var(--silver) !important;}
.rk-3{background:linear-gradient(90deg,rgba(205,127,50,.08),transparent) !important;border-color:rgba(205,127,50,.2) !important;color:var(--bronze) !important;}

/* CHALLENGE */
.chal-wrap{display:flex;flex-direction:column;width:100%;height:100%;justify-content:center;}
.chal-row{display:flex;justify-content:space-between;align-items:center;width:100%;}
.chal-brand{display:flex;align-items:center;}
.icon-mask{background-color:#fff;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-size:contain;mask-size:contain;-webkit-mask-position:center;mask-position:center;flex-shrink:0;}
.chal-title{font-weight:800;text-transform:uppercase;letter-spacing:1px;}
.chal-divider{height:1px;width:100%;margin:7px 0;opacity:.1;}
.chal-label{opacity:.7;font-weight:700;}
.chal-val,.chal-total{font-weight:900;text-align:right;}

/* EDITABLE */
.ed{cursor:text;border-bottom:1px dashed rgba(255,255,255,.2);transition:all .15s;}
.ed:hover{background:rgba(255,255,255,.05);}
.ed:focus{background:rgba(255,255,255,.1);outline:none;border-bottom:2px solid var(--red);}
.obs-mode .ed{border:none !important;background:transparent !important;pointer-events:none;}
.obs-mode .draggable{cursor:default !important;outline:none !important;}

/* GUIDES */
.guide{position:absolute;background:#00ffb0;box-shadow:0 0 8px #00ffb0;z-index:100;pointer-events:none;opacity:0;transition:opacity .15s;}
.guide.on{opacity:.65;}
.guide.gv{top:-3000px;bottom:-3000px;width:1px;}
.guide.gh{left:-3000px;right:-3000px;height:1px;}

/* ══════════════════════════════════════
   ALERT OVERLAY
══════════════════════════════════════ */
.alert-scene{
  width:100vw;height:100vh;
  background:transparent;
  position:relative;overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:50px;
}
.particle-canvas{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;z-index:1;
}
.alert-card{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  padding:28px 36px;
  gap:12px;
  text-align:center;
  min-width:380px;max-width:580px;
  overflow:hidden;
}
.alert-card::before{
  content:'';position:absolute;inset:0;
  background:inherit;filter:blur(0);
  z-index:-1;
}
.alert-media{
  width:100%;max-height:180px;
  overflow:hidden;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}
.alert-media img,.alert-media video{
  width:100%;height:100%;object-fit:cover;border-radius:10px;
  max-height:180px;
}
.a-label{
  font-size:10px;font-weight:900;
  text-transform:uppercase;letter-spacing:3px;
  opacity:.75;
}
.a-name{
  font-weight:900;
  text-transform:uppercase;letter-spacing:1px;
  line-height:1;
}
.a-amount{
  font-weight:900;line-height:1;
}
.a-bar{
  width:80%;height:3px;
  border-radius:2px;
  opacity:.4;
  animation:barShrink linear forwards;
  transform-origin:left center;
}
@keyframes barShrink{
  0%{transform:scaleX(1);}
  100%{transform:scaleX(0);}
}

/* Alert Vue transition */
.alert-enter-active{animation:alertIn .65s cubic-bezier(.34,1.56,.64,1) both;}
.alert-leave-active{animation:alertOut .45s ease-in both;}
@keyframes alertIn{
  0%{transform:translateY(70px) scale(.85);opacity:0;}
  100%{transform:translateY(0) scale(1);opacity:1;}
}
@keyframes alertOut{
  0%{transform:translateY(0) scale(1);opacity:1;}
  100%{transform:translateY(-60px) scale(.9);opacity:0;}
}

/* Staggered text reveals */
.a-label{animation:textUp .4s .15s ease both;}
.a-name{animation:textUp .4s .25s ease both;}
.a-amount{animation:textUp .4s .35s ease both;}
.a-bar{animation:barShrink linear .55s forwards;}
@keyframes textUp{
  0%{transform:translateY(16px);opacity:0;}
  100%{transform:translateY(0);opacity:1;}
}

/* Glow pulse on card */
.glow-card{animation:glowPulse 2s ease-in-out infinite;}
@keyframes glowPulse{
  0%,100%{box-shadow:0 0 25px var(--ac,rgba(255,215,0,.3));}
  50%{box-shadow:0 0 60px var(--ac,rgba(255,215,0,.6)),0 0 100px var(--ac,rgba(255,215,0,.15));}
}

/* Alert preview area inside admin */
.alert-preview-wrap{
  width:100%;height:100%;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:40px;position:relative;
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
.toast{
  position:fixed;bottom:22px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:#151515;border:1px solid var(--border);
  color:var(--text);padding:11px 18px;
  border-radius:var(--radius-md);
  font-size:10px;font-weight:700;
  transition:all .25s;opacity:0;
  z-index:99999;pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:#00aa44;color:#00cc44;}
.toast.err{border-color:#ff4444;color:#ff4444;}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media(max-width:900px){
  .admin-shell{grid-template-columns:1fr;grid-template-rows:55vh 45vh;}
  .sidebar{border-right:none;border-top:1px solid var(--border);order:2;}
  .preview-zone{order:1;border-bottom:1px solid var(--border);}
}
</style>
</head>
<body>

<div id="app" :class="{'obs-mode':mode!=='admin'}">

  <!-- ═══════ ALERT OVERLAY ═══════ -->
  <div v-if="mode==='alert'" class="alert-scene">
    <canvas ref="pcvs" class="particle-canvas"></canvas>
    <transition name="alert">
      <div v-if="alertVis" class="alert-card glow-card"
           :style="alertCardStyle">
        <!-- timer bar -->
        <div class="a-bar" :style="{background:alertCfg.amountColor||'#ffd700',animationDuration:(alertCfg.duration||7)+'s'}" :key="alertKey"></div>
        <!-- media -->
        <div v-if="alertCfg.mediaType==='video'&&alertCfg.videoUrl" class="alert-media">
          <video :src="alertCfg.videoUrl" autoplay muted loop playsinline></video>
        </div>
        <div v-else-if="alertCfg.mediaType==='image'&&alertCfg.imageData" class="alert-media">
          <img :src="alertCfg.imageData" alt="">
        </div>
        <div class="a-label" :style="{color:alertCfg.labelColor||'#aaa'}">{{alertCfg.labelText||'НОВЫЙ ДОНАТ!'}}</div>
        <div class="a-name" :style="{color:alertCfg.nameColor||'#fff',fontSize:(alertCfg.nameFontSize||32)+'px'}">{{curDonation.name}}</div>
        <div class="a-amount" :style="{color:alertCfg.amountColor||'#ffd700',fontSize:(alertCfg.amountFontSize||48)+'px'}">{{curDonation.amount}}</div>
      </div>
    </transition>
  </div>

  <!-- ═══════ WIDGET OVERLAY ═══════ -->
  <div v-else-if="mode==='widget'" class="widget-scene" :style="sceneStyle">
    <div v-for="p in panels" :key="p.id" class="draggable" :style="cardPos(p)">
      <component :is="compFor(p.type)" :p="p" :is-obs="true"></component>
    </div>
  </div>

  <!-- ═══════ ADMIN ═══════ -->
  <div v-else class="admin-shell">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-head">
        <div class="logo">
          <div class="logo-mark">W</div>
          <div class="logo-name">WIDGET <span>PRO</span></div>
        </div>
        <div class="ver-tag">v11 SOUL</div>
      </div>

      <div class="tabs">
        <button class="tab" :class="{on:tab==='widgets'}" @click="tab='widgets'">🎯 Виджеты</button>
        <button class="tab" :class="{on:tab==='alert'}" @click="tab='alert'">🎉 Alert</button>
      </div>

      <div class="sidebar-body">

        <!-- ═══ WIDGETS TAB ═══ -->
        <template v-if="tab==='widgets'">
          <div class="fr">

<script>
const{createApp,ref,computed,onMounted,nextTick}=Vue;

// ── Firebase ──
const FC={
  apiKey:"AIzaSyDuxR5hsWmfIWrjgrsU4zVEnIVppUZxNNU",
  authDomain:"tt-widget-88711.firebaseapp.com",
  projectId:"tt-widget-88711",
  databaseURL:"https://tt-widget-88711-default-rtdb.firebaseio.com",
  storageBucket:"tt-widget-88711.firebasestorage.app",
  messagingSenderId:"997435022478",
  appId:"1:997435022478:web:a0ad462f2a7dd074d27ddf"
};
if(!firebase.apps.length)firebase.initializeApp(FC);
const db=firebase.database();

const WP='widget_v11_data';
const AP='widget_v11_alertcfg';
const TP='widget_v11_trigger';
const ICON='https://cdn-icons-png.flaticon.com/512/38/38464.png';

const rgba=(hex,op)=>{
  if(!hex||typeof hex!=='string')return`rgba(15,15,15,${op??0.7})`;
  try{
    let c=hex.substring(1).split('');
    if(c.length===3)c=[c[0],c[0],c[1],c[1],c[2],c[2]];
    c='0x'+c.join('');
    return`rgba(${(c>>16)&255},${(c>>8)&255},${c&255},${op??0.7})`;
  }catch{return`rgba(15,15,15,0.7)`;}
};

// ── Goal Widget ──
const GoalW={
  template:'#tg',
  props:['p','isObs'],
  setup(pr){
    const fmtNum=computed(()=>(pr.p.current||0).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' '));
    const donors=computed(()=>pr.p.donorsRaw?pr.p.donorsRaw.split(/,|\n/).map(s=>s.trim()).filter(Boolean).slice(0,5):[]);
    const pct=computed(()=>{
      const m=parseFloat((pr.p.max||'0').toString().replace(/[^\d]/g,''));
      return m>0?Math.min(((pr.p.current||0)/m)*100,100):0;
    });
    const ps=computed(()=>({
      padding:(pr.p.padding||20)+'px',
      borderRadius:(pr.p.radius||15)+'px',
      background:rgba(pr.p.bgColor,pr.p.bgOpacity),
    }));
    const bs=computed(()=>({
      width:pct.value+'%',
      background:`linear-gradient(90deg,${pr.p.cBar1||'#8a0022'},${pr.p.cBar2||'#ff0044'})`,
      boxShadow:`0 0 14px ${pr.p.cBar2||'#ff0044'}88`,
      borderRadius:((pr.p.radius||15)/2)+'px',
    }));
    return{fmtNum,donors,ps,bs};
  }
};

// ── Challenge Widget ──
const ChalW={
  template:'#tc',
  props:['p','isObs'],
  setup(pr){
    const ps=computed(()=>({
      padding:(pr.p.padding||20)+'px',
      borderRadius:(pr.p.radius||15)+'px',
      background:rgba(pr.p.bgColor,pr.p.bgOpacity),
    }));
    const im=computed(()=>({
      width:(pr.p.iconSize||35)+'px',
      height:(pr.p.iconSize||35)+'px',
      backgroundColor:pr.p.cIcon||'#fff',
      '-webkit-mask-image':`url(${pr.p.iconUrl||ICON})`,
      'mask-image':`url(${pr.p.iconUrl||ICON})`,
    }));
    return{ps,im};
  }
};

// ── Main App ──
createApp({
  components:{GoalW,ChalW},
  setup(){
    const q=new URLSearchParams(window.location.search);
    const mode=ref(q.get('mode')||'admin');

    const panels=ref([]);
    const globalScale=ref(1);
    const selId=ref(null);
    const tab=ref('widgets');
    const alertOpen=ref(true);

    const alertCfg=ref({
      labelText:'НОВЫЙ ДОНАТ!',
      duration:7,
      mediaType:'none',
      imageData:'',
      videoUrl:'',
      soundData:'',
      volume:.8,
      bgColor:'#0a0a0a',
      bgOpacity:.92,
      labelColor:'#888888',
      nameColor:'#ffffff',
      amountColor:'#ffd700',
      borderColor:'#ffd700',
      borderRadius:20,
      nameFontSize:32,
      amountFontSize:48,
    });

    const alertVis=ref(false);
    const preVis=ref(false);
    const alertKey=ref(0);
    const preKey=ref(0);
    const curDonation=ref({name:'',amount:''});

    const tName=ref('');
    const tAmount=ref('');
    const imgErr=ref('');
    const sndErr=ref('');

    // Toast
    const toastVis=ref(false);
    const toastMsg=ref('');
    const toastType=ref('');
    let toastT=null;
    const toast=(m,t='')=>{
      toastMsg.value=m;toastType.value=t;toastVis.value=true;
      if(toastT)clearTimeout(toastT);
      toastT=setTimeout(()=>{toastVis.value=false;},3000);
    };

    // Refs
    const gv=ref(null);
    const gh=ref(null);
    const pcvs=ref(null);
    const pcvsAdmin=ref(null);

    // Computed styles
    const alertCardStyle=computed(()=>{
      const bg=rgba(alertCfg.value.bgColor,alertCfg.value.bgOpacity);
      const bc=alertCfg.value.borderColor||'#ffd700';
      return{
        background:bg,
        border:`2px solid ${bc}55`,
        borderRadius:(alertCfg.value.borderRadius||20)+'px',
        '--ac':`${bc}55`,
      };
    });
    const sceneStyle=computed(()=>({transform:`scale(${globalScale.value})`}));
    const adminSceneStyle=computed(()=>({}));

    const cardPos=(p)=>({left:(p.x||50)+'px',top:(p.y||50)+'px',width:(p.width||400)+'px'});
    const compFor=(t)=>t==='goal'?'GoalW':'ChalW';

    // Panel management
    const mkBase=(type)=>({
      id:Date.now()+Math.floor(Math.random()*1000),
      type,x:50,y:50,
      width:400,padding:20,radius:15,
      titleSize:16,textSize:14,
      bgColor:'#0f0f0f',bgOpacity:.75,
      cText:'#ffffff',cAccent:'#ffd700',
    });

    const addPanel=(type)=>{
      let c=mkBase(type);
      if(type==='goal'){
        Object.assign(c,{
          title:'СБОР НА СТРИМ:',current:0,max:'10 000',
          donorsRaw:'Максим — 500₽\nИван — 200₽\nАнна — 100₽',
          lastDonorLabel:'ПОСЛЕДНИЙ ДОНАТ',
          cBar1:'#8a0022',cBar2:'#ff0044',
        });
      } else {
        Object.assign(c,{
          title:'ОТЖИМАНИЯ',value:'1 раз = 50₽',
          label:'Всего:',count:'0 раз',
          iconSize:35,iconGap:15,cIcon:'#fff',
          iconUrl:ICON,showDivider:true,showCount:true,
        });
      }
      panels.value.push(c);
      selId.value=c.id;
    };

    const removePanel=(id)=>{
      panels.value=panels.value.filter(p=>p.id!==id);
      if(selId.value===id)selId.value=panels.value.length?panels.value[0].id:null;
    };

    // File uploads
    const uploadIcon=(e,p)=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();r.onload=ev=>{p.iconUrl=ev.target.result;};r.readAsDataURL(f);
    };
    const uploadAImg=(e)=>{
      imgErr.value='';
      const f=e.target.files[0];if(!f)return;
      if(f.size>1024*1024){imgErr.value='Файл слишком большой (макс. 1 MB)';return;}
      const r=new FileReader();r.onload=ev=>{alertCfg.value.imageData=ev.target.result;};r.readAsDataURL(f);
    };
    const uploadASound=(e)=>{
      sndErr.value='';
      const f=e.target.files[0];if(!f)return;
      if(f.size>2*1024*1024){sndErr.value='Файл слишком большой (макс. 2 MB)';return;}
      const r=new FileReader();r.onload=ev=>{alertCfg.value.soundData=ev.target.result;};r.readAsDataURL(f);
    };

    // Particles
    let particles=[];
    let raf=null;
    const spawnParticles=(canvas)=>{
      if(!canvas)return;
      const ctx=canvas.getContext('2d');
      const w=canvas.width,h=canvas.height;
      const colors=['#ffd700','#ff0044','#00ffcc','#ffffff','#ff6600','#aa00ff'];
      particles=Array.from({length:80},()=>({
        x:w/2+(Math.random()-.5)*300,y:h*.65,
        vx:(Math.random()-.5)*10,
        vy:-(Math.random()*12+6),
        s:Math.random()*7+2,
        c:colors[Math.floor(Math.random()*colors.length)],
        life:1,
        decay:Math.random()*.018+.009,
        rot:Math.random()*Math.PI*2,
        rs:(Math.random()-.5)*.25,
        shape:Math.random()>.5?'rect':'circle',
      }));
      if(raf)cancelAnimationFrame(raf);
      const anim=()=>{
        ctx.clearRect(0,0,w,h);
        particles=particles.filter(p=>p.life>0);
        for(const p of particles){
          p.x+=p.vx;p.y+=p.vy;p.vy+=.25;
          p.life-=p.decay;p.rot+=p.rs;
          ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.c;
          ctx.translate(p.x,p.y);ctx.rotate(p.rot);
          if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.s/2,0,Math.PI*2);ctx.fill();}
          else ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s);
          ctx.restore();
        }
        if(particles.length>0)raf=requestAnimationFrame(anim);
        else ctx.clearRect(0,0,w,h);
      };
      anim();
    };

    // Sound
    const playSound=()=>{
      if(!alertCfg.value.soundData)return;
      try{
        const a=new Audio(alertCfg.value.soundData);
        a.volume=alertCfg.value.volume||.8;
        a.play().catch(()=>{});
      }catch{}
    };

    // Alert timers
    let alertTimer=null;
    const showAlertObs=(name,amount)=>{
      if(alertTimer)clearTimeout(alertTimer);
      curDonation.value={name,amount};
      alertKey.value++;
      alertVis.value=true;
      playSound();
      nextTick(()=>{
        const c=pcvs.value;
        if(c){c.width=window.innerWidth;c.height=window.innerHeight;spawnParticles(c);}
      });
      alertTimer=setTimeout(()=>{alertVis.value=false;},(alertCfg.value.duration||7)*1000);
    };

    const showPreview=()=>{
      if(alertTimer)clearTimeout(alertTimer);
      preVis.value=false;
      setTimeout(()=>{
        preKey.value++;
        preVis.value=true;
        playSound();
        nextTick(()=>{
          const c=pcvsAdmin.value;
          if(c){
            const pz=c.closest('.preview-zone')||c.parentElement;
            c.width=pz?pz.offsetWidth:800;
            c.height=pz?pz.offsetHeight:600;
            spawnParticles(c);
          }
        });
        alertTimer=setTimeout(()=>{preVis.value=false;},(alertCfg.value.duration||7)*1000);
      },60);
    };

    const doTrigger=async()=>{
      const name=tName.value.trim()||'Аноним';
      const amount=tAmount.value.trim()||'0 ₽';
      try{
        await db.ref(AP).set({...alertCfg.value});
        await db.ref(TP).set({name,amount,ts:Date.now(),active:true});
        showPreview();
        toast('✓ Alert отправлен в OBS!','ok');
      }catch(e){toast('Ошибка: '+e.message,'err');}
    };

    const doTestLocal=()=>{showPreview();};

    // Save all
    const saveAll=async()=>{
      try{
        await db.ref(WP).set({panels:panels.value,globalScale:globalScale.value});
        await db.ref(AP).set({...alertCfg.value});
        toast('✓ Сохранено и опубликовано!','ok');
      }catch(e){toast('Ошибка: '+e.message,'err');}
    };

    // Copy links
    const copyLink=(type)=>{
      const base=window.location.href.split('?')[0];
      const url=`${base}?mode=${type}`;
      navigator.clipboard.writeText(url).then(()=>{
        toast(`✓ Ссылка ${type==='widget'?'виджета':'Alert'} скопирована!`,'ok');
      }).catch(()=>toast('Не удалось скопировать','err'));
    };

    // Drag
    let drag=null;
    const SNAP=12;
    const startDrag=(e,p)=>{
      selId.value=p.id;
      const cx=e.touches?e.touches[0].clientX:e.clientX;
      const cy=e.touches?e.touches[0].clientY:e.clientY;
      drag={p,sx:cx-p.x,sy:cy-p.y};

      const mv=(ev)=>{
        if(!drag)return;
        const x=ev.touches?ev.touches[0].clientX:ev.clientX;
        const y=ev.touches?ev.touches[0].clientY:ev.clientY;
        let nx=x-drag.sx,ny=y-drag.sy;
        const snaps=[0,50,100,200,300,400,500,600,700,800,900,960,1920];
        const sx=snaps.find(s=>Math.abs(nx-s)<SNAP);
        const sy=snaps.find(s=>Math.abs(ny-s)<SNAP);
        if(sx!==undefined){nx=sx;if(gv.value){gv.value.style.left=nx+'px';gv.value.classList.add('on');}}
        else if(gv.value)gv.value.classList.remove('on');
        if(sy!==undefined){ny=sy;if(gh.value){gh.value.style.top=ny+'px';gh.value.classList.add('on');}}
        else if(gh.value)gh.value.classList.remove('on');
        drag.p.x=Math.max(0,nx);drag.p.y=Math.max(0,ny);
      };
      const up=()=>{
        drag=null;
        if(gv.value)gv.value.classList.remove('on');
        if(gh.value)gh.value.classList.remove('on');
        window.removeEventListener('mousemove',mv);
        window.removeEventListener('mouseup',up);
        window.removeEventListener('touchmove',mv);
        window.removeEventListener('touchend',up);
      };
      window.addEventListener('mousemove',mv);
      window.addEventListener('mouseup',up);
      window.addEventListener('touchmove',mv,{passive:true});
      window.addEventListener('touchend',up);
    };

    // Mount
    onMounted(async()=>{
      // Load widget data
      try{
        const ws=await db.ref(WP).get();
        if(ws.exists()){const d=ws.val();panels.value=d.panels||[];globalScale.value=d.globalScale||1;}
      }catch{}

      // Load alert config
      try{
        const as=await db.ref(AP).get();
        if(as.exists())alertCfg.value={...alertCfg.value,...as.val()};
      }catch{}

      // Alert overlay: listen for triggers
      if(mode.value==='alert'){
        db.ref(AP).on('value',s=>{if(s.exists())alertCfg.value={...alertCfg.value,...s.val()};});
        let lastTs=0;
        db.ref(TP).on('value',s=>{
          if(!s.exists())return;
          const d=s.val();
          if(d.active&&d.ts>lastTs){
            lastTs=d.ts;
            showAlertObs(d.name,d.amount);
            db.ref(TP).update({active:false});
          }
        });
      }

      // Widget overlay: live updates
      if(mode.value==='widget'){
        db.ref(WP).on('value',s=>{
          if(s.exists()){const d=s.val();panels.value=d.panels||[];globalScale.value=d.globalScale||1;}
        });
      }
    });

    return{
      mode,panels,globalScale,selId,tab,alertOpen,
      alertCfg,alertVis,preVis,alertKey,preKey,curDonation,
      tName,tAmount,imgErr,sndErr,
      alertCardStyle,sceneStyle,adminSceneStyle,
      gv,gh,pcvs,pcvsAdmin,
      toastVis,toastMsg,toastType,
      addPanel,removePanel,compFor,cardPos,
      uploadIcon,uploadAImg,uploadASound,
      doTrigger,doTestLocal,saveAll,copyLink,startDrag,
    };
  }
}).mount('#app');
</script>
</body>
</html>

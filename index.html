<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SUPREME WIDGET V12 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --gold: #ffd700;
  --silver: #c8c8c8;
  --bronze: #cd7f32;
  --red: #ff0044;
  --bg: #080808;
  --panel: #111111;
  --border: #1e1e1e;
  --border-hi: #2e2e2e;
  --text-dim: #555;
  --text-mid: #888;
  --text: #cccccc;
  --text-bright: #ffffff;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --sidebar-w: 400px;
  --tenge: #00c2ff;
}
*{box-sizing:border-box;outline:none;margin:0;padding:0;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#222;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#333;}
body{font-family:'Unbounded',sans-serif;background:transparent;color:var(--text-bright);overflow:hidden;}
.admin-shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;background:var(--bg);position:fixed;inset:0;}
.sidebar{display:flex;flex-direction:column;background:var(--panel);border-right:1px solid var(--border);overflow:hidden;}
.sidebar-head{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--red),#880022);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;letter-spacing:-1px;}
.logo-name{font-size:13px;font-weight:900;letter-spacing:0.5px;}
.logo-name span{color:var(--red);}
.ver-tag{font-size:9px;font-weight:700;color:var(--text-dim);background:#151515;padding:3px 7px;border-radius:20px;border:1px solid var(--border);letter-spacing:0.5px;}
.tabs{display:flex;gap:3px;padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:8px 6px;border-radius:var(--radius-sm);font-family:'Unbounded';font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;border:none;cursor:pointer;transition:all .2s;color:var(--text-dim);background:transparent;}
.tab.on{background:var(--red);color:#fff;box-shadow:0 2px 10px rgba(255,0,68,.3);}
.tab:not(.on):hover{color:var(--text);background:#1a1a1a;}
.sidebar-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.donate-form-card{background:linear-gradient(135deg,#0d0007,#07000d);border:1px solid rgba(255,0,68,.25);border-radius:var(--radius-lg);padding:16px;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden;}
.donate-form-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top left,rgba(255,0,68,.07),transparent 60%);pointer-events:none;}
.donate-form-title{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#fff;}
.donate-form-title .dft-icon{width:22px;height:22px;border-radius:6px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:11px;}
.donate-input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:end;}
.donate-amount-wrap{position:relative;}
.donate-amount-wrap input{padding-right:36px !important;}
.tenge-badge{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:14px;font-weight:900;color:var(--tenge);pointer-events:none;line-height:1;}
.donate-name-input{width:100%;}
.donate-btn-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.live-preview-strip{background:#0a0a0a;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.lp-label{font-size:8px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.lp-value{font-size:12px;font-weight:900;color:var(--tenge);}
.lp-name{font-size:10px;font-weight:700;color:var(--text);}
.lp-sep{width:1px;height:24px;background:var(--border);}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:#151515;border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;transition:all .2s;user-select:none;}
.sec-head:hover{background:#1a1a1a;border-color:var(--border-hi);}
.sec-head.on{border-color:var(--red);background:#150007;}
.sec-head-l{display:flex;align-items:center;gap:9px;}
.sec-dot{width:18px;height:18px;border-radius:50%;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:var(--text-dim);flex-shrink:0;}
.sec-head.on .sec-dot{background:var(--red);color:#fff;}
.sec-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text);}
.sec-head.on .sec-name{color:#fff;}
.sec-chevron{font-size:9px;color:var(--text-dim);transition:transform .2s;}
.sec-head.on .sec-chevron{transform:rotate(180deg);}
.sec-body{padding:13px;background:#0c0c0c;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-md) var(--radius-md);display:flex;flex-direction:column;gap:11px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fr{display:flex;gap:9px;}
.fr > *{flex:1;}
label,.lbl{font-size:9px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;}
input[type=text],input[type=number],select,textarea{background:#080808;border:1px solid var(--border);color:var(--text-bright);padding:9px 11px;border-radius:var(--radius-sm);font-family:'Unbounded';font-size:11px;width:100%;transition:border-color .2s,box-shadow .2s;}
textarea{resize:vertical;min-height:54px;line-height:1.5;}
input:focus,select:focus,textarea:focus{border-color:var(--red);box-shadow:0 0 0 2px rgba(255,0,68,.1);}
select option{background:#111;}
.rr{display:flex;align-items:center;gap:8px;}
input[type=range]{flex:1;accent-color:var(--red);cursor:pointer;height:3px;background:var(--border);border-radius:2px;border:none;padding:0;}
.rv{font-size:10px;color:var(--text-bright);min-width:34px;text-align:right;font-variant-numeric:tabular-nums;background:#080808;padding:3px 6px;border-radius:4px;border:1px solid var(--border);}
.color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.ci{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:8px;color:var(--text-dim);font-weight:700;text-transform:uppercase;}
input[type=color]{width:100%;height:30px;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:#000;padding:2px;}
.cb-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
.cb-row label{font-size:10px;color:var(--text);font-weight:700;text-transform:none;letter-spacing:0;}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--red);cursor:pointer;}
.divider{height:1px;background:var(--border);width:100%;margin:3px 0;}
.sub-lbl{font-size:10px;font-weight:900;color:var(--text-bright);text-transform:uppercase;letter-spacing:.5px;}
.btn{font-family:'Unbounded';text-transform:uppercase;font-weight:700;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:.3px;}
.btn-red{background:linear-gradient(135deg,#ff0044,#cc0034);color:#fff;padding:15px;border-radius:var(--radius-md);font-size:12px;font-weight:900;width:100%;box-shadow:0 4px 15px rgba(255,0,68,.2);}
.btn-red:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(255,0,68,.35);}
.btn-tenge{background:linear-gradient(135deg,#0088cc,#005588);color:#fff;padding:13px 16px;border-radius:var(--radius-md);font-size:11px;font-weight:900;width:100%;box-shadow:0 4px 15px rgba(0,194,255,.2);}
.btn-tenge:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,194,255,.35);}
.btn-tenge:active{transform:scale(.97);}
.btn-green{background:linear-gradient(135deg,#00aa44,#007730);color:#fff;padding:12px;border-radius:var(--radius-sm);font-size:10px;width:100%;box-shadow:0 2px 10px rgba(0,170,68,.2);}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,170,68,.3);}
.btn-purple{background:linear-gradient(135deg,#7700ff,#5500cc);color:#fff;padding:12px;border-radius:var(--radius-sm);font-size:10px;width:100%;box-shadow:0 2px 10px rgba(119,0,255,.2);}
.btn-purple:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(119,0,255,.3);}
.btn-ghost{background:transparent;color:var(--text-mid);padding:10px;border-radius:var(--radius-sm);font-size:9px;flex:1;border:1px dashed var(--border-hi);}
.btn-ghost:hover{background:#151515;color:var(--text);border-color:#444;}
.btn-flat{background:#151515;color:var(--text);padding:11px;border-radius:var(--radius-sm);font-size:10px;border:1px solid var(--border);}
.btn-flat:hover{background:#1c1c1c;border-color:var(--border-hi);}
.btn-del{background:rgba(255,0,0,.07);color:#ff4444;padding:5px 8px;border-radius:5px;font-size:8px;border:1px solid rgba(255,0,0,.15);}
.btn-del:hover{background:#ff4444;color:#fff;}
.btn-add-panel{background:#151515;color:var(--text);padding:11px;border-radius:var(--radius-sm);font-size:10px;flex:1;border:1px solid var(--border);}
.btn-add-panel:hover{background:#1c1c1c;}
.actions{display:flex;flex-direction:column;gap:8px;padding:12px;border-top:1px solid var(--border);flex-shrink:0;}
.file-wrap{position:relative;overflow:hidden;display:inline-block;width:100%;}
.file-wrap input[type=file]{font-size:100px;position:absolute;left:0;top:0;opacity:0;cursor:pointer;height:100%;width:100%;}
.file-btn{background:#080808;border:1px solid var(--border);color:var(--text-mid);padding:9px 11px;border-radius:var(--radius-sm);font-size:10px;width:100%;text-align:center;font-family:'Unbounded';font-weight:700;text-transform:uppercase;letter-spacing:.3px;transition:all .2s;cursor:pointer;}
.file-wrap:hover .file-btn{border-color:var(--red);color:var(--text-bright);}
.file-ok{font-size:9px;color:#00cc44;margin-top:3px;font-weight:700;}
.file-err{font-size:9px;color:#ff4444;margin-top:3px;font-weight:700;}
.preview-zone{position:relative;background:#0a0a0a;background-image:radial-gradient(#1c1c1c 1px,transparent 1px);background-size:22px 22px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.pz-label{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:#222;text-transform:uppercase;letter-spacing:1.5px;pointer-events:none;z-index:5;white-space:nowrap;}
.pz-mode{position:absolute;top:14px;right:16px;font-size:8px;font-weight:700;color:#1e1e1e;text-transform:uppercase;letter-spacing:1px;pointer-events:none;z-index:5;}
.widget-scene{position:relative;width:100%;height:100%;transform-origin:center center;}
.draggable{position:absolute;cursor:grab;z-index:10;user-select:none;touch-action:none;transition:box-shadow .15s;}
.draggable:active{cursor:grabbing;z-index:99;}
.draggable.sel{outline:1.5px solid rgba(0,255,180,.7);outline-offset:4px;border-radius:inherit;}
.glass{position:relative;width:100%;height:100%;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.05);overflow:hidden;}
.goal-wrap{display:flex;flex-direction:column;width:100%;height:100%;}
.goal-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap;gap:4px;}
.prog-track{width:100%;background:rgba(0,0,0,.5);overflow:hidden;border:1px solid rgba(255,255,255,.04);position:relative;}
.prog-fill{height:100%;transition:width .5s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.prog-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shimmer 2.5s infinite linear;}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
.ld-section{margin-top:13px;}
.ld-label{display:inline-flex;align-items:center;gap:5px;font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:2px;padding:4px 10px;border-radius:20px;margin-bottom:8px;white-space:nowrap;}
.donor-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px;}
.donor-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.04);}
.rk-1{background:linear-gradient(90deg,rgba(255,215,0,.13),transparent) !important;border-color:rgba(255,215,0,.3) !important;color:var(--gold) !important;font-weight:900;}
.rk-2{background:linear-gradient(90deg,rgba(200,200,200,.08),transparent) !important;border-color:rgba(200,200,200,.2) !important;color:var(--silver) !important;}
.rk-3{background:linear-gradient(90deg,rgba(205,127,50,.08),transparent) !important;border-color:rgba(205,127,50,.2) !important;color:var(--bronze) !important;}
.chal-wrap{display:flex;flex-direction:column;width:100%;height:100%;justify-content:center;}
.chal-row{display:flex;justify-content:space-between;align-items:center;width:100%;}
.chal-brand{display:flex;align-items:center;}
.icon-mask{background-color:#fff;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-size:contain;mask-size:contain;-webkit-mask-position:center;mask-position:center;flex-shrink:0;}
.chal-title{font-weight:800;text-transform:uppercase;letter-spacing:1px;}
.chal-divider{height:1px;width:100%;margin:7px 0;opacity:.1;}
.chal-label{opacity:.7;font-weight:700;}
.chal-val,.chal-total{font-weight:900;text-align:right;}
.ed{cursor:text;border-bottom:1px dashed rgba(255,255,255,.2);transition:all .15s;}
.ed:hover{background:rgba(255,255,255,.05);}
.ed:focus{background:rgba(255,255,255,.1);outline:none;border-bottom:2px solid var(--red);}
.obs-mode .ed{border:none !important;background:transparent !important;pointer-events:none;}
.obs-mode .draggable{cursor:default !important;outline:none !important;}
.guide{position:absolute;background:#00ffb0;box-shadow:0 0 8px #00ffb0;z-index:100;pointer-events:none;opacity:0;transition:opacity .15s;}
.guide.on{opacity:.65;}
.guide.gv{top:-3000px;bottom:-3000px;width:1px;}
.guide.gh{left:-3000px;right:-3000px;height:1px;}
.alert-scene{width:100vw;height:100vh;background:transparent;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;padding-bottom:50px;}
.particle-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
.alert-card{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:28px 36px;gap:12px;text-align:center;min-width:380px;max-width:580px;overflow:hidden;}
.alert-card::before{content:'';position:absolute;inset:0;background:inherit;filter:blur(0);z-index:-1;}
.alert-media{width:100%;max-height:180px;overflow:hidden;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.alert-media img,.alert-media video{width:100%;height:100%;object-fit:cover;border-radius:10px;max-height:180px;}
.a-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:3px;opacity:.75;}
.a-name{font-weight:900;text-transform:uppercase;letter-spacing:1px;line-height:1;}
.a-amount{font-weight:900;line-height:1;}
.a-bar{width:80%;height:3px;border-radius:2px;opacity:.4;animation:barShrink linear forwards;transform-origin:left center;}
@keyframes barShrink{0%{transform:scaleX(1);}100%{transform:scaleX(0);}}
.alert-enter-active{animation:alertIn .65s cubic-bezier(.34,1.56,.64,1) both;}
.alert-leave-active{animation:alertOut .45s ease-in both;}
@keyframes alertIn{0%{transform:translateY(70px) scale(.85);opacity:0;}100%{transform:translateY(0) scale(1);opacity:1;}}
@keyframes alertOut{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-60px) scale(.9);opacity:0;}}
.a-label{animation:textUp .4s .15s ease both;}
.a-name{animation:textUp .4s .25s ease both;}
.a-amount{animation:textUp .4s .35s ease both;}
@keyframes textUp{0%{transform:translateY(16px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
.glow-card{animation:glowPulse 2s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{box-shadow:0 0 25px var(--ac,rgba(255,215,0,.3));}50%{box-shadow:0 0 60px var(--ac,rgba(255,215,0,.6)),0 0 100px var(--ac,rgba(255,215,0,.15));}}
.alert-preview-wrap{width:100%;height:100%;display:flex;align-items:flex-end;justify-content:center;padding-bottom:40px;position:relative;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:#151515;border:1px solid var(--border);color:var(--text);padding:11px 18px;border-radius:var(--radius-md);font-size:10px;font-weight:700;transition:all .25s;opacity:0;z-index:99999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:#00aa44;color:#00cc44;}
.toast.err{border-color:#ff4444;color:#ff4444;}

/* ── FB статус индикатор ── */
.fb-status{display:flex;align-items:center;gap:6px;font-size:9px;font-weight:700;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#0a0a0a;}
.fb-dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;}
.fb-dot.ok{background:#00cc44;box-shadow:0 0 6px #00cc44;}
.fb-dot.err{background:#ff4444;}

@media(max-width:900px){
  :root{--sidebar-w:100%;}
  body{overflow:auto;}
  .admin-shell{grid-template-columns:1fr;grid-template-rows:auto;height:auto;min-height:100vh;overflow:auto;position:relative;}
  .sidebar{border-right:none;border-bottom:1px solid var(--border);order:1;max-height:none;overflow:visible;}
  .sidebar-body{overflow:visible;padding-bottom:20px;}
  .preview-zone{order:2;height:60vw;min-height:280px;border-top:1px solid var(--border);}
  .donate-input-row{grid-template-columns:1fr;}
  .donate-btn-row{grid-template-columns:1fr;}
  .color-grid{grid-template-columns:repeat(3,1fr);}
  .fr{flex-wrap:wrap;}
  .fr > *{flex:1 1 140px;}
}
@media(max-width:480px){
  .sidebar-head{padding:12px 14px;}
  .logo-name{font-size:11px;}
  .tabs{padding:8px 10px;}
  .tab{font-size:8px;padding:7px 4px;}
  .donate-form-card{padding:13px;}
  .color-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div id="app" :class="{'obs-mode':mode!=='admin'}">

  <!-- ALERT OVERLAY -->
  <div v-if="mode==='alert'" class="alert-scene">
    <canvas ref="pcvs" class="particle-canvas"></canvas>
    <transition name="alert">
      <div v-if="alertVis" class="alert-card glow-card" :style="alertCardStyle">
        <div class="a-bar" :style="{background:alertCfg.amountColor||'#ffd700',animationDuration:(alertCfg.duration||7)+'s'}" :key="alertKey"></div>
        <div v-if="alertCfg.mediaType==='video'&&alertCfg.videoUrl" class="alert-media">
          <video :src="alertCfg.videoUrl" autoplay muted loop playsinline></video>
        </div>
        <div v-else-if="alertCfg.mediaType==='image'&&alertCfg.imageData" class="alert-media">
          <img :src="alertCfg.imageData" alt="">
        </div>
        <div class="a-label" :style="{color:alertCfg.labelColor||'#aaa'}">{{alertCfg.labelText||'НОВЫЙ ДОНАТ!'}}</div>
        <div class="a-name" :style="{color:alertCfg.nameColor||'#fff',fontSize:(alertCfg.nameFontSize||32)+'px'}">{{curDonation.name}}</div>
        <div class="a-amount" :style="{color:alertCfg.amountColor||'#ffd700',fontSize:(alertCfg.amountFontSize||48)+'px'}">{{curDonation.amount}} ₸</div>
      </div>
    </transition>
  </div>

  <!-- WIDGET OVERLAY -->
  <div v-else-if="mode==='widget'" class="widget-scene" :style="sceneStyle">
    <div v-for="p in panels" :key="p.id" class="draggable" :style="cardPos(p)">
      <component :is="compFor(p.type)" :p="p" :is-obs="true"></component>
    </div>
  </div>

  <!-- ADMIN -->
  <div v-else class="admin-shell">
    <div class="sidebar">
      <div class="sidebar-head">
        <div class="logo">
          <div class="logo-mark">W</div>
          <div class="logo-name">WIDGET <span>PRO</span></div>
        </div>
        <div class="ver-tag">v12 TENGE</div>
      </div>

      <div class="tabs">
        <button class="tab" :class="{on:tab==='widgets'}" @click="tab='widgets'">🎯 Виджеты</button>
        <button class="tab" :class="{on:tab==='alert'}" @click="tab='alert'">🎉 Alert</button>
      </div>

      <div class="sidebar-body">

        <!-- WIDGETS TAB -->
        <template v-if="tab==='widgets'">

          <!-- FB статус -->
          <div class="fb-status">
            <div class="fb-dot" :class="{ok:fbOk,err:!fbOk}"></div>
            <span>{{fbOk ? 'Firebase подключён' : 'Firebase не подключён'}}</span>

<script>
const { createApp, reactive, computed, ref, onMounted, defineComponent } = Vue;

function uid(){ return Math.random().toString(36).slice(2,9); }
function hexToRgb(h){
  let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `${r},${g},${b}`;
}
/* Универсальная очистка числа — убирает пробелы, ₸, запятые */
function cleanNum(v){
  return Math.round(parseFloat(String(v).replace(/\s/g,'').replace(/[^\d.]/g,'')) || 0);
}

const GoalComp = defineComponent({
  template:'#tpl-goal',
  props:['p','isObs'],
  computed:{
    pct(){ const c=this.p.current||0,m=parseFloat(this.p.max)||1; return Math.min(100,Math.round(c/m*100)); },
    donors(){
      const raw=this.p.donorsRaw||'';
      return raw.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean).map(s=>{
        const m=s.match(/^(.+?)[—\-–]\s*(.+)$/);
        return m?{name:m[1].trim(),amount:m[2].trim()}:{name:s,amount:''};
      });
    },
    glassStyle(){
      const p=this.p, bg=p.bgColor||'#111111', op=p.bgOpacity!==undefined?p.bgOpacity:0.75;
      return {background:`rgba(${hexToRgb(bg)},${op})`,borderRadius:(p.radius||15)+'px',width:(p.width||400)+'px',minHeight:'80px'};
    }
  },
  methods:{ formatNum(n){ return Number(n).toLocaleString('ru'); } }
});

const ChalComp = defineComponent({
  template:'#tpl-challenge',
  props:['p','isObs'],
  computed:{
    pct(){ const c=this.p.current||0,m=parseFloat(this.p.max)||1; return Math.min(100,Math.round(c/m*100)); },
    glassStyle(){
      const p=this.p, bg=p.bgColor||'#111111', op=p.bgOpacity!==undefined?p.bgOpacity:0.75;
      return {background:`rgba(${hexToRgb(bg)},${op})`,borderRadius:(p.radius||15)+'px',width:(p.width||400)+'px',minHeight:'60px'};
    }
  }
});

    const saved = loadState() || {};
    const urlMode = new URLSearchParams(location.search).get('mode');
    const mode = ref(urlMode||'admin');
    const tab  = ref('widgets');
    const selId= ref(null);
    const alertOpen = ref(false);
    const globalScale = ref(saved.globalScale||1);
    const guideV = ref(false), guideH = ref(false);
    const guideVx = ref(0), guideHy = ref(0);
    const pcvs = ref(null);
    const wscene = ref(null);
    const previewZone = ref(null);
    const fbOk = ref(!!db);

    const panels = reactive(saved.panels || []);
    if(!panels.length) panels.push({
      id:uid(),type:'goal',title:'Цель стрима',current:0,max:'50000',
      lastDonorLabel:'ПОСЛЕДНИЙ ДОНАТ',donorsRaw:'',
      width:420,padding:20,radius:15,bgColor:'#111111',bgOpacity:.8,
      cText:'#cccccc',cBar1:'#ff0044',cBar2:'#ff6600',cAccent:'#ffd700',
      titleSize:16,textSize:13,barHeight:14,x:80,y:60
    });

    const alertCfg = reactive(Object.assign({
      labelText:'НОВЫЙ ДОНАТ!',duration:7,mediaType:'none',
      imageData:null,videoUrl:'',soundData:null,volume:1,
      bgColor:'#111111',bgOpacity:.9,labelColor:'#aaaaaa',
      nameColor:'#ffffff',amountColor:'#ffd700',borderColor:'#ffd700',
      nameFontSize:32,amountFontSize:48,cardRadius:16,
      particleColor:'#ffd700',particleCount:80,
    }, saved.alertCfg||{}));

    const alertVis = ref(false);
    const alertKey = ref(0);
    const curDonation = reactive({name:'',amount:''});
    let alertTimer = null;

    const quickName = ref('');
    const quickAmount = ref('');
    const tName = ref('');
    const tAmount = ref(null);
    const imgErr = ref('');
    const sndErr = ref('');
    const toast = reactive({show:false,msg:'',type:'ok'});

    let toastTm;
    function showToast(msg,type='ok'){
      toast.msg=msg; toast.type=type; toast.show=true;
      clearTimeout(toastTm);
      toastTm=setTimeout(()=>toast.show=false,2500);
    }

    const sceneStyle = computed(()=>({ transform:`scale(${globalScale.value})` }));
    const alertCardStyle = computed(()=>{
      const c=alertCfg, bg=c.bgColor||'#111111', op=c.bgOpacity!==undefined?c.bgOpacity:.9;
      return {
        background:`rgba(${hexToRgb(bg)},${op})`,
        borderRadius:(c.cardRadius||16)+'px',
        border:`1px solid ${c.borderColor||'rgba(255,215,0,.3)'}`,
        '--ac':`rgba(${hexToRgb(c.amountColor||'#ffd700')},.4)`,
      };
    });

    function cardPos(p){ return {left:(p.x||0)+'px',top:(p.y||0)+'px',width:(p.width||400)+'px'}; }
    function compFor(type){ return type==='goal'?'goal-widget':'challenge-widget'; }

    function addPanel(type){
      panels.push({
        id:uid(),type,title:type==='goal'?'Цель стрима':'Новый челлендж',
        current:0,max:'50000',lastDonorLabel:'ПОСЛЕДНИЙ ДОНАТ',donorsRaw:'',
        showDivider:true,showCount:true,iconData:null,iconSize:35,iconGap:15,
        width:400,padding:20,radius:15,bgColor:'#111111',bgOpacity:.8,
        cText:'#cccccc',cBar1:'#ff0044',cBar2:'#ff6600',cAccent:'#ffd700',cIcon:'#ffffff',
        titleSize:16,textSize:13,barHeight:14,
        x:80+(panels.length*30),y:60+(panels.length*30),
      });
    }

    function removePanel(id){
      const i=panels.findIndex(p=>p.id===id);
      if(i>=0) panels.splice(i,1);
      if(selId.value===id) selId.value=null;
    }

    /* ── Сохранение состояния ── */
    function buildState(){
      return {
        panels: JSON.parse(JSON.stringify(panels)),
        alertCfg: JSON.parse(JSON.stringify(alertCfg)),
        globalScale: globalScale.value,
      };
    }

    function pushState(){
      const state = buildState();
      saveState(state);
      if(db){ try{ db.ref('config').set(state); }catch(e){} }
    }

    function applyDonateToGoals(name, amount){
      const num = cleanNum(amount);
      const entry = `${name} — ${Number(num).toLocaleString('ru')} ₸`;
      panels.forEach(p=>{
        if(p.type==='goal'){
          p.current = (p.current||0) + num;
          const existing = (p.donorsRaw||'').trim();
          p.donorsRaw = existing ? entry+'\n'+existing : entry;
        }
        if(p.type==='challenge'){
          p.current = (p.current||0) + num;
        }
      });
    }

    function doQuickDonate(){
      const name = quickName.value.trim();
      const amt  = cleanNum(quickAmount.value);
      if(!name){ showToast('Введи имя донатера!','err'); return; }
      if(!amt)  { showToast('Введи сумму!','err'); return; }
      applyDonateToGoals(name, amt);
      triggerAlert(name, amt, true);
      pushState(); // ← автосохранение одной функцией
      showToast(`✓ ${name} — ${Number(amt).toLocaleString('ru')} ₸ принят!`,'ok');
      quickName.value='';
      quickAmount.value='';
    }

    function doQuickTest(){
      const name = quickName.value.trim() || 'Тест Донатов';
      const amt  = cleanNum(quickAmount.value) || 500;
      triggerAlert(name, amt, false);
    }

    function doTrigger(){
      const name = tName.value.trim();
      const amt  = cleanNum(tAmount.value);
      if(!name||!amt){ showToast('Заполни имя и сумму!','err'); return; }
      triggerAlert(name, amt, true);
    }

    function doTestLocal(){
      const name = tName.value.trim() || 'Тест';
      const amt  = cleanNum(tAmount.value) || 500;
      triggerAlert(name, amt, false);
    }

    function triggerAlert(name, amt, pushFB){
      const num = cleanNum(amt); // финальная защита от "не числа"
      curDonation.name = name;
      curDonation.amount = Number(num).toLocaleString('ru');
      alertKey.value++;
      alertVis.value = true;
      clearTimeout(alertTimer);
      playSound();
      spawnParticles();
      const dur = (alertCfg.duration||7)*1000;
      alertTimer = setTimeout(()=>alertVis.value=false, dur+600);

      if(pushFB && db){
        try{
          db.ref('alert').set({
            name,
            amount: num, // ← всегда чистое число, никаких пробелов
            ts: Date.now(),
            cfg: JSON.parse(JSON.stringify(alertCfg))
          });
        }catch(e){}
      }
    }

    function playSound(){
      if(!alertCfg.soundData) return;
      try{ const a=new Audio(alertCfg.soundData); a.volume=alertCfg.volume||1; a.play().catch(()=>{}); }catch(e){}
    }

    function spawnParticles(){
      const canvas=pcvs.value; if(!canvas) return;
      const ctx=canvas.getContext('2d');
      canvas.width=canvas.offsetWidth||800;
      canvas.height=canvas.offsetHeight||600;
      const count=alertCfg.particleCount!==undefined?alertCfg.particleCount:80;
      if(!count) return;
      const color=alertCfg.particleColor||'#ffd700';
      const particles=[];
      for(let i=0;i<count;i++){
        particles.push({x:Math.random()*canvas.width,y:canvas.height+10,vx:(Math.random()-.5)*4,vy:-(Math.random()*6+3),size:Math.random()*5+2,alpha:1,decay:Math.random()*.015+.008});
      }
      function frame(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        let alive=false;
        particles.forEach(p=>{
          if(p.alpha<=0) return; alive=true;
          p.x+=p.vx; p.y+=p.vy; p.vy+=.12; p.alpha-=p.decay;
          ctx.save(); ctx.globalAlpha=Math.max(0,p.alpha); ctx.fillStyle=color;
          ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); ctx.restore();
        });
        if(alive) requestAnimationFrame(frame);
        else ctx.clearRect(0,0,canvas.width,canvas.height);
      }
      requestAnimationFrame(frame);
    }

    function saveAll(){
      pushState();
      showToast('✓ Сохранено!','ok');
    }

    function resetAll(){
      if(!confirm('Сбросить все настройки?')) return;
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }

    function copyObs(type){
      const url=`${location.href.split('?')[0]}?mode=${type}`;
      navigator.clipboard.writeText(url).then(()=>showToast('URL скопирован!','ok'),()=>showToast('Не удалось скопировать','err'));
    }

    /* drag mouse */
    let drag={active:false,pid:null,ox:0,oy:0,px:0,py:0};
    function startDrag(e,p){
      drag.active=true; drag.pid=p.id; drag.ox=e.clientX; drag.oy=e.clientY; drag.px=p.x||0; drag.py=p.y||0;
      selId.value=p.id;
      window.addEventListener('mousemove',onDrag); window.addEventListener('mouseup',endDrag);
    }
    function onDrag(e){
      if(!drag.active) return;
      const p=panels.find(x=>x.id===drag.pid); if(!p) return;
      const dx=e.clientX-drag.ox, dy=e.clientY-drag.oy, sc=globalScale.value||1;
      p.x=drag.px+dx/sc; p.y=drag.py+dy/sc;
      const zone=previewZone.value;
      if(zone){
        const w=zone.offsetWidth/sc, h=zone.offsetHeight/sc, cx=p.x+(p.width||400)/2;
        guideV.value=Math.abs(cx-w/2)<12; guideVx.value=zone.offsetWidth/2;
        guideH.value=Math.abs(p.y-h/2)<12; guideHy.value=zone.offsetHeight/2;
        if(guideV.value) p.x=w/2-(p.width||400)/2;
        if(guideH.value) p.y=h/2;
      }
    }
    function endDrag(){
      drag.active=false; guideV.value=false; guideH.value=false;
      window.removeEventListener('mousemove',onDrag); window.removeEventListener('mouseup',endDrag);
    }

    /* drag touch */
    function startDragTouch(e,p){
      const t=e.touches[0];
      drag.active=true; drag.pid=p.id; drag.ox=t.clientX; drag.oy=t.clientY; drag.px=p.x||0; drag.py=p.y||0;
      selId.value=p.id;
      window.addEventListener('touchmove',onDragTouch,{passive:false}); window.addEventListener('touchend',endDrag);
    }
    function onDragTouch(e){
      e.preventDefault(); const t=e.touches[0]; if(!drag.active) return;
      const p=panels.find(x=>x.id===drag.pid); if(!p) return;
      const dx=t.clientX-drag.ox, dy=t.clientY-drag.oy, sc=globalScale.value||1;
      p.x=drag.px+dx/sc; p.y=drag.py+dy/sc;
    }

    function uploadIcon(e,p){ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>{ p.iconData=ev.target.result; }; r.readAsDataURL(f); }
    function uploadAImg(e){
      imgErr.value=''; const f=e.target.files[0]; if(!f) return;
      if(f.size>1048576){ imgErr.value='Файл >1 MB'; return; }
      const r=new FileReader(); r.onload=ev=>{ alertCfg.imageData=ev.target.result; }; r.readAsDataURL(f);
    }
    function uploadASound(e){
      sndErr.value=''; const f=e.target.files[0]; if(!f) return;
      if(f.size>2097152){ sndErr.value='Файл >2 MB'; return; }
      const r=new FileReader(); r.onload=ev=>{ alertCfg.soundData=ev.target.result; }; r.readAsDataURL(f);
    }

    /* ── КЛЮЧЕВОЕ ИСПРАВЛЕНИЕ:
       OBS (widget/alert) слушает Firebase.
       Админ-панель (телефон/комп) НЕ слушает Firebase автоматически —
       только при явном нажатии "Сохранить" данные идут В Firebase,
       а не ИЗ Firebase. Это убирает сброс при открытии с телефона.
    ── */
    onMounted(()=>{
      if(mode.value==='alert' && db){
        // OBS alert source — слушаем входящие донаты
        let lastTs = 0;
        db.ref('alert').on('value',snap=>{
          const d=snap.val();
          if(!d||!d.ts) return;
          if(d.ts <= lastTs) return; // защита от повторного срабатывания при загрузке
          lastTs = d.ts;
          if(d.cfg) Object.assign(alertCfg,d.cfg);
          const num = cleanNum(d.amount);
          triggerAlert(d.name, num, false);
        });
      }
      if(mode.value==='widget' && db){
        // OBS widget source — слушаем обновления конфига
        db.ref('config').on('value',snap=>{
          const d=snap.val();
          if(!d) return;
          if(d.panels){
            panels.splice(0);
            d.panels.forEach(p=>panels.push(p));
          }
          if(d.globalScale) globalScale.value=d.globalScale;
        });
      }
      // Админ-панель — НЕ подписывается на Firebase автоматически
      // (это решает проблему сброса при открытии с телефона)
    });

    return {
      mode,tab,selId,alertOpen,globalScale,fbOk,
      panels,alertCfg,alertVis,alertKey,curDonation,
      quickName,quickAmount,tName,tAmount,
      imgErr,sndErr,toast,
      guideV,guideH,guideVx,guideHy,
      pcvs,wscene,previewZone,
      sceneStyle,alertCardStyle,
      cardPos,compFor,
      addPanel,removePanel,
      doQuickDonate,doQuickTest,
      doTrigger,doTestLocal,
      saveAll,resetAll,copyObs,
      startDrag,startDragTouch,
      uploadIcon,uploadAImg,uploadASound,
    };
  }
}).mount('#app');
</script>
</body>
</html>

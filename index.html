<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SUPREME WIDGET V14 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --primary-purple: #7700ff;
  --primary-red: #ff0044;
  --gold: #ffd700;
  --silver: #e0e0e0;
  --bronze: #cd7f32;
  --bg-deep: #050505;
  --panel-dark: rgba(15, 15, 15, 0.7);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-highlight: rgba(255, 255, 255, 0.03);
  --text-dim: #777;
  --text-mid: #aaa;
  --text-bright: #fff;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --sidebar-w: 420px;
}
* { box-sizing: border-box; outline: none; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
body { font-family: 'Unbounded', sans-serif; background: transparent; color: var(--text-bright); overflow: hidden; -webkit-font-smoothing: antialiased; }

/* Liquid Glass Mixins */
.liquid-glass {
  background: var(--panel-dark);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  box-shadow: inset 0 0 20px var(--glass-highlight), 0 8px 32px rgba(0, 0, 0, 0.6);
}

.admin-shell { display: grid; grid-template-columns: var(--sidebar-w) 1fr; height: 100vh; background: var(--bg-deep); position: fixed; inset: 0; }
.sidebar { display: flex; flex-direction: column; background: #0a0a0a; border-right: 1px solid var(--glass-border); overflow: hidden; z-index: 10; }
.sidebar-head { padding: 20px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: #080808; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--primary-purple), var(--primary-red)); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; letter-spacing: -1px; box-shadow: 0 4px 15px rgba(119, 0, 255, 0.3); }
.logo-name { font-size: 14px; font-weight: 900; letter-spacing: 0.5px; }
.logo-name span { color: var(--primary-purple); }
.ver-tag { font-size: 9px; font-weight: 700; color: var(--text-dim); background: #111; padding: 4px 8px; border-radius: 20px; border: 1px solid var(--glass-border); }

.tabs { display: flex; gap: 4px; padding: 12px 20px; background: #080808; border-bottom: 1px solid var(--glass-border); flex-shrink: 0; overflow-x: auto; }
.tab { flex: 1; padding: 10px; border-radius: var(--radius-sm); font-family: 'Unbounded'; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border: none; cursor: pointer; transition: all .2s; color: var(--text-dim); background: transparent; white-space: nowrap; }
.tab.on { background: var(--primary-purple); color: #fff; box-shadow: 0 4px 15px rgba(119, 0, 255, 0.3); }
.tab:not(.on):hover { color: var(--text-bright); background: rgba(255,255,255,0.05); }

.sidebar-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

/* Form Controls */
.fg { display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }
.fr { display: flex; gap: 12px; }
.fr > * { flex: 1; }
label { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }
input[type=text], input[type=number], select, textarea { background: #0f0f0f; border: 1px solid var(--glass-border); color: var(--text-bright); padding: 12px; border-radius: var(--radius-sm); font-family: 'Unbounded'; font-size: 12px; width: 100%; transition: all .2s; }
textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
input:focus, select:focus, textarea:focus { border-color: var(--primary-purple); box-shadow: 0 0 0 2px rgba(119, 0, 255, 0.15); }
select option { background: #111; }
.rr { display: flex; align-items: center; gap: 10px; }
input[type=range] { flex: 1; accent-color: var(--primary-purple); cursor: pointer; height: 4px; background: #222; border-radius: 2px; border: none; }
.rv { font-size: 11px; color: var(--text-bright); min-width: 40px; text-align: right; font-variant-numeric: tabular-nums; background: #0f0f0f; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--glass-border); }
input[type=color] { width: 100%; height: 36px; border: 1px solid var(--glass-border); border-radius: var(--radius-sm); cursor: pointer; background: #000; padding: 2px; }
.cb-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
.cb-row label { text-transform: none; font-size: 11px; color: var(--text-bright); }
input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--primary-purple); cursor: pointer; }

/* Sections */
.sec-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #111; border: 1px solid var(--glass-border); border-radius: var(--radius-md); cursor: pointer; transition: all .2s; user-select: none; }
.sec-head:hover { background: #151515; border-color: #333; }
.sec-head.on { border-color: var(--primary-purple); background: rgba(119, 0, 255, 0.05); }
.sec-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-bright); }
.sec-chevron { font-size: 10px; color: var(--text-dim); transition: transform .2s; }
.sec-head.on .sec-chevron { transform: rotate(180deg); color: var(--primary-purple); }
.sec-body { padding: 16px; background: #0c0c0c; border: 1px solid var(--glass-border); border-top: none; border-radius: 0 0 var(--radius-md) var(--radius-md); display: flex; flex-direction: column; gap: 12px; margin-top: -8px; animation: fadeIn 0.2s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
.divider { height: 1px; background: var(--glass-border); width: 100%; margin: 8px 0; }
.sub-lbl { font-size: 11px; font-weight: 900; color: var(--text-bright); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.color-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.ci { display: flex; flex-direction: column; gap: 4px; font-size: 9px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; }

/* Buttons */
.btn { font-family: 'Unbounded'; text-transform: uppercase; font-weight: 900; border: none; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px; letter-spacing: 0.5px; border-radius: var(--radius-sm); }
.btn-primary { background: linear-gradient(135deg, var(--primary-purple), var(--primary-red)); color: #fff; padding: 16px; font-size: 12px; width: 100%; box-shadow: 0 4px 20px rgba(119, 0, 255, 0.25); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(119, 0, 255, 0.4); }
.btn-flat { background: #151515; color: var(--text-bright); padding: 12px; font-size: 10px; border: 1px solid var(--glass-border); width: 100%; }
.btn-flat:hover { background: #222; border-color: #444; }

/* OBS URLs */
.obs-url-card { background: #0a0a0a; border: 1px solid var(--glass-border); border-radius: var(--radius-md); padding: 16px; display: flex; flex-direction: column; gap: 12px; margin-top: auto; }
.obs-url-title { font-size: 10px; font-weight: 900; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
.obs-btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn-obs { background: #111; border: 1px solid var(--glass-border); color: var(--text-mid); padding: 12px 8px; border-radius: var(--radius-sm); font-family: 'Unbounded'; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: all .2s; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.btn-obs:hover { background: #1a1a1a; border-color: #333; color: var(--text-bright); }
.btn-obs.active { border-color: var(--primary-purple); background: rgba(119, 0, 255, 0.1); color: #fff; }
.btn-obs.copied { border-color: #00cc44 !important; color: #00cc44 !important; background: rgba(0, 204, 68, 0.1) !important; }
.btn-copy-url { background: #1a1a1a; border: 1px solid #333; color: var(--text-bright); padding: 12px; border-radius: var(--radius-sm); font-family: 'Unbounded'; font-size: 10px; font-weight: 700; cursor: pointer; transition: all .2s; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
.btn-copy-url.copied { border-color: #00cc44; color: #00cc44; background: rgba(0, 204, 68, 0.1); }

/* OBS Scenes & Widgets */
.obs-scene { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.preview-zone { background: radial-gradient(#151515 1px, transparent 1px); background-size: 24px 24px; position: relative; display: flex; align-items: center; justify-content: center; }
.pz-label { position: absolute; top: 20px; font-size: 10px; font-weight: 900; color: #333; text-transform: uppercase; letter-spacing: 2px; }

/* Goal Widget */
.goal-widget { position: relative; display: flex; flex-direction: column; gap: 12px; }
.goal-top { display: flex; justify-content: space-between; align-items: flex-end; }
.goal-title { font-weight: 900; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
.goal-amounts { font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
.prog-track { width: 100%; background: rgba(0, 0, 0, 0.6); overflow: hidden; border: 1px solid var(--glass-border); position: relative; box-shadow: inset 0 2px 10px rgba(0,0,0,0.8); }
.prog-fill { height: 100%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
.prog-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shimmer 2s infinite linear; }

/* Top Donors Widget */
.top-donors-widget { display: flex; flex-direction: column; gap: 10px; }
.top-title { font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; text-align: center; }
.top-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.top-item-left { display: flex; align-items: center; gap: 12px; }
.top-rank { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; background: rgba(0,0,0,0.5); }
.top-name { font-weight: 700; }
.top-amount { font-weight: 900; }

.rank-1 .top-rank { background: linear-gradient(135deg, var(--gold), #aa8800); color: #000; box-shadow: 0 0 15px rgba(255,215,0,0.4); }
.rank-1 { border-color: rgba(255,215,0,0.3); background: linear-gradient(90deg, rgba(255,215,0,0.05), transparent); }
.rank-2 .top-rank { background: linear-gradient(135deg, var(--silver), #888); color: #000; }
.rank-3 .top-rank { background: linear-gradient(135deg, var(--bronze), #8b4513); color: #fff; }

/* Alert Widget */
.alert-scene { display: flex; align-items: flex-end; justify-content: center; padding-bottom: 100px; }
.alert-card { display: flex; flex-direction: column; align-items: center; padding: 32px 48px; gap: 16px; text-align: center; min-width: 400px; max-width: 600px; overflow: hidden; transform-origin: bottom center; }
.a-label { font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; opacity: 0.8; }
.a-name { font-weight: 900; text-transform: uppercase; letter-spacing: 2px; line-height: 1.1; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.a-amount { font-weight: 900; line-height: 1; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.a-msg { font-weight: 700; line-height: 1.4; margin-top: 12px; max-width: 90%; word-wrap: break-word; }
.alert-enter-active { animation: alertIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
.alert-leave-active { animation: alertOut 0.5s ease-in both; }
@keyframes alertIn { 0% { transform: translateY(100px) scale(0.8); opacity: 0; filter: blur(10px); } 100% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); } }
@keyframes alertOut { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-50px) scale(0.9); opacity: 0; filter: blur(5px); } }
.glow-pulse { animation: glowPulse 2s ease-in-out infinite; }
@keyframes glowPulse { 0%, 100% { box-shadow: 0 0 30px var(--ac), inset 0 0 20px var(--glass-highlight); } 50% { box-shadow: 0 0 60px var(--ac), inset 0 0 40px rgba(255,255,255,0.1); } }

/* Music Idle */
.idle-music-text { font-family: 'Unbounded', sans-serif; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; text-align: center; white-space: pre-wrap; line-height: 1.3; background-size: 300% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: idleShimmer 3s linear infinite; z-index: 10; }
@keyframes idleShimmer { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

/* Mobile View adjustments */
.mobile-view { display: flex; flex-direction: column; height: 100dvh; background: var(--bg-deep); padding: 0; overflow: hidden; }
.mob-topbar { padding: 16px; background: #080808; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
.mob-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
.kaspi-paste-area { background: #0f0f0f; border: 2px dashed var(--primary-purple); border-radius: var(--radius-md); padding: 16px; color: #fff; font-size: 14px; min-height: 120px; width: 100%; resize: none; font-family: 'Unbounded'; transition: all 0.25s; }
.kaspi-paste-area:focus { border-style: solid; box-shadow: 0 0 20px rgba(119, 0, 255, 0.2); }
.mob-actions { padding: 16px; background: #080808; border-top: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 12px; }

@media(max-width:900px){ :root{--sidebar-w:100%;} .desktop-only { display: none !important; } }
@media(min-width:901px){ .mobile-only { display: none !important; } }
</style>
</head>
<body>

<div id="app">
  <div v-if="mode === 'goal'" class="obs-scene">
    <div class="liquid-glass goal-widget" :style="goalGlassStyle">
      <div class="goal-top">
        <span class="goal-title" :style="{fontSize: goalCfg.titleSize+'px', color: goalCfg.cText}">{{goalCfg.title}}</span>
        <span class="goal-amounts" :style="{fontSize: goalCfg.textSize+'px', color: goalCfg.cAccent}">{{formatNum(goalCfg.current)}} ₸ / {{formatNum(goalCfg.max)}} ₸</span>
      </div>
      <div class="prog-track" :style="{height: goalCfg.barHeight+'px', borderRadius: goalCfg.radius+'px'}">
        <div class="prog-fill" :style="{width: goalPct+'%', background: 'linear-gradient(90deg, '+goalCfg.cBar1+', '+goalCfg.cBar2+')', borderRadius: goalCfg.radius+'px'}"></div>
      </div>
    </div>
  </div>

  <div v-else-if="mode === 'top'" class="obs-scene">
    <div class="liquid-glass top-donors-widget" :style="topGlassStyle">
      <div class="top-title" :style="{fontSize: topCfg.titleSize+'px', color: topCfg.cText}">{{topCfg.title}}</div>
      <div v-for="(d, i) in topDonorsFiltered" :key="d.name+i" class="top-item" :class="`rank-${i+1}`" :style="{borderRadius: topCfg.radius+'px'}">
        <div class="top-item-left">
          <div class="top-rank">{{i+1}}</div>
          <div class="top-name" :style="{fontSize: topCfg.textSize+'px', color: topCfg.cText}">{{d.name}}</div>
        </div>
        <div class="top-amount" :style="{fontSize: topCfg.textSize+'px', color: topCfg.cAccent}">{{formatNum(d.amount)}} ₸</div>
      </div>
    </div>
  </div>

  <div v-else-if="mode === 'music'" class="obs-scene">
    <div class="idle-music-text" :style="idleTextStyle">{{ musicCfg.idleText }}</div>
    <div id="yt-music-widget" style="position:absolute; width:1px; height:1px; opacity:0; pointer-events:none;"></div>
  </div>

  <div v-else-if="mode === 'alert'" class="obs-scene alert-scene">
    <transition name="alert">
      <div v-if="alertVis" class="liquid-glass alert-card glow-pulse" :style="alertCardStyle">
        <div class="a-label" :style="{color: alertCfg.labelColor}">{{alertCfg.labelText}}</div>
        <div class="a-name" :style="{color: alertCfg.nameColor, fontSize: alertCfg.nameFontSize+'px'}">{{curDonation.name}}</div>
        <div class="a-amount" :style="{color: alertCfg.amountColor, fontSize: alertCfg.amountFontSize+'px'}">{{formatNum(curDonation.amount)}} ₸</div>
        <div v-if="curDonation.msg" class="a-msg" :style="{color: alertCfg.msgColor, fontSize: alertCfg.msgFontSize+'px'}">{{curDonation.msg}}</div>
      </div>
    </transition>
  </div>

  <div v-else class="admin-shell">
    
    <div v-if="isMobile" class="mobile-view mobile-only">
      <div class="mob-topbar">
        <div class="logo-name">WIDGET <span>PRO</span></div>
        <div class="ver-tag">v14</div>
      </div>
      <div class="mob-scroll">
        <textarea class="kaspi-paste-area" v-model="kaspiPaste" @input="handleKaspiPaste" placeholder="📋 Вставь текст чека Kaspi сюда..."></textarea>
        
        <div class="liquid-glass" style="padding:16px; border-radius:var(--radius-md);" v-if="quickName || quickAmount">
          <div class="fg"><label>Имя</label><input type="text" v-model="quickName"></div>
          <div class="fg"><label>Сумма</label><input type="number" v-model.number="quickAmount"></div>
          <div class="fg"><label>Сообщение</label><textarea v-model="quickMessage"></textarea></div>
        </div>
      </div>
      <div class="mob-actions">
        <button class="btn btn-primary" @click="doQuickDonate" :disabled="!quickName && !quickAmount">🚀 ОТПРАВИТЬ ДОНАТ</button>
      </div>
    </div>

    <template v-else>
      <div class="sidebar desktop-only">
        <div class="sidebar-head">
          <div class="logo"><div class="logo-mark">W</div><div class="logo-name">WIDGET <span>PRO</span></div></div>
          <div class="ver-tag">v14 PRO</div>
        </div>
        <div class="tabs">
          <button class="tab" :class="{on:tab==='goal'}" @click="tab='goal'">🎯 Цель</button>
          <button class="tab" :class="{on:tab==='top'}" @click="tab='top'">🏆 Топ</button>
          <button class="tab" :class="{on:tab==='music'}" @click="tab='music'">🎵 Музыка</button>
          <button class="tab" :class="{on:tab==='alert'}" @click="tab='alert'">🎉 Alert</button>
        </div>

        <div class="sidebar-body">
          <template v-if="tab==='goal'">
            <div class="liquid-glass" style="padding: 16px; border-radius: var(--radius-md); margin-bottom: 10px;">
              <div class="sub-lbl" style="margin-bottom: 12px;">Ручная отправка доната</div>
              <div class="fr">
                <div class="fg"><label>Имя</label><input type="text" v-model="quickName" placeholder="Иван"></div>
                <div class="fg"><label>Сумма</label><input type="number" v-model.number="quickAmount" placeholder="500"></div>
              </div>
              <div class="fg"><label>Сообщение</label><textarea v-model="quickMessage" placeholder="Текст" style="min-height:40px"></textarea></div>
              <button class="btn btn-primary" style="margin-top: 8px; padding: 12px; font-size:10px;" @click="doQuickDonate">▶ ЗАПУСТИТЬ</button>
            </div>

            <div class="sec-head on"><div class="sec-name">Настройки Сбора</div></div>
            <div class="sec-body">
              <div class="fg"><label>Заголовок</label><input type="text" v-model="goalCfg.title"></div>
              <div class="fr">
                <div class="fg"><label>Текущая сумма</label><input type="number" v-model.number="goalCfg.current"></div>
                <div class="fg"><label>Цель</label><input type="number" v-model.number="goalCfg.max"></div>
              </div>
              <div class="divider"></div>
              <div class="sub-lbl">Внешний вид (Ширина окна в OBS задает размер)</div>
              <div class="fr">
                <div class="fg"><label>Размер заголовка</label><div class="rr"><input type="range" min="12" max="72" v-model.number="goalCfg.titleSize"><span class="rv">{{goalCfg.titleSize}}</span></div></div>
                <div class="fg"><label>Размер цифр</label><div class="rr"><input type="range" min="12" max="72" v-model.number="goalCfg.textSize"><span class="rv">{{goalCfg.textSize}}</span></div></div>
              </div>
              <div class="fr">
                <div class="fg"><label>Высота полосы</label><div class="rr"><input type="range" min="4" max="40" v-model.number="goalCfg.barHeight"><span class="rv">{{goalCfg.barHeight}}</span></div></div>
                <div class="fg"><label>Скругление</label><div class="rr"><input type="range" min="0" max="40" v-model.number="goalCfg.radius"><span class="rv">{{goalCfg.radius}}</span></div></div>
              </div>
              <div class="divider"></div>
              <div class="sub-lbl">Цвета</div>
              <div class="color-grid">
                <div class="ci"><span>Текст</span><input type="color" v-model="goalCfg.cText"></div>
                <div class="ci"><span>Акцент (цифры)</span><input type="color" v-model="goalCfg.cAccent"></div>
                <div class="ci"><span>Градиент 1</span><input type="color" v-model="goalCfg.cBar1"></div>
                <div class="ci"><span>Градиент 2</span><input type="color" v-model="goalCfg.cBar2"></div>
              </div>
            </div>
          </template>

          <template v-if="tab==='top'">
            <div class="sec-head on"><div class="sec-name">Настройки Топа Донатеров</div></div>
            <div class="sec-body">
              <div class="fg"><label>Заголовок</label><input type="text" v-model="topCfg.title"></div>
              <div class="fg"><label>Количество мест для вывода</label><div class="rr"><input type="range" min="3" max="10" v-model.number="topCfg.placesCount"><span class="rv">{{topCfg.placesCount}}</span></div></div>
              <div class="divider"></div>
              <div class="fr">
                <div class="fg"><label>Размер заголовка</label><div class="rr"><input type="range" min="12" max="72" v-model.number="topCfg.titleSize"><span class="rv">{{topCfg.titleSize}}</span></div></div>
                <div class="fg"><label>Размер текста</label><div class="rr"><input type="range" min="10" max="40" v-model.number="topCfg.textSize"><span class="rv">{{topCfg.textSize}}</span></div></div>
              </div>
              <div class="fg"><label>Скругление элементов</label><div class="rr"><input type="range" min="0" max="30" v-model.number="topCfg.radius"><span class="rv">{{topCfg.radius}}</span></div></div>
              <div class="divider"></div>
              <div class="color-grid">
                <div class="ci"><span>Текст</span><input type="color" v-model="topCfg.cText"></div>
                <div class="ci"><span>Акцент (суммы)</span><input type="color" v-model="topCfg.cAccent"></div>
              </div>
              <div class="divider"></div>
              <div class="fg"><label>Ручное редактирование списка</label><textarea v-model="topCfg.donorsRaw" placeholder="Иван - 5000&#10;Алексей - 3000"></textarea></div>
            </div>
          </template>

          <template v-if="tab==='music'">
            <div class="sec-head on"><div class="sec-name">Текст в режиме ожидания (OBS)</div></div>
            <div class="sec-body">
              <div class="fg"><label>Текст</label><textarea v-model="musicCfg.idleText" style="min-height:50px;"></textarea></div>
              <div class="fg"><label>Размер шрифта</label><div class="rr"><input type="range" min="20" max="120" v-model.number="musicCfg.idleSize"><span class="rv">{{musicCfg.idleSize}}</span></div></div>
              <div class="divider"></div>
              <div class="color-grid">
                <div class="ci"><span>Градиент 1</span><input type="color" v-model="musicCfg.idleColor1"></div>
                <div class="ci"><span>Градиент 2</span><input type="color" v-model="musicCfg.idleColor2"></div>
                <div class="ci"><span>Градиент 3</span><input type="color" v-model="musicCfg.idleColor3"></div>
              </div>
            </div>
          </template>

          <template v-if="tab==='alert'">
            <div class="sec-head on"><div class="sec-name">Визуал Алерта</div></div>
            <div class="sec-body">
              <div class="fr">
                <div class="fg"><label>Метка</label><input type="text" v-model="alertCfg.labelText"></div>
                <div class="fg"><label>Длительность (сек)</label><input type="number" v-model.number="alertCfg.duration"></div>
              </div>
              <div class="divider"></div>
              <div class="color-grid">
                <div class="ci"><span>Цвет Метки</span><input type="color" v-model="alertCfg.labelColor"></div>
                <div class="ci"><span>Цвет Имени</span><input type="color" v-model="alertCfg.nameColor"></div>
                <div class="ci"><span>Цвет Суммы (и свечения)</span><input type="color" v-model="alertCfg.amountColor"></div>
                <div class="ci"><span>Цвет Сообщения</span><input type="color" v-model="alertCfg.msgColor"></div>
              </div>
            </div>

            <div class="sec-head on" style="margin-top: 10px;"><div class="sec-name">Звук и Озвучка (Играет в OBS)</div></div>
            <div class="sec-body">
              <div class="cb-row"><label>Включить звук уведомления</label><input type="checkbox" v-model="alertCfg.soundEnabled"></div>
              <div class="fg" v-if="alertCfg.soundEnabled">
                <label>Тип звука</label>
                <select v-model="alertCfg.soundType">
                  <option value="cash">💰 Cash (Касса)</option>
                  <option value="chime">🎵 Chime (Колокольчики)</option>
                  <option value="ding">🔔 Ding (Дзинь)</option>
                </select>
              </div>
              <div class="divider"></div>
              <div class="cb-row"><label>Включить озвучку текста (TTS)</label><input type="checkbox" v-model="alertCfg.ttsEnabled"></div>
              <div class="fg" v-if="alertCfg.ttsEnabled">
                <label>Выбор голоса</label>
                <select v-model="alertCfg.ttsVoiceURI">
                  <option value="">Автоматический выбор (Русский)</option>
                  <option v-for="v in availableVoices" :key="v.voiceURI" :value="v.voiceURI">{{v.name}}</option>
                </select>
              </div>
            </div>
          </template>

          <div class="obs-url-card">
            <div class="obs-url-title">📡 Ссылки для OBS</div>
            <div class="obs-btn-grid">
              <button class="btn-obs" :class="{active: tab==='goal'}" @click="copyObs('goal')">🎯 Цель</button>
              <button class="btn-obs" :class="{active: tab==='top'}" @click="copyObs('top')">🏆 Топ</button>
              <button class="btn-obs" :class="{active: tab==='music'}" @click="copyObs('music')">🎵 Музыка</button>
              <button class="btn-obs" :class="{active: tab==='alert'}" @click="copyObs('alert')">🎉 Алерт</button>
            </div>
            <button class="btn-primary" style="margin-top:8px; padding: 12px; background: #111; color:var(--text-bright); box-shadow:none; border:1px solid var(--glass-border);" @click="saveAll">💾 СОХРАНИТЬ ВСЁ</button>
          </div>
        </div>
      </div>

      <div class="preview-zone desktop-only">
        <div class="pz-label">ПРЕВЬЮ (100% размер)</div>
        
        <div v-if="tab==='goal'" style="width: 500px;">
          <div class="liquid-glass goal-widget" :style="{padding:'24px', borderRadius: goalCfg.radius+'px'}">
            <div class="goal-top">
              <span class="goal-title" :style="{fontSize: goalCfg.titleSize+'px', color: goalCfg.cText}">{{goalCfg.title}}</span>
              <span class="goal-amounts" :style="{fontSize: goalCfg.textSize+'px', color: goalCfg.cAccent}">{{formatNum(goalCfg.current)}} ₸ / {{formatNum(goalCfg.max)}} ₸</span>
            </div>
            <div class="prog-track" :style="{height: goalCfg.barHeight+'px', borderRadius: goalCfg.radius+'px'}">
              <div class="prog-fill" :style="{width: goalPct+'%', background: 'linear-gradient(90deg, '+goalCfg.cBar1+', '+goalCfg.cBar2+')', borderRadius: goalCfg.radius+'px'}"></div>
            </div>
          </div>
        </div>

        <div v-else-if="tab==='top'" style="width: 400px;">
          <div class="liquid-glass top-donors-widget" :style="{padding:'20px', borderRadius: topCfg.radius+'px'}">
            <div class="top-title" :style="{fontSize: topCfg.titleSize+'px', color: topCfg.cText}">{{topCfg.title}}</div>
            <div v-for="(d, i) in topDonorsFiltered" :key="d.name+i" class="top-item" :class="`rank-${i+1}`" :style="{borderRadius: topCfg.radius+'px'}">
              <div class="top-item-left">
                <div class="top-rank">{{i+1}}</div>
                <div class="top-name" :style="{fontSize: topCfg.textSize+'px', color: topCfg.cText}">{{d.name}}</div>
              </div>
              <div class="top-amount" :style="{fontSize: topCfg.textSize+'px', color: topCfg.cAccent}">{{formatNum(d.amount)}} ₸</div>
            </div>
          </div>
        </div>

        <div v-else-if="tab==='music'">
          <div class="idle-music-text" :style="idleTextStyle">{{ musicCfg.idleText }}</div>
        </div>
      </div>
    </template>
  </div>
</div>

<script>
const { createApp, reactive, computed, ref, onMounted, watch } = Vue;

const FB_CFG = { apiKey: "AIzaSyDuxR5hsWmfIWrjgrsU4zVEnIVppUZxNNU", databaseURL: "https://tt-widget-88711-default-rtdb.firebaseio.com", projectId: "tt-widget-88711" };
let db = null; try { firebase.initializeApp(FB_CFG); db = firebase.database(); } catch(e){}

function hexToRgb(h){ let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return `${r},${g},${b}`; }
function cleanNum(v){ return Math.round(parseFloat(String(v).replace(/\s/g,'').replace(/[^\d.]/g,'')) || 0); }

createApp({
  setup() {
    const urlMode = new URLSearchParams(location.search).get('mode');
    const mode = ref(urlMode || 'admin');
    const tab = ref('goal');
    const isMobile = ref(mode.value === 'admin' && window.innerWidth <= 900);
    window.addEventListener('resize', () => { if(mode.value === 'admin') isMobile.value = window.innerWidth <= 900; });

    // Kaspi
    const kaspiPaste = ref('');
    const quickName = ref(''); const quickAmount = ref(''); const quickMessage = ref('');

    // State Objects
    const goalCfg = reactive({ title: 'ЦЕЛЬ СТРИМА', current: 0, max: 50000, titleSize: 16, textSize: 14, barHeight: 16, radius: 14, cText: '#ffffff', cAccent: '#ffd700', cBar1: '#7700ff', cBar2: '#ff0044' });
    const topCfg = reactive({ title: 'ТОП ДОНАТЕРОВ', placesCount: 5, titleSize: 16, textSize: 14, radius: 10, cText: '#ffffff', cAccent: '#ffd700', donorsRaw: '' });
    const musicCfg = reactive({ idleText: 'ЗАКАЗ МУЗЫКИ 250', idleSize: 36, idleColor1: '#ff0088', idleColor2: '#00c2ff', idleColor3: '#ffd700' });
    const alertCfg = reactive({ labelText: 'НОВЫЙ ДОНАТ!', duration: 7, labelColor: '#aaaaaa', nameColor: '#ffffff', amountColor: '#ffd700', msgColor: '#ffffff', nameFontSize: 32, amountFontSize: 48, msgFontSize: 24, soundEnabled: true, soundType: 'cash', ttsEnabled: true, ttsVoiceURI: '' });

    const alertVis = ref(false); const curDonation = reactive({name:'',amount:'', msg:''}); let alertTimer = null;
    const availableVoices = ref([]);

    const goalPct = computed(() => { const c = goalCfg.current || 0; const m = goalCfg.max || 1; return Math.min(100, Math.round(c/m*100)); });
    
    const parsedDonors = computed(() => {
        let lines = (topCfg.donorsRaw || '').split(/[\n]+/).map(s => s.trim()).filter(Boolean);
        let list = [];
        lines.forEach(line => {
            let parts = line.split(/[-—–]/);
            if(parts.length >= 2) list.push({ name: parts[0].trim(), amount: cleanNum(parts.slice(1).join('')) });
            else list.push({ name: line, amount: 0 });
        });
        return list.sort((a,b) => b.amount - a.amount);
    });

    const topDonorsFiltered = computed(() => parsedDonors.value.slice(0, topCfg.placesCount));

    const goalGlassStyle = computed(() => ({ padding: '24px', borderRadius: goalCfg.radius+'px', width: '100%', height: '100%' }));
    const topGlassStyle = computed(() => ({ padding: '20px', borderRadius: topCfg.radius+'px', width: '100%', height: '100%' }));
    const idleTextStyle = computed(() => ({ fontSize: musicCfg.idleSize+'px', backgroundImage: `linear-gradient(90deg, ${musicCfg.idleColor1} 0%, ${musicCfg.idleColor2} 33%, ${musicCfg.idleColor3} 66%, ${musicCfg.idleColor1} 100%)` }));
    const alertCardStyle = computed(() => ({ '--ac': `rgba(${hexToRgb(alertCfg.amountColor)}, 0.5)`, borderRadius: '24px' }));

    function formatNum(n) { return Number(n).toLocaleString('ru'); }

    // Logic
    function handleKaspiPaste() {
        const txt = kaspiPaste.value; if (!txt) return;
        let name = ''; let amt = 0; let msg = '';
        const lines = txt.split('\n').map(l => l.trim()).filter(Boolean);
        
        lines.forEach((l, i) => {
            if (l.includes('₸') || l.match(/^[\+\-]?\s*\d[\d\s]*$/)) {
                const pAmt = parseInt(l.replace(/[^\d]/g, ''));
                if (pAmt > 0 && amt === 0) amt = pAmt;
            }
            if (l.toLowerCase().startsWith('от ')) name = l.substring(3).trim();
            else if (l.toLowerCase().includes('имя отправителя')) name = lines[i+1] ? lines[i+1].trim() : '';
            
            if (l.toLowerCase().startsWith('сообщение:')) msg = l.substring(10).trim();
            else if (l.toLowerCase() === 'сообщение' && lines[i+1]) msg = lines[i+1].trim();
        });

        if (amt) quickAmount.value = amt; if (name) quickName.value = name; if (msg) quickMessage.value = msg;
    }

    function doQuickDonate() {
        const name = quickName.value.trim() || 'Аноним'; const amt = cleanNum(quickAmount.value);
        if(!amt) return;
        
        // Update Goal
        goalCfg.current += amt; if(goalCfg.current >= goalCfg.max) goalCfg.current = goalCfg.max;
        
        // Update Top Donors
        let existing = parsedDonors.value.find(d => d.name.toLowerCase() === name.toLowerCase());
        let updatedList = [...parsedDonors.value];
        if(existing) existing.amount += amt; else updatedList.push({name, amount: amt});
        updatedList.sort((a,b)=>b.amount - a.amount);
        topCfg.donorsRaw = updatedList.map(d => `${d.name} - ${d.amount}`).join('\n');

        if(db) {
            db.ref('goal').set(JSON.parse(JSON.stringify(goalCfg)));
            db.ref('top').set(JSON.parse(JSON.stringify(topCfg)));
            db.ref('alertTrig').set({ name, amount: amt, msg: quickMessage.value, ts: Date.now() });
        }
        quickName.value=''; quickAmount.value=''; quickMessage.value=''; kaspiPaste.value='';
    }

    function playAudioFx() {
        if(mode.value !== 'alert' || !alertCfg.soundEnabled) return;
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const type = alertCfg.soundType || 'cash';
            if (type === 'cash') {
                [[1200, 0, 0.08], [900, 0.09, 0.06], [1500, 0.18, 0.05]].forEach(([freq, delay, dur]) => {
                    const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = 'square'; osc.frequency.value = freq; const t = ctx.currentTime + delay;
                    gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.1, t + 0.01); gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
                    osc.start(t); osc.stop(t + dur + 0.02);
                });
            } else if (type === 'chime') {
                [[523.25, 0], [659.25, 0.13], [783.99, 0.26], [1046.5, 0.39]].forEach(([freq, delay]) => {
                    const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = 'sine'; osc.frequency.value = freq; const t = ctx.currentTime + delay;
                    gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.3, t + 0.04); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.75);
                    osc.start(t); osc.stop(t + 0.8);
                });
            } else if(type === 'ding') {
                const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.value = 880; gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.02); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
                osc.start(); osc.stop(ctx.currentTime + 1.6);
            }
        } catch(e) {}
    }

    function playTTS(text) {
        if(mode.value !== 'alert' || !alertCfg.ttsEnabled || !text) return;
        let cleanText = text.replace(/https?:\/\/\S+/gi, '').trim(); if(!cleanText) return;
        const u = new SpeechSynthesisUtterance(cleanText); u.lang = 'ru-RU'; u.volume = 1;
        if(alertCfg.ttsVoiceURI) {
            const voices = window.speechSynthesis.getVoices();
            const targetVoice = voices.find(v => v.voiceURI === alertCfg.ttsVoiceURI);
            if(targetVoice) u.voice = targetVoice;
        }
        window.speechSynthesis.speak(u);
    }

    function triggerAlertOBS(name, amt, msg) {
        curDonation.name = name; curDonation.amount = amt; curDonation.msg = msg;
        alertVis.value = true;
        clearTimeout(alertTimer);
        alertTimer = setTimeout(()=>alertVis.value=false, (alertCfg.duration)*1000);
        playAudioFx();
        setTimeout(() => playTTS(msg), 500); // Slight delay for TTS
    }

    function saveAll() {
        if(db) {
            db.ref('goal').set(JSON.parse(JSON.stringify(goalCfg)));
            db.ref('top').set(JSON.parse(JSON.stringify(topCfg)));
            db.ref('music').set(JSON.parse(JSON.stringify(musicCfg)));
            db.ref('alertCfg').set(JSON.parse(JSON.stringify(alertCfg)));
            alert('Сохранено в базу!');
        }
    }

    function copyObs(type) {
        const url = `${location.href.split('?')[0]}?mode=${type}`;
        navigator.clipboard.writeText(url).then(() => alert('Ссылка для OBS скопирована!'));
    }

    onMounted(() => {
        // Load Voices
        if (window.speechSynthesis) {
            const loadV = () => { availableVoices.value = window.speechSynthesis.getVoices().filter(v => v.lang.includes('ru')); };
            window.speechSynthesis.onvoiceschanged = loadV; loadV();
        }

        if(db) {
            if(mode.value === 'admin') {
                db.ref('goal').once('value', s => { if(s.val()) Object.assign(goalCfg, s.val()); });
                db.ref('top').once('value', s => { if(s.val()) Object.assign(topCfg, s.val()); });
                db.ref('music').once('value', s => { if(s.val()) Object.assign(musicCfg, s.val()); });
                db.ref('alertCfg').once('value', s => { if(s.val()) Object.assign(alertCfg, s.val()); });
            } else {
                // OBS Listeners
                if(mode.value === 'goal') db.ref('goal').on('value', s => { if(s.val()) Object.assign(goalCfg, s.val()); });
                if(mode.value === 'top') db.ref('top').on('value', s => { if(s.val()) Object.assign(topCfg, s.val()); });
                if(mode.value === 'music') db.ref('music').on('value', s => { if(s.val()) Object.assign(musicCfg, s.val()); });
                if(mode.value === 'alert') {
                    db.ref('alertCfg').on('value', s => { if(s.val()) Object.assign(alertCfg, s.val()); });
                    let firstLoad = true;
                    db.ref('alertTrig').on('value', s => {
                        if(firstLoad) { firstLoad=false; return; }
                        const d = s.val(); if(d) triggerAlertOBS(d.name, d.amount, d.msg);
                    });
                }
            }
        }
    });

    return { mode, tab, isMobile, kaspiPaste, handleKaspiPaste, quickName, quickAmount, quickMessage, doQuickDonate, goalCfg, topCfg, musicCfg, alertCfg, goalPct, parsedDonors, topDonorsFiltered, alertVis, curDonation, availableVoices, goalGlassStyle, topGlassStyle, idleTextStyle, alertCardStyle, formatNum, saveAll, copyObs };
  }
}).mount('#app');
</script>
</body>
</html>

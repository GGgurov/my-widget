<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SUPREME WIDGET V12 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --gold: #ffd700;
  --silver: #c8c8c8;
  --bronze: #cd7f32;
  --red: #ff0044;
  --bg: #080808;
  --panel: #111111;
  --border: #1e1e1e;
  --border-hi: #2e2e2e;
  --text-dim: #555;
  --text-mid: #888;
  --text: #cccccc;
  --text-bright: #ffffff;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --sidebar-w: 420px;
  --tenge: #00c2ff;
}
*{box-sizing:border-box;outline:none;margin:0;padding:0;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#222;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#333;}
body{font-family:'Unbounded',sans-serif;background:transparent;color:var(--text-bright);overflow:hidden;}
.admin-shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;background:var(--bg);position:fixed;inset:0;}
.sidebar{display:flex;flex-direction:column;background:var(--panel);border-right:1px solid var(--border);overflow:hidden;}
.sidebar-head{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--red),#880022);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;letter-spacing:-1px;}
.logo-name{font-size:13px;font-weight:900;letter-spacing:0.5px;}
.logo-name span{color:var(--red);}
.ver-tag{font-size:9px;font-weight:700;color:var(--text-dim);background:#151515;padding:3px 7px;border-radius:20px;border:1px solid var(--border);letter-spacing:0.5px;}
.tabs{display:flex;gap:3px;padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:8px 6px;border-radius:var(--radius-sm);font-family:'Unbounded';font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;border:none;cursor:pointer;transition:all .2s;color:var(--text-dim);background:transparent;}
.tab.on{background:var(--red);color:#fff;box-shadow:0 2px 10px rgba(255,0,68,.3);}
.tab:not(.on):hover{color:var(--text);background:#1a1a1a;}
.sidebar-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.donate-form-card{background:linear-gradient(135deg,#0d0007,#07000d);border:1px solid rgba(255,0,68,.25);border-radius:var(--radius-lg);padding:16px;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden;}
.donate-form-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top left,rgba(255,0,68,.07),transparent 60%);pointer-events:none;}
.donate-form-title{display:flex;align-items:center;gap:8px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#fff;}
.donate-form-title .dft-icon{width:22px;height:22px;border-radius:6px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:11px;}
.donate-input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:end;}
.donate-amount-wrap{position:relative;}
.donate-amount-wrap input{padding-right:36px !important;}
.tenge-badge{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:14px;font-weight:900;color:var(--tenge);pointer-events:none;line-height:1;}
.donate-name-input{width:100%;}
.donate-btn-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.live-preview-strip{background:#0a0a0a;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.lp-label{font-size:8px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.lp-value{font-size:12px;font-weight:900;color:var(--tenge);}
.lp-name{font-size:10px;font-weight:700;color:var(--text);}
.lp-sep{width:1px;height:24px;background:var(--border);}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:#151515;border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;transition:all .2s;user-select:none;}
.sec-head:hover{background:#1a1a1a;border-color:var(--border-hi);}
.sec-head.on{border-color:var(--red);background:#150007;}
.sec-head-l{display:flex;align-items:center;gap:9px;}
.sec-dot{width:18px;height:18px;border-radius:50%;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:var(--text-dim);flex-shrink:0;}
.sec-head.on .sec-dot{background:var(--red);color:#fff;}
.sec-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text);}
.sec-head.on .sec-name{color:#fff;}
.sec-chevron{font-size:9px;color:var(--text-dim);transition:transform .2s;}
.sec-head.on .sec-chevron{transform:rotate(180deg);}
.sec-body{padding:13px;background:#0c0c0c;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-md) var(--radius-md);display:flex;flex-direction:column;gap:11px;animation:fadeIn 0.2s ease-out;}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
.fg{display:flex;flex-direction:column;gap:5px;}
.fr{display:flex;gap:9px;}
.fr > *{flex:1;}
label,.lbl{font-size:9px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;}
input[type=text],input[type=number],select,textarea{background:#080808;border:1px solid var(--border);color:var(--text-bright);padding:9px 11px;border-radius:var(--radius-sm);font-family:'Unbounded';font-size:11px;width:100%;transition:border-color .2s,box-shadow .2s;}
textarea{resize:vertical;min-height:54px;line-height:1.5;}
input:focus,select:focus,textarea:focus{border-color:var(--red);box-shadow:0 0 0 2px rgba(255,0,68,.1);}
select option{background:#111;}
.rr{display:flex;align-items:center;gap:8px;}
input[type=range]{flex:1;accent-color:var(--red);cursor:pointer;height:3px;background:var(--border);border-radius:2px;border:none;padding:0;}
.rv{font-size:10px;color:var(--text-bright);min-width:34px;text-align:right;font-variant-numeric:tabular-nums;background:#080808;padding:3px 6px;border-radius:4px;border:1px solid var(--border);}
.color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.ci{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:8px;color:var(--text-dim);font-weight:700;text-transform:uppercase;}
input[type=color]{width:100%;height:30px;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:#000;padding:2px;}
.cb-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
.cb-row label{font-size:10px;color:var(--text);font-weight:700;text-transform:none;letter-spacing:0;}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--red);cursor:pointer;}
.divider{height:1px;background:var(--border);width:100%;margin:3px 0;}
.sub-lbl{font-size:10px;font-weight:900;color:var(--text-bright);text-transform:uppercase;letter-spacing:.5px;}
.btn{font-family:'Unbounded';text-transform:uppercase;font-weight:700;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:.3px;}
.btn-red{background:linear-gradient(135deg,#ff0044,#cc0034);color:#fff;padding:15px;border-radius:var(--radius-md);font-size:12px;font-weight:900;width:100%;box-shadow:0 4px 15px rgba(255,0,68,.2);}
.btn-red:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(255,0,68,.35);}
.btn-tenge{background:linear-gradient(135deg,#0088cc,#005588);color:#fff;padding:13px 16px;border-radius:var(--radius-md);font-size:11px;font-weight:900;width:100%;box-shadow:0 4px 15px rgba(0,194,255,.2);}
.btn-tenge:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,194,255,.35);}
.btn-tenge:active{transform:scale(.97);}
.btn-green{background:linear-gradient(135deg,#00aa44,#007730);color:#fff;padding:12px;border-radius:var(--radius-sm);font-size:10px;width:100%;box-shadow:0 2px 10px rgba(0,170,68,.2);}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,170,68,.3);}
.btn-purple{background:linear-gradient(135deg,#7700ff,#5500cc);color:#fff;padding:12px;border-radius:var(--radius-sm);font-size:10px;width:100%;box-shadow:0 2px 10px rgba(119,0,255,.2);}
.btn-purple:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(119,0,255,.3);}
.btn-ghost{background:transparent;color:var(--text-mid);padding:10px;border-radius:var(--radius-sm);font-size:9px;flex:1;border:1px dashed var(--border-hi);}
.btn-ghost:hover{background:#151515;color:var(--text);border-color:#444;}
.btn-flat{background:#151515;color:var(--text);padding:11px;border-radius:var(--radius-sm);font-size:10px;border:1px solid var(--border);}
.btn-flat:hover{background:#1c1c1c;border-color:var(--border-hi);}
.btn-del{background:rgba(255,0,0,.07);color:#ff4444;padding:5px 8px;border-radius:5px;font-size:8px;border:1px solid rgba(255,0,0,.15);}
.btn-del:hover{background:#ff4444;color:#fff;}
.btn-add-panel{background:#151515;color:var(--text);padding:11px;border-radius:var(--radius-sm);font-size:10px;flex:1;border:1px solid var(--border);transition: all 0.2s;}
.btn-add-panel:hover{background:#1c1c1c; transform: translateY(-1px);}
.actions{display:flex;flex-direction:column;gap:8px;padding:12px;border-top:1px solid var(--border);flex-shrink:0;}
.file-wrap{position:relative;overflow:hidden;display:inline-block;width:100%;}
.file-wrap input[type=file]{font-size:100px;position:absolute;left:0;top:0;opacity:0;cursor:pointer;height:100%;width:100%;}
.file-btn{background:#080808;border:1px solid var(--border);color:var(--text-mid);padding:9px 11px;border-radius:var(--radius-sm);font-size:10px;width:100%;text-align:center;font-family:'Unbounded';font-weight:700;text-transform:uppercase;letter-spacing:.3px;transition:all .2s;cursor:pointer;}
.file-wrap:hover .file-btn{border-color:var(--red);color:var(--text-bright);}
.file-ok{font-size:9px;color:#00cc44;margin-top:3px;font-weight:700;}
.file-err{font-size:9px;color:#ff4444;margin-top:3px;font-weight:700;}
.preview-zone{position:relative;background:#0a0a0a;background-image:radial-gradient(#1c1c1c 1px,transparent 1px);background-size:22px 22px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.pz-label{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:#222;text-transform:uppercase;letter-spacing:1.5px;pointer-events:none;z-index:5;white-space:nowrap;}
.pz-mode{position:absolute;top:14px;right:16px;font-size:8px;font-weight:700;color:#1e1e1e;text-transform:uppercase;letter-spacing:1px;pointer-events:none;z-index:5;}
.widget-scene{position:relative;width:100%;height:100%;transform-origin:center center;}
.static-panel{position:absolute;z-index:10;transition: top 0.3s ease, left 0.3s ease;}
.static-panel.sel .glass{outline:1.5px solid rgba(0,255,180,.7);outline-offset:4px;}

.glass{
  position:relative;
  width:100%;
  height:100%;
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.07);
  box-shadow: inset 0 0 20px rgba(255,255,255,.02), 0 8px 32px rgba(0,0,0,.6);
  overflow:hidden;
  transition: all 0.3s ease;
}
.goal-wrap{display:flex;flex-direction:column;width:100%;height:100%;}
.goal-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap;gap:4px;}
.prog-track{width:100%;background:rgba(0,0,0,.6);overflow:hidden;border:1px solid rgba(255,255,255,.05);position:relative;box-shadow: inset 0 2px 10px rgba(0,0,0,.5);}
.prog-fill{height:100%;transition:width .8s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.prog-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2.5s infinite linear;}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
.ld-section{margin-top:13px;}
.ld-label{display:inline-flex;align-items:center;gap:5px;font-weight:900;text-transform:uppercase;letter-spacing:2px;padding:4px 10px;border-radius:20px;margin-bottom:8px;white-space:nowrap;}
.donor-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px;}
.donor-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.04); transition: transform 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2);}
.rk-1{background:linear-gradient(90deg,rgba(255,215,0,.15),transparent) !important;border-color:rgba(255,215,0,.3) !important;color:var(--gold) !important;font-weight:900;}
.rk-2{background:linear-gradient(90deg,rgba(200,200,200,.08),transparent) !important;border-color:rgba(200,200,200,.2) !important;color:var(--silver) !important;}
.rk-3{background:linear-gradient(90deg,rgba(205,127,50,.08),transparent) !important;border-color:rgba(205,127,50,.2) !important;color:var(--bronze) !important;}
.chal-wrap{display:flex;flex-direction:column;width:100%;height:100%;justify-content:center;}
.chal-row{display:flex;justify-content:space-between;align-items:center;width:100%;}
.chal-brand{display:flex;align-items:center;}
.icon-mask{background-color:#fff;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-size:contain;mask-size:contain;-webkit-mask-position:center;mask-position:center;flex-shrink:0;}
.chal-title{font-weight:800;text-transform:uppercase;letter-spacing:1px;}
.chal-divider{height:1px;width:100%;margin:7px 0;opacity:.15;}
.chal-label{opacity:.7;font-weight:700;}
.chal-val,.chal-total{font-weight:900;text-align:right;}
.ed{cursor:text;border-bottom:1px dashed rgba(255,255,255,.2);transition:all .15s;}
.ed:hover{background:rgba(255,255,255,.05);}
.ed:focus{background:rgba(255,255,255,.1);outline:none;border-bottom:2px solid var(--red);}
.obs-mode .ed{border:none !important;background:transparent !important;pointer-events:none;}

.alert-scene{width:100vw;height:100vh;background:transparent;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;padding-bottom:50px;}
.particle-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
.alert-card{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:28px 36px;gap:12px;text-align:center;min-width:380px;max-width:580px;overflow:hidden;}
.alert-card::before{content:'';position:absolute;inset:0;background:inherit;filter:blur(0);z-index:-1;}
.alert-media{width:100%;max-height:180px;overflow:hidden;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.alert-media img,.alert-media video{width:100%;height:100%;object-fit:cover;border-radius:10px;max-height:180px;}
.a-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:3px;opacity:.75;}
.a-name{font-weight:900;text-transform:uppercase;letter-spacing:1px;line-height:1;}
.a-amount{font-weight:900;line-height:1;}
.a-msg{font-weight:700;line-height:1.3;margin-top:8px;max-width:90%;word-wrap:break-word;}
.a-bar{width:80%;height:3px;border-radius:2px;opacity:.4;animation:barShrink linear forwards;transform-origin:left center;}
@keyframes barShrink{0%{transform:scaleX(1);}100%{transform:scaleX(0);}}
.alert-enter-active{animation:alertIn .65s cubic-bezier(.34,1.56,.64,1) both;}
.alert-leave-active{animation:alertOut .45s ease-in both;}
@keyframes alertIn{0%{transform:translateY(70px) scale(.85);opacity:0;}100%{transform:translateY(0) scale(1);opacity:1;}}
@keyframes alertOut{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-60px) scale(.9);opacity:0;}}
.a-label{animation:textUp .4s .15s ease both;}
.a-name{animation:textUp .4s .25s ease both;}
.a-amount{animation:textUp .4s .35s ease both;}
.a-msg{animation:textUp .4s .45s ease both;}
@keyframes textUp{0%{transform:translateY(16px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
.glow-card{animation:glowPulse 2s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{box-shadow:0 0 25px var(--ac,rgba(255,215,0,.3));}50%{box-shadow:0 0 60px var(--ac,rgba(255,215,0,.6)),0 0 100px var(--ac,rgba(255,215,0,.15));}}
.alert-preview-wrap{width:100%;height:100%;display:flex;align-items:flex-end;justify-content:center;padding-bottom:40px;position:relative;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:#151515;border:1px solid var(--border);color:var(--text);padding:11px 18px;border-radius:var(--radius-md);font-size:10px;font-weight:700;transition:all .25s;opacity:0;z-index:99999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:#00aa44;color:#00cc44;}
.toast.err{border-color:#ff4444;color:#ff4444;}

.fb-status{display:flex;align-items:center;gap:6px;font-size:9px;font-weight:700;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#0a0a0a;}
.fb-dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;transition: background 0.3s;}
.fb-dot.ok{background:#00cc44;box-shadow:0 0 8px #00cc44; animation: pulseDot 2s infinite;}
.fb-dot.err{background:#ff4444; box-shadow:0 0 8px #ff4444;}
@keyframes pulseDot { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

/* МОБИЛЬНАЯ ВЕРСИЯ */
.mobile-kaspi-view {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--bg);
  padding: 20px;
  gap: 15px;
  overflow-y: auto;
}
.mobile-header {
  font-size: 16px;
  font-weight: 900;
  text-align: center;
  color: #fff;
  margin-bottom: 10px;
  margin-top: 10px;
}
.mobile-header span { color: var(--red); }
.kaspi-paste-area {
  background: #111;
  border: 2px dashed var(--red);
  border-radius: var(--radius-lg);
  padding: 15px;
  color: #fff;
  font-size: 12px;
  min-height: 140px;
  width: 100%;
  resize: vertical;
  font-family: 'Unbounded';
  transition: all 0.3s;
}
.kaspi-paste-area:focus {
  border-style: solid;
  box-shadow: 0 0 20px rgba(255,0,68,.2);
}
.parsed-card {
  background: #111;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Стили для музыкальной очереди */
.music-queue-card {
  background: linear-gradient(135deg, #000d15, #00060d);
  border: 1px solid rgba(0, 194, 255, 0.2);
  border-radius: var(--radius-lg);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.music-queue-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.music-queue-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--tenge);
}
.music-queue-title .mq-icon {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: linear-gradient(135deg, #0088cc, #004488);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
}
.btn-clear-queue {
  background: rgba(255, 50, 50, 0.1);
  border: 1px solid rgba(255, 50, 50, 0.3);
  color: #ff5555;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  font-family: 'Unbounded';
  font-size: 8px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 5px;
}
.btn-clear-queue:hover {
  background: rgba(255, 50, 50, 0.25);
  border-color: rgba(255, 50, 50, 0.6);
  transform: translateY(-1px);
}
.queue-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.queue-item.playing {
  border-color: rgba(0, 194, 255, 0.5);
  background: rgba(0, 194, 255, 0.06);
}
.track-info {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.track-status {
  font-size: 10px;
  font-weight: 900;
  color: var(--text-bright);
  display: flex;
  align-items: center;
  gap: 5px;
}
.track-status.now { color: var(--tenge); }
.track-id { font-size: 8px; color: var(--text-dim); letter-spacing: 0.3px; }
.btn-skip {
  background: linear-gradient(135deg, rgba(0,194,255,0.15), rgba(0,100,200,0.15));
  border: 1px solid rgba(0, 194, 255, 0.4);
  color: var(--tenge);
  padding: 7px 12px;
  border-radius: var(--radius-sm);
  font-family: 'Unbounded';
  font-size: 9px;
  font-weight: 900;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 5px;
  white-space: nowrap;
}
.btn-skip:hover {
  background: linear-gradient(135deg, rgba(0,194,255,0.3), rgba(0,100,200,0.3));
  transform: translateY(-1px);
  box-shadow: 0 3px 12px rgba(0,194,255,0.2);
}
.btn-remove {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  font-family: 'Unbounded';
  font-size: 9px;
  font-weight: 900;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 4px;
}
.btn-remove:hover {
  background: rgba(255,50,50,0.1);
  border-color: rgba(255,50,50,0.3);
  color: #ff5555;
}
.music-playing-indicator {
  display: flex; align-items: center; gap: 6px;
  font-size: 8px; color: var(--tenge); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.bar-anim { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
.bar-anim span {
  width: 3px; background: var(--tenge); border-radius: 2px;
  animation: barBounce 0.8s ease-in-out infinite;
}
.bar-anim span:nth-child(2) { animation-delay: 0.15s; }
.bar-anim span:nth-child(3) { animation-delay: 0.3s; }
@keyframes barBounce {
  0%,100% { height: 4px; }
  50% { height: 12px; }
}

@media(max-width:900px){
  :root{--sidebar-w:100%;}
  body{overflow:auto;}
  .desktop-only { display: none !important; }
}
@media(min-width:901px){
  .mobile-only { display: none !important; }
}
</style>
</head>
<body>

<div id="app" :class="{'obs-mode':mode!=='admin'}">

  <div v-if="mode==='alert'" class="alert-scene">
    <canvas ref="pcvs" class="particle-canvas"></canvas>
    <transition name="alert">
      <div v-if="alertVis" class="alert-card glow-card" :style="alertCardStyle">
        <div class="a-bar" :style="{background:alertCfg.amountColor||'#ffd700',animationDuration:(alertCfg.duration||7)+'s'}" :key="alertKey"></div>
        <div v-if="alertCfg.mediaType==='video'&&alertCfg.videoUrl" class="alert-media">
          <video :src="alertCfg.videoUrl" autoplay muted loop playsinline></video>
        </div>
        <div v-else-if="alertCfg.mediaType==='image'&&alertCfg.imageData" class="alert-media">
          <img :src="alertCfg.imageData" alt="">
        </div>
        <div class="a-label" :style="{color:alertCfg.labelColor||'#aaa'}">{{alertCfg.labelText||'НОВЫЙ ДОНАТ!'}}</div>
        <div class="a-name" :style="{color:alertCfg.nameColor||'#fff',fontSize:(alertCfg.nameFontSize||32)+'px'}">{{curDonation.name}}</div>
        <div class="a-amount" :style="{color:alertCfg.amountColor||'#ffd700',fontSize:(alertCfg.amountFontSize||48)+'px'}">{{curDonation.amount}} ₸</div>
        <div v-if="curDonation.msg" class="a-msg" :style="{color:alertCfg.msgColor||'#fff',fontSize:(alertCfg.msgFontSize||24)+'px'}">{{curDonation.msg}}</div>
      </div>
    </transition>
  </div>

  <div v-else-if="mode==='widget'" class="widget-scene" :style="sceneStyle">
    <!-- Музыка НЕ играет в OBS widget — только на компе в admin -->
    <div v-for="p in panels" :key="p.id" class="static-panel" :style="cardPos(p)">
      <component :is="compFor(p.type)" :p="p" :is-obs="true"></component>
    </div>
  </div>

  <div v-else class="admin-shell">
    <!-- YT плеер на компе (admin) — музыка играет здесь, не в OBS -->
    <div id="yt-player" style="position:fixed; width:1px; height:1px; opacity:0; pointer-events:none; z-index:-99; bottom:0; left:0;"></div>
    
    <div v-if="isMobile" class="mobile-kaspi-view mobile-only">
      <div class="mobile-header">KASPI <span>SMART PASTE</span></div>
      
      <div class="fb-status" style="justify-content:center;">
        <div class="fb-dot" :class="{ok:fbOk,err:!fbOk}"></div>
        <span>{{fbOk ? 'Связь с OBS установлена' : 'Firebase не подключён'}}</span>
      </div>

      <textarea class="kaspi-paste-area" v-model="kaspiPaste" @input="handleKaspiPaste" placeholder="Вставь скопированный текст из Каспи сюда...&#10;Скрипт сам найдет имя, сумму, сообщение и ссылки на YouTube."></textarea>
      
      <div class="parsed-card" v-if="quickName || quickAmount || quickMessage">
        <div class="fg">
          <label>Имя донатера</label>
          <input type="text" v-model="quickName" placeholder="Имя">
        </div>
        <div class="fg">
          <label>Сумма (₸)</label>
          <div class="donate-amount-wrap">
            <input type="number" v-model.number="quickAmount" placeholder="0">
            <span class="tenge-badge">₸</span>
          </div>
        </div>
        <div class="fg">
          <label>Сообщение</label>
          <textarea v-model="quickMessage" placeholder="Сообщение" style="min-height:50px"></textarea>
        </div>
      </div>

      <div class="music-queue-card" v-if="musicQueue.length > 0">
        <div class="music-queue-header">
          <div class="music-queue-title">
            <div class="mq-icon">🎵</div>
            Очередь ({{musicQueue.length}})
          </div>
          <button class="btn-clear-queue" @click="clearQueue">🗑 Очистить</button>
        </div>
        <div v-for="(track, idx) in musicQueue" :key="track.uid" class="queue-item" :class="{playing: idx===0}">
          <div class="track-info">
            <div class="track-status" :class="{now: idx===0}">
              <template v-if="idx===0">
                <div class="bar-anim"><span></span><span></span><span></span></div>
                Сейчас играет
              </template>
              <template v-else>⏳ #{{idx}} в очереди</template>
            </div>
            <span class="track-id">yt: {{track.videoId}}</span>
          </div>
          <button v-if="idx===0" class="btn-skip" @click="skipTrack(0)">⏭ Скип</button>
          <button v-else class="btn-remove" @click="skipTrack(idx)">✕</button>
        </div>
      </div>

      <div style="display:flex; flex-direction: column; gap: 8px; margin-top: 10px;">
        <button class="btn btn-red" style="padding: 20px; font-size: 14px;" @click="doQuickDonate" :disabled="!quickName || !quickAmount">🚀 ОТПРАВИТЬ В OBS</button>
        <button class="btn btn-flat" style="padding: 15px; font-size: 12px; color: #ff5555; border-color: rgba(255,0,0,0.2);" @click="clearProgress">🗑️ ОЧИСТИТЬ СБОРЫ</button>
      </div>
    </div>


    <template v-else>
      <div class="sidebar desktop-only">
        <div class="sidebar-head">
          <div class="logo">
            <div class="logo-mark">W</div>
            <div class="logo-name">WIDGET <span>PRO</span></div>
          </div>
          <div class="ver-tag">v12 TENGE</div>
        </div>

        <div class="tabs">
          <button class="tab" :class="{on:tab==='widgets'}" @click="tab='widgets'">🎯 Виджеты</button>
          <button class="tab" :class="{on:tab==='alert'}" @click="tab='alert'">🎉 Alert</button>
        </div>

        <div class="sidebar-body">

          <template v-if="tab==='widgets'">
            <div class="fb-status">
              <div class="fb-dot" :class="{ok:fbOk,err:!fbOk}"></div>
              <span>{{fbOk ? 'Firebase подключён' : 'Firebase не подключён'}}</span>
            </div>

            <div class="donate-form-card">
              <div class="donate-form-title">
                <div class="dft-icon">₸</div>
                Быстрый донат
              </div>
              <div class="live-preview-strip" v-if="quickName||quickAmount">
                <div>
                  <div class="lp-label">Донатер</div>
                  <div class="lp-name">{{quickName||'—'}}</div>
                </div>
                <div class="lp-sep"></div>
                <div style="text-align:right">
                  <div class="lp-label">Сумма</div>
                  <div class="lp-value">{{quickAmount ? Number(quickAmount).toLocaleString('ru') + ' ₸' : '—'}}</div>
                </div>
              </div>
              <div class="donate-input-row">
                <div class="fg">
                  <label>Имя донатера</label>
                  <input class="donate-name-input" type="text" v-model="quickName" placeholder="Иван Петров" @keydown.enter="doQuickDonate">
                </div>
                <div class="fg">
                  <label>Сумма (₸)</label>
                  <div class="donate-amount-wrap">
                    <input type="number" v-model.number="quickAmount" placeholder="500" min="0" @keydown.enter="doQuickDonate">
                    <span class="tenge-badge">₸</span>
                  </div>
                </div>
              </div>
              <div class="fg">
                <label>Сообщение (будет озвучено)</label>
                <textarea v-model="quickMessage" placeholder="Крутой стрим, продолжай в том же духе!" style="min-height:40px" @keydown.enter.prevent="doQuickDonate"></textarea>
              </div>
              <div class="donate-btn-row">
                <button class="btn btn-tenge" @click="doQuickDonate">▶ В OBS + ЦЕЛЬ</button>
                <button class="btn btn-purple" @click="doQuickTest">🧪 Тест локально</button>
              </div>
            </div>

            <div class="fr">
              <button class="btn btn-add-panel" @click="addPanel('goal')">✚ ЦЕЛЬ</button>
              <button class="btn btn-add-panel" @click="addPanel('challenge')">✚ ЧЕЛЛЕНДЖ</button>
            </div>

            <div class="music-queue-card" v-if="musicQueue.length > 0">
              <div class="music-queue-header">
                <div class="music-queue-title">
                  <div class="mq-icon">🎵</div>
                  Музыка ({{musicQueue.length}})
                </div>
                <button class="btn-clear-queue" @click="clearQueue">🗑 Очистить</button>
              </div>
              <div v-for="(track, idx) in musicQueue" :key="track.uid" class="queue-item" :class="{playing: idx===0}">
                <div class="track-info">
                  <div class="track-status" :class="{now: idx===0}">
                    <template v-if="idx===0">
                      <div class="bar-anim"><span></span><span></span><span></span></div>
                      Сейчас играет
                    </template>
                    <template v-else>⏳ #{{idx}} в очереди</template>
                  </div>
                  <span class="track-id">yt: {{track.videoId}}</span>
                </div>
                <button v-if="idx===0" class="btn-skip" @click="skipTrack(0)">⏭ Скип</button>
                <button v-else class="btn-remove" @click="skipTrack(idx)">✕</button>
              </div>
            </div>

            <div v-for="(p,i) in panels" :key="p.id">
              <div class="sec-head" :class="{on:selId===p.id}" @click="selId=selId===p.id?null:p.id">
                <div class="sec-head-l">
                  <div class="sec-dot">{{i+1}}</div>
                  <div class="sec-name">{{p.type==='goal'?'🎯 ЦЕЛЬ':'⚡ ЧЕЛЛЕНДЖ'}}</div>
                </div>
                <div style="display:flex;gap:7px;align-items:center">
                  <button class="btn btn-del" @click.stop="removePanel(p.id)">✕</button>
                  <span class="sec-chevron">▼</span>
                </div>
              </div>
              <div v-if="selId===p.id" class="sec-body">
                <div class="fr">
                  <div class="fg"><label>Позиция X</label><input type="number" v-model.number="p.x"></div>
                  <div class="fg"><label>Позиция Y</label><input type="number" v-model.number="p.y"></div>
                </div>
                <div class="divider"></div>

                <template v-if="p.type==='goal'">
                  <div class="fr">
                    <div class="fg"><label>Текущая сумма (₸)</label><input type="number" v-model.number="p.current"></div>
                    <div class="fg"><label>Цель (₸)</label><input type="text" v-model="p.max"></div>
                  </div>
                  <div class="fr">
                    <div class="fg"><label>Текст: Последний донат</label><input type="text" v-model="p.lastDonorLabel" placeholder="ПОСЛЕДНИЙ ДОНАТ"></div>
                    <div class="fg"><label>Размер текста метки</label>
                      <div class="rr"><input type="range" min="6" max="24" v-model.number="p.lastDonorLabelSize"><span class="rv">{{p.lastDonorLabelSize||8}}</span></div>
                    </div>
                  </div>
                  <div class="fg">
                    <label>Список донатеров</label>
                    <textarea v-model="p.donorsRaw" placeholder="Иван — 500 ₸&#10;Максим — 300 ₸"></textarea>
                  </div>
                </template>

                <template v-if="p.type==='challenge'">
                  <div class="fg">
                    <label>Логотип</label>
                    <div class="file-wrap">
                      <div class="file-btn">📁 Выбрать изображение</div>
                      <input type="file" accept="image/*" @change="uploadIcon($event,p)">
                    </div>
                  </div>
                  <div class="fr">
                    <div class="fg"><label>Размер лого</label>
                      <div class="rr"><input type="range" min="10" max="120" v-model.number="p.iconSize"><span class="rv">{{p.iconSize||35}}</span></div>
                    </div>
                    <div class="fg"><label>Отступ лого</label>
                      <div class="rr"><input type="range" min="0" max="50" v-model.number="p.iconGap"><span class="rv">{{p.iconGap||15}}</span></div>
                    </div>
                  </div>
                  <div class="fr">
                    <div class="cb-row" style="flex:1"><label>Разделитель</label><input type="checkbox" v-model="p.showDivider"></div>
                    <div class="cb-row" style="flex:1"><label>Счётчик</label><input type="checkbox" v-model="p.showCount"></div>
                  </div>
                </template>

                <div class="divider"></div>
                <div class="sub-lbl">Шрифты</div>
                <div class="fr">
                  <div class="fg"><label>Заголовок</label>
                    <div class="rr"><input type="range" min="10" max="60" v-model.number="p.titleSize"><span class="rv">{{p.titleSize||16}}</span></div>
                  </div>
                  <div class="fg"><label>Текст</label>
                    <div class="rr"><input type="range" min="8" max="50" v-model.number="p.textSize"><span class="rv">{{p.textSize||14}}</span></div>
                  </div>
                </div>
                <div class="divider"></div>
                <div class="sub-lbl">Размеры</div>
                <div class="fg"><label>Ширина панели</label>
                  <div class="rr"><input type="range" min="200" max="1000" step="10" v-model.number="p.width"><span class="rv">{{p.width||400}}</span></div>
                </div>
                <div class="fr">
                  <div class="fg"><label>Отступы</label>
                    <div class="rr"><input type="range" min="5" max="50" v-model.number="p.padding"><span class="rv">{{p.padding||20}}</span></div>
                  </div>
                  <div class="fg"><label>Скругление</label>
                    <div class="rr"><input type="range" min="0" max="50" v-model.number="p.radius"><span class="rv">{{p.radius||15}}</span></div>
                  </div>
                </div>
                <div class="divider"></div>
                <div class="sub-lbl">Цвета</div>
                <div class="fr">
                  <div class="fg"><label>Цвет фона</label><input type="color" v-model="p.bgColor"></div>
                  <div class="fg"><label>Прозрачность</label>
                    <div class="rr"><input type="range" min="0" max="1" step=".01" v-model.number="p.bgOpacity"><span class="rv">{{p.bgOpacity!==undefined?p.bgOpacity:0.75}}</span></div>
                  </div>
                </div>
                <div class="color-grid">
                  <div class="ci"><span>Текст</span><input type="color" v-model="p.cText"></div>
                  <template v-if="p.type==='goal'">
                    <div class="ci"><span>Бар 1</span><input type="color" v-model="p.cBar1"></div>
                    <div class="ci"><span>Бар 2</span><input type="color" v-model="p.cBar2"></div>
                    <div class="ci"><span>Акцент</span><input type="color" v-model="p.cAccent"></div>
                  </template>
                  <template v-if="p.type==='challenge'">
                    <div class="ci"><span>Иконка</span><input type="color" v-model="p.cIcon"></div>
                    <div class="ci"><span>Акцент</span><input type="color" v-model="p.cAccent"></div>
                  </template>
                </div>
              </div>
            </div>

            <div class="sec-head">
              <div class="sec-head-l">
                <div class="sec-name">⚙ Глобальные настройки OBS</div>
              </div>
            </div>
            <div class="sec-body">
              <div class="fg"><label>Масштаб сцены</label>
                <div class="rr"><input type="range" min=".5" max="2" step=".01" v-model.number="globalScale"><span class="rv">{{globalScale||1}}</span></div>
              </div>
            </div>
          </template>

          <template v-if="tab==='alert'">
            <div class="sec-head on">
              <div class="sec-head-l">
                <div class="sec-dot" style="background:var(--red);color:#fff">▶</div>
                <div class="sec-name">Запустить Alert вручную</div>
              </div>
            </div>
            <div class="sec-body">
              <div class="fr">
                <div class="fg"><label>Имя донатера</label><input type="text" v-model="tName" placeholder="Иван Петров"></div>
                <div class="fg">
                  <label>Сумма (₸)</label>
                  <div class="donate-amount-wrap">
                    <input type="number" v-model.number="tAmount" placeholder="500" min="0">
                    <span class="tenge-badge">₸</span>
                  </div>
                </div>
              </div>
              <div class="fg">
                <label>Сообщение донатера</label>
                <textarea v-model="tMessage" placeholder="Привет, крутой стрим!" style="min-height:40px"></textarea>
              </div>
              <button class="btn btn-green" @click="doTrigger">▶ ПОКАЗАТЬ В OBS</button>
              <button class="btn btn-purple" @click="doTestLocal">🧪 Тест (только здесь)</button>
            </div>

            <div class="sec-head" :class="{on:alertOpen}" @click="alertOpen=!alertOpen">
              <div class="sec-head-l"><div class="sec-name">🎨 Настройки Alert</div></div>
              <span class="sec-chevron">▼</span>
            </div>
            <div v-if="alertOpen" class="sec-body">
              <div class="fg"><label>Текст метки</label>
                <input type="text" v-model="alertCfg.labelText" placeholder="НОВЫЙ ДОНАТ!">
              </div>
              <div class="fg"><label>Длительность (сек)</label>
                <div class="rr"><input type="range" min="2" max="30" v-model.number="alertCfg.duration"><span class="rv">{{alertCfg.duration||7}}s</span></div>
              </div>
              
              <div class="divider"></div>
              <div class="sub-lbl">Озвучка (TTS)</div>
              <div class="cb-row"><label>Включить озвучку сообщения</label><input type="checkbox" v-model="alertCfg.ttsEnabled"></div>
              <template v-if="alertCfg.ttsEnabled">
                <div class="fg"><label>Голос TTS</label>
                  <select v-model="alertCfg.ttsVoiceURI">
                    <option value="">🤖 Авто (лучший доступный)</option>
                    <option v-for="v in availableVoices" :key="v.voiceURI" :value="v.voiceURI">{{v.name}} ({{v.lang}})</option>
                  </select>
                </div>
                <div class="fg"><label>Громкость озвучки</label>
                  <div class="rr"><input type="range" min="0" max="1" step="0.05" v-model.number="alertCfg.ttsVolume"><span class="rv">{{Math.round((alertCfg.ttsVolume||1)*100)}}%</span></div>
                </div>
                <div class="fg"><label>Скорость речи</label>
                  <div class="rr"><input type="range" min="0.5" max="2" step="0.1" v-model.number="alertCfg.ttsRate"><span class="rv">{{(alertCfg.ttsRate||1).toFixed(1)}}x</span></div>
                </div>
                <div class="fg"><label>Тон голоса</label>
                  <div class="rr"><input type="range" min="0" max="2" step="0.1" v-model.number="alertCfg.ttsPitch"><span class="rv">{{(alertCfg.ttsPitch||1).toFixed(1)}}</span></div>
                </div>
                <div style="font-size:8px;color:var(--text-dim);padding:4px 0;">⚠ Озвучка работает только в OBS (Alert URL). На компе и телефоне не слышна.</div>
              </template>

              <div class="divider"></div>
              <div class="sub-lbl">Медиа</div>
              <div class="fg"><label>Тип медиа</label>
                <select v-model="alertCfg.mediaType">
                  <option value="none">Без медиа</option>
                  <option value="image">Изображение</option>
                  <option value="video">Видео (URL)</option>
                </select>
              </div>
              <template v-if="alertCfg.mediaType==='image'">
                <div class="fg">
                  <label>Изображение (макс. 1 MB)</label>
                  <div class="file-wrap">
                    <div class="file-btn">📁 {{alertCfg.imageData?'✓ Загружено — сменить':'Выбрать изображение'}}</div>
                    <input type="file" accept="image/*" @change="uploadAImg">
                  </div>
                  <div v-if="alertCfg.imageData" class="file-ok">✓ Изображение загружено</div>
                  <div v-if="imgErr" class="file-err">{{imgErr}}</div>
                </div>
              </template>
              <template v-if="alertCfg.mediaType==='video'">
                <div class="fg"><label>URL видео (mp4 / webm)</label>
                  <input type="text" v-model="alertCfg.videoUrl" placeholder="https://...">
                </div>
              </template>

              <div class="divider"></div>
              <div class="sub-lbl">Звук (Эффект появления)</div>
              <div class="fg">
                <label>Звуковой файл (макс. 2 MB)</label>
                <div class="file-wrap">
                  <div class="file-btn">🔊 {{alertCfg.soundData?'✓ Загружено — сменить':'Выбрать аудио'}}</div>
                  <input type="file" accept="audio/*" @change="uploadASound">
                </div>
                <div v-if="alertCfg.soundData" class="file-ok">✓ Звук загружен</div>

        <div class="actions">

      <div class="preview-zone desktop-only" ref="previewZone">

        <div v-if="tab==='alert'" class="alert-preview-wrap">
          <canvas ref="pcvs" class="particle-canvas"></canvas>
          <transition name="alert">
            <div v-if="alertVis" class="alert-card glow-card" :style="alertCardStyle">

</div>
</script>

<script type="text/x-template" id="tpl-challenge">

  <div class="chal-wrap" :style="{padding:(p.padding||20)+'px'}">
    <div class="chal-row">
      <div class="chal-brand">
        <div v-if="p.iconData" class="icon-mask"
             :style="{width:(p.iconSize||35)+'px',height:(p.iconSize||35)+'px',backgroundColor:p.cIcon||'#fff',maskImage:'url('+p.iconData+')',WebkitMaskImage:'url('+p.iconData+')',marginRight:(p.iconGap||15)+'px'}"></div>
        <span :contenteditable="!isObs" class="ed chal-title"
              :style="{fontSize:(p.titleSize||16)+'px',color:p.cText||'#fff'}"
              @blur="p.title=$event.target.innerText">{{p.title||'Челлендж'}}</span>

      <div v-if="p.showCount">
        <div class="chal-val" :style="{fontSize:(p.titleSize||16)+'px',color:p.cAccent||'#ffd700'}">{{p.current||0}} ₸</div>
        <div class="chal-total" :style="{fontSize:(p.textSize||12)+'px',color:p.cText||'#888'}">/ {{p.max||'0'}} ₸</div>
      </div>
    </div>
    <div v-if="p.showDivider" class="chal-divider" :style="{background:p.cAccent||'#fff'}"></div>
    <div v-if="p.showCount" style="display:flex;justify-content:space-between;align-items:center;">
      <span class="chal-label" :style="{fontSize:(p.textSize||12)+'px',color:p.cText||'#aaa'}">Прогресс</span>

<script>
const { createApp, reactive, computed, ref, onMounted, defineComponent } = Vue;

function uid(){ return Math.random().toString(36).slice(2,9); }
function hexToRgb(h){
  let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `${r},${g},${b}`;
}
function cleanNum(v){
  return Math.round(parseFloat(String(v).replace(/\s/g,'').replace(/[^\d.]/g,'')) || 0);
}

const GoalComp = defineComponent({
  template:'#tpl-goal',
  props:['p','isObs'],
  computed:{
    pct(){ const c=this.p.current||0,m=parseFloat(this.p.max)||1; return Math.min(100,Math.round(c/m*100)); },
    donors(){
      const raw=this.p.donorsRaw||'';
      return raw.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean).map(s=>{
        const m=s.match(/^(.+?)[—\-–]\s*(.+)$/);
        return m?{name:m[1].trim(),amount:m[2].trim()}:{name:s,amount:''};
      });
    },
    glassStyle(){
      const p=this.p, bg=p.bgColor||'#111111', op=p.bgOpacity!==undefined?p.bgOpacity:0.75;
      return {background:`rgba(${hexToRgb(bg)},${op})`,borderRadius:(p.radius||15)+'px',width:(p.width||400)+'px',minHeight:'80px'};
    }
  },
  methods:{ formatNum(n){ return Number(n).toLocaleString('ru'); } }
});

const ChalComp = defineComponent({
  template:'#tpl-challenge',
  props:['p','isObs'],
  computed:{
    pct(){ const c=this.p.current||0,m=parseFloat(this.p.max)||1; return Math.min(100,Math.round(c/m*100)); },
    glassStyle(){
      const p=this.p, bg=p.bgColor||'#111111', op=p.bgOpacity!==undefined?p.bgOpacity:0.75;
      return {background:`rgba(${hexToRgb(bg)},${op})`,borderRadius:(p.radius||15)+'px',width:(p.width||400)+'px',minHeight:'60px'};
    }
  }
});

const FB_CFG = {
  apiKey: "AIzaSyDuxR5hsWmfIWrjgrsU4zVEnIVppUZxNNU",
  authDomain: "tt-widget-88711.firebaseapp.com",
  databaseURL: "https://tt-widget-88711-default-rtdb.firebaseio.com",
  projectId: "tt-widget-88711",
  storageBucket: "tt-widget-88711.firebasestorage.app",
  messagingSenderId: "997435022478",
  appId: "1:997435022478:web:a0ad462f2a7dd074d27ddf",
  measurementId: "G-R136SZ35H3"
};
let db = null;
try {
  firebase.initializeApp(FB_CFG);
  db = firebase.database();
} catch(e){ console.warn('Firebase error:', e); }

const STORAGE_KEY = 'wv12_state';
function loadState(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'null'); }catch(e){ return null; } }
function saveState(s){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }catch(e){} }

createApp({
  components:{ 'goal-widget':GoalComp, 'challenge-widget':ChalComp },
  setup(){
    const saved = loadState() || {};
    const urlMode = new URLSearchParams(location.search).get('mode');
    const mode = ref(urlMode||'admin');
    const tab  = ref('widgets');
    const selId= ref(null);
    const alertOpen = ref(false);
    const globalScale = ref(saved.globalScale||1);
    const pcvs = ref(null);
    const wscene = ref(null);
    const previewZone = ref(null);
    const fbOk = ref(!!db);
    
    const isMobile = ref(window.innerWidth <= 900);
    window.addEventListener('resize', () => { isMobile.value = window.innerWidth <= 900; });

    const kaspiPaste = ref('');
    const musicQueue = reactive([]);

    const panels = reactive(saved.panels || []);
    if(!panels.length) panels.push({
      id:uid(),type:'goal',title:'Цель стрима',current:0,max:'50000',
      lastDonorLabel:'ПОСЛЕДНИЙ ДОНАТ', donorsRaw:'', lastDonorLabelSize:8,
      width:420,padding:20,radius:15,bgColor:'#111111',bgOpacity:.8,
      cText:'#cccccc',cBar1:'#ff0044',cBar2:'#ff6600',cAccent:'#ffd700',
      titleSize:16,textSize:13,barHeight:14,x:80,y:60
    });

    const alertCfg = reactive(Object.assign({
      labelText:'НОВЫЙ ДОНАТ!',duration:7,mediaType:'none',
      imageData:null,videoUrl:'',soundData:null,volume:1,
      bgColor:'#111111',bgOpacity:.9,labelColor:'#aaaaaa',
      nameColor:'#ffffff',amountColor:'#ffd700',borderColor:'#ffd700',msgColor:'#ffffff',
      nameFontSize:32,amountFontSize:48,msgFontSize:24,cardRadius:16,
      particleColor:'#ffd700',particleCount:80,
      ttsEnabled:false, ttsRate:1, ttsPitch:1, ttsVolume:1, ttsVoiceURI:''
    }, saved.alertCfg||{}));

    const alertVis = ref(false);
    const alertKey = ref(0);
    const curDonation = reactive({name:'',amount:'', msg:''});
    let alertTimer = null;

    const quickName = ref('');
    const quickAmount = ref('');
    const quickMessage = ref('');
    const tName = ref('');
    const tAmount = ref(null);
    const tMessage = ref('');
    const imgErr = ref('');
    const sndErr = ref('');
    const toast = reactive({show:false,msg:'',type:'ok'});
    const availableVoices = reactive([]);
    
    // Загружаем список голосов Web Speech API
    function loadVoices() {
      const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
      availableVoices.splice(0, availableVoices.length, ...voices);
    }
    if(window.speechSynthesis) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    let toastTm;
    function showToast(msg,type='ok'){
      toast.msg=msg; toast.type=type; toast.show=true;
      clearTimeout(toastTm);
      toastTm=setTimeout(()=>toast.show=false,2500);
    }

    const sceneStyle = computed(()=>({ transform:`scale(${globalScale.value})` }));
    const alertCardStyle = computed(()=>{
      const c=alertCfg, bg=c.bgColor||'#111111', op=c.bgOpacity!==undefined?c.bgOpacity:.9;
      return {
        background:`rgba(${hexToRgb(bg)},${op})`,
        borderRadius:(c.cardRadius||16)+'px',
        border:`1px solid ${c.borderColor||'rgba(255,215,0,.3)'}`,
        '--ac':`rgba(${hexToRgb(c.amountColor||'#ffd700')},.4)`,
      };
    });

    // --- ПАРСЕР СООБЩЕНИЙ И ВЫРЕЗАНИЕ YT ССЫЛОК ---
    function extractAndCleanYT(msg) {
      const ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})\S*/gi;
      let tracks = [];
      let cleanMsg = msg.replace(ytRegex, (match, vid) => {
          tracks.push(vid);
          return ''; // Вырезаем ссылку из сообщения полностью
      }).trim();
      return { cleanMsg, tracks };
    }

    function handleKaspiPaste() {
      const txt = kaspiPaste.value;
      if (!txt) return;

      const lines = txt.split('\n').map(l => l.trim()).filter(Boolean);
      let name = '';
      let amount = '';
      let msg = '';

      const popIdx = lines.findIndex(l => l.toLowerCase().includes('пополнение') || l.toLowerCase().includes('перевод'));
      if (popIdx !== -1) {
        amount = cleanNum(lines[popIdx]);
        if (popIdx + 1 < lines.length) {
          const nextLine = lines[popIdx + 1];
          if (!nextLine.toLowerCase().includes('доступно')) name = nextLine;
        }
      }

      const msgIdx = lines.findIndex(l => l.toLowerCase() === 'сообщение' || l.toLowerCase().includes('сообщение:'));
      if (msgIdx !== -1) {
        msg = lines.slice(msgIdx + 1).join(' '); 
      }

      if (amount) quickAmount.value = amount;
      if (name) quickName.value = name;
      if (msg) quickMessage.value = msg;
    }

    function cardPos(p){ return {left:(p.x||0)+'px',top:(p.y||0)+'px',width:(p.width||400)+'px'}; }
    function compFor(type){ return type==='goal'?'goal-widget':'challenge-widget'; }

    function addPanel(type){
      panels.push({
        id:uid(),type,title:type==='goal'?'Цель стрима':'Новый челлендж',
        current:0,max:'50000',lastDonorLabel:'ПОСЛЕДНИЙ ДОНАТ',donorsRaw:'', lastDonorLabelSize:8,
        showDivider:true,showCount:true,iconData:null,iconSize:35,iconGap:15,
        width:400,padding:20,radius:15,bgColor:'#111111',bgOpacity:.8,
        cText:'#cccccc',cBar1:'#ff0044',cBar2:'#ff6600',cAccent:'#ffd700',cIcon:'#ffffff',
        titleSize:16,textSize:13,barHeight:14,
        x:80+(panels.length*30),y:60+(panels.length*30),
      });
    }

    function removePanel(id){
      const i=panels.findIndex(p=>p.id===id);
      if(i>=0) panels.splice(i,1);
      if(selId.value===id) selId.value=null;
    }

    function buildState(){
      return { panels: JSON.parse(JSON.stringify(panels)), alertCfg: JSON.parse(JSON.stringify(alertCfg)), globalScale: globalScale.value };
    }

    function pushState(){
      const state = buildState();
      saveState(state);
      if(db){ try{ db.ref('config').set(state); }catch(e){} }
    }

    function pushQueueState() {
      if(db) db.ref('musicQueue').set(JSON.parse(JSON.stringify(musicQueue)));
    }

    function applyDonateToGoals(name, amount){
      const num = cleanNum(amount);
      const entry = `${name} — ${Number(num).toLocaleString('ru')} ₸`;
      panels.forEach(p=>{
        if(p.type==='goal'){
          p.current = (p.current||0) + num;
          const existing = (p.donorsRaw||'').trim();
          if (existing.startsWith('Пусто')) p.donorsRaw = entry;
          else p.donorsRaw = existing ? entry+'\n'+existing : entry;
        }
        if(p.type==='challenge'){
          p.current = (p.current||0) + num;
        }
      });
    }

    function clearProgress() {
      if(!confirm('Очистить собранную сумму и список донатов?')) return;
      panels.forEach(p => { p.current = 0; if(p.type === 'goal') p.donorsRaw = 'Пусто — 0 ₸'; });
      pushState();
      showToast('✓ Данные очищены', 'ok');
    }

    function doQuickDonate(){
      const name = quickName.value.trim() || 'Аноним';
      const amt  = cleanNum(quickAmount.value);
      
      if(!amt) { showToast('Сумма не найдена!','err'); return; }

      // Парсим и чистим сообщение от ссылок YouTube
      const extracted = extractAndCleanYT(quickMessage.value);
      const cleanMsg = extracted.cleanMsg;
      
      applyDonateToGoals(name, amt);
      triggerAlert(name, amt, cleanMsg, true); // Отправляем чистый текст для озвучки!
      pushState();

      // Если нашли треки, кидаем их в очередь
      if (extracted.tracks.length > 0) {
        extracted.tracks.forEach(vid => {
          musicQueue.push({ uid: uid(), videoId: vid });
        });
        pushQueueState();
      }

      showToast(`✓ Отправлено: ${name} — ${Number(amt).toLocaleString('ru')} ₸`,'ok');
      quickName.value=''; quickAmount.value=''; quickMessage.value=''; kaspiPaste.value='';
    }

    function doQuickTest(){
      const name = quickName.value.trim() || 'Тест Донатов';
      const amt  = cleanNum(quickAmount.value) || 500;
      const extracted = extractAndCleanYT(quickMessage.value.trim() || 'Проверка текста и ссылок!');
      triggerAlert(name, amt, extracted.cleanMsg, false);
    }

    function doTrigger(){
      const name = tName.value.trim();
      const amt  = cleanNum(tAmount.value);
      const extracted = extractAndCleanYT(tMessage.value.trim());
      if(!name||!amt){ showToast('Заполни имя и сумму!','err'); return; }
      triggerAlert(name, amt, extracted.cleanMsg, true);
    }

    function doTestLocal(){
      const name = tName.value.trim() || 'Тест';
      const amt  = cleanNum(tAmount.value) || 500;
      const extracted = extractAndCleanYT(tMessage.value.trim() || 'Проверка озвучки и текста!');
      triggerAlert(name, amt, extracted.cleanMsg, false);
    }

    function triggerAlert(name, amt, msg, pushFB){
      const num = cleanNum(amt);
      curDonation.name = name;
      curDonation.amount = Number(num).toLocaleString('ru');
      curDonation.msg = msg;
      
      alertKey.value++;
      alertVis.value = true;
      clearTimeout(alertTimer);
      playSound();
      readMessage(msg);
      spawnParticles();
      const dur = (alertCfg.duration||7)*1000;
      alertTimer = setTimeout(()=>alertVis.value=false, dur+600);

      if(pushFB && db){
        try{
          db.ref('alert').set({ name, amount: num, msg: msg, ts: Date.now(), cfg: JSON.parse(JSON.stringify(alertCfg)) });
        }catch(e){}
      }
    }

    function playSound(){
      // Звук алерта только в OBS (alert mode) — не дублируется на компе/телефоне
      if(!alertCfg.soundData) return;
      if(mode.value !== 'alert') return;
      try{ const a=new Audio(alertCfg.soundData); a.volume=alertCfg.volume||1; a.play().catch(()=>{}); }catch(e){}
    }

    function readMessage(msgText){
      // TTS только в OBS (alert mode) — чтобы не дублировалось на компе/телефоне стримера
      if(!msgText || !alertCfg.ttsEnabled) return;
      if(mode.value !== 'alert') return;

      try {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(msgText.substring(0, 300));
        utter.lang = 'ru-RU';
        utter.volume = alertCfg.ttsVolume !== undefined ? alertCfg.ttsVolume : 1;
        utter.rate = alertCfg.ttsRate || 1;
        utter.pitch = alertCfg.ttsPitch || 1;

        // Выбираем голос: сначала выбранный пользователем, иначе авто
        const voices = window.speechSynthesis.getVoices();
        const pick = (list, fn) => list.find(fn);
        let chosenVoice = null;
        if(alertCfg.ttsVoiceURI) {
          chosenVoice = voices.find(v => v.voiceURI === alertCfg.ttsVoiceURI);
        }
        if(!chosenVoice) {
          chosenVoice =
            pick(voices, v => /microsoft.*irina|microsoft.*pavel/i.test(v.name)) ||
            pick(voices, v => /google.*русский|google.*russian/i.test(v.name)) ||
            pick(voices, v => v.lang === 'ru-RU') ||
            pick(voices, v => v.lang.startsWith('ru'));
        }
        if(chosenVoice) utter.voice = chosenVoice;

        window.speechSynthesis.speak(utter);
      } catch(e){ console.log('TTS error:', e); }
    }

    function spawnParticles(){
      const canvas=pcvs.value; if(!canvas) return;
      const ctx=canvas.getContext('2d');
      canvas.width=canvas.offsetWidth||800;
      canvas.height=canvas.offsetHeight||600;
      const count=alertCfg.particleCount!==undefined?alertCfg.particleCount:80;
      if(!count) return;
      const color=alertCfg.particleColor||'#ffd700';
      const particles=[];
      for(let i=0;i<count;i++){ particles.push({x:Math.random()*canvas.width,y:canvas.height+10,vx:(Math.random()-.5)*4,vy:-(Math.random()*6+3),size:Math.random()*5+2,alpha:1,decay:Math.random()*.015+.008}); }
      function frame(){
        ctx.clearRect(0,0,canvas.width,canvas.height); let alive=false;
        particles.forEach(p=>{
          if(p.alpha<=0) return; alive=true;
          p.x+=p.vx; p.y+=p.vy; p.vy+=.12; p.alpha-=p.decay;
          ctx.save(); ctx.globalAlpha=Math.max(0,p.alpha); ctx.fillStyle=color;
          ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); ctx.restore();
        });
        if(alive) requestAnimationFrame(frame); else ctx.clearRect(0,0,canvas.width,canvas.height);
      }
      requestAnimationFrame(frame);
    }

    function saveAll(){ pushState(); showToast('✓ Сохранено!','ok'); }
    function resetAll(){ if(!confirm('Сбросить все настройки?')) return; localStorage.removeItem(STORAGE_KEY); location.reload(); }
    function copyObs(type){
      const url=`${location.href.split('?')[0]}?mode=${type}`;
      navigator.clipboard.writeText(url).then(()=>showToast('URL скопирован!','ok'),()=>showToast('Не удалось скопировать','err'));
    }

    function uploadIcon(e,p){ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>{ p.iconData=ev.target.result; }; r.readAsDataURL(f); }
    function uploadAImg(e){
      imgErr.value=''; const f=e.target.files[0]; if(!f) return;
      if(f.size>1048576){ imgErr.value='Файл >1 MB'; return; }
      const r=new FileReader(); r.onload=ev=>{ alertCfg.imageData=ev.target.result; }; r.readAsDataURL(f);
    }
    function uploadASound(e){
      sndErr.value=''; const f=e.target.files[0]; if(!f) return;
      if(f.size>2097152){ sndErr.value='Файл >2 MB'; return; }
      const r=new FileReader(); r.onload=ev=>{ alertCfg.soundData=ev.target.result; }; r.readAsDataURL(f);
    }

    // --- ЛОГИКА ОЧЕРЕДИ МУЗЫКИ ---
    function skipTrack(idx) {
      musicQueue.splice(idx, 1);
      pushQueueState();
    }
    function clearQueue() {
      musicQueue.splice(0, musicQueue.length);
      pushQueueState();
    }

    let currentTrackUid = null;
    function checkQueuePlay() {
      // Плеер работает ТОЛЬКО на компе (admin mode) — музыка слышна только стримеру через колонки
      // В OBS (widget/alert) и на телефоне плеер НЕ запускается
      if (mode.value !== 'admin' || isMobile.value) return;
      if (!window.ytPlayerObj || !window.ytPlayerObj.loadVideoById) return;

      if (musicQueue.length === 0) {
        window.ytPlayerObj.stopVideo();
        currentTrackUid = null;
        return;
      }
      const nextTrack = musicQueue[0];
      if (currentTrackUid !== nextTrack.uid) {
        currentTrackUid = nextTrack.uid;
        window.ytPlayerObj.loadVideoById(nextTrack.videoId);
      }
    }

    function shiftQueueFromPlayer() {
      if (mode.value !== 'admin' || isMobile.value) return;
      if (musicQueue.length > 0) {
        musicQueue.shift();
        pushQueueState();
      }
    }

    // YT API грузим только на компе (admin, не мобильный)
    window.onYouTubeIframeAPIReady = () => {
      if (mode.value !== 'admin' || isMobile.value) return;
      window.ytPlayerObj = new YT.Player('yt-player', {
        height: '1', width: '1',
        playerVars: { 'autoplay': 1, 'controls': 0 },
        events: {
          'onReady': () => checkQueuePlay(),
          'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) shiftQueueFromPlayer(); },
          'onError': () => shiftQueueFromPlayer()
        }
      });
    };

    onMounted(()=>{
      // YT API грузим только на компе (admin) и только если не мобильный
      if(mode.value === 'admin' && !isMobile.value){
        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        let firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
      }

      if(mode.value==='alert' && db){
        let lastTs = 0;
        db.ref('alert').on('value',snap=>{
          const d=snap.val();
          if(!d||!d.ts || d.ts <= lastTs) return;
          lastTs = d.ts;
          if(d.cfg) Object.assign(alertCfg,d.cfg);
          triggerAlert(d.name, cleanNum(d.amount), d.msg, false);
        });
      }

      if(mode.value==='widget' && db){
        db.ref('config').on('value',snap=>{
          const d=snap.val(); if(!d) return;
          if(d.panels){ panels.splice(0); d.panels.forEach(p=>panels.push(p)); }
          if(d.globalScale) globalScale.value=d.globalScale;
        });
      }
      
      if(mode.value==='admin' && db){
        db.ref('config').on('value', snap => {
          const d = snap.val(); if(!d) return;
          if(d.panels){
            d.panels.forEach((newP, i) => {
              if(!panels[i]) panels.push(newP);
              else Object.keys(newP).forEach(k => { if(panels[i][k] !== newP[k]) panels[i][k] = newP[k]; });
            });
            if(panels.length > d.panels.length) panels.splice(d.panels.length);
          }
          if(d.alertCfg) Object.keys(d.alertCfg).forEach(k => { if(alertCfg[k] !== d.alertCfg[k]) alertCfg[k] = d.alertCfg[k]; });
          if(d.globalScale && globalScale.value !== d.globalScale) globalScale.value = d.globalScale;
          saveState(buildState());
        });
      }

      // Синхронизация очереди музыки
      if(db){
        db.ref('musicQueue').on('value', snap => {
          const q = snap.val() || [];
          musicQueue.splice(0, musicQueue.length, ...q);
          // Играем только на компе (admin), не в OBS и не на телефоне
          if (mode.value === 'admin' && !isMobile.value) checkQueuePlay();
        });
      }
    });

    return {
      mode,tab,selId,alertOpen,globalScale,fbOk,
      panels,alertCfg,alertVis,alertKey,curDonation,
      isMobile, kaspiPaste, handleKaspiPaste,
      quickName,quickAmount,quickMessage,tName,tAmount,tMessage,
      musicQueue, skipTrack, clearQueue,
      imgErr,sndErr,toast,availableVoices,
      pcvs,wscene,previewZone,
      sceneStyle,alertCardStyle,
      cardPos,compFor,
      addPanel,removePanel,
      clearProgress,
      doQuickDonate,doQuickTest,
      doTrigger,doTestLocal,
      saveAll,resetAll,copyObs,
      uploadIcon,uploadAImg,uploadASound,
    };
  }
}).mount('#app');
</script>
</body>
</html>

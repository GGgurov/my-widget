<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SUPREME WIDGET V15 - ELGUROV EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
  :root {
    --brand-purple: #8a2be2;
    --neon-blue: #00f3ff;
    --glass-bg: rgba(20, 20, 20, 0.5);
    --glass-border: rgba(255, 255, 255, 0.1);
  }

  body {
    margin: 0; padding: 0;
    font-family: 'Unbounded', sans-serif;
    color: white;
    background: transparent; /* Для OBS */
    overflow: hidden;
  }

  /* Для админки, если открыто с телефона */
  body.admin-mode { background: #111; overflow: auto; padding: 20px; }

  /* ══════════════════════════════════════════════════════
     АЛЕРТЫ (УВЕДОМЛЕНИЯ)
  ══════════════════════════════════════════════════════ */
  .alert-container {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .alert-container.show { opacity: 1; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
  
  .alert-img { max-width: 300px; max-height: 300px; object-fit: contain; filter: drop-shadow(0 0 20px var(--brand-purple)); }
  .alert-text { font-size: 32px; font-weight: 900; text-shadow: 0 4px 15px rgba(0,0,0,0.8); margin-top: 15px; }
  .alert-message { font-size: 24px; font-weight: 400; color: #ffd700; margin-top: 10px; }

  @keyframes popIn { 0% { transform: translate(-50%, -40%) scale(0.8); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

  /* ══════════════════════════════════════════════════════
     ТОП ДОНАТОВ - ШАБЛОНЫ
  ══════════════════════════════════════════════════════ */
  .top-widget { position: absolute; top: 20px; right: 20px; width: 350px; display: flex; flex-direction: column; gap: 10px; }
  .top-item { padding: 12px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; transition: all 0.3s ease; }

  /* Шаблон 1: Universal (Чистый Glassmorphism) */
  .theme-universal .top-item {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
  }

  /* Шаблон 2: HUD PRO (Киберпанк/Неон) */
  .theme-hudpro .top-item {
    background: #0a0a0a;
    border-left: 4px solid var(--neon-blue);
    border-right: 4px solid var(--brand-purple);
    box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
    text-transform: uppercase;
    clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
  }

  /* Шаблон 3: HPP (Liquid Glass + Переливашки) */
  .theme-hpp .top-item {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    z-index: 1;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.05);
  }
  .theme-hpp .top-item::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: conic-gradient(from 0deg, transparent, var(--brand-purple), var(--neon-blue), transparent 30%);
    animation: spin 4s linear infinite; z-index: -2;
  }
  .theme-hpp .top-item::after {
    content: ''; position: absolute; inset: 2px;
    background: #111; border-radius: 14px; z-index: -1;
  }

  @keyframes spin { 100% { transform: rotate(360deg); } }

  /* ══════════════════════════════════════════════════════
     АДМИНКА (ТЕЛЕФОН)
  ══════════════════════════════════════════════════════ */
  .admin-panel { max-width: 500px; margin: 0 auto; background: #222; padding: 20px; border-radius: 16px; }
  textarea { width: 100%; height: 100px; background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; padding: 10px; font-family: 'Unbounded'; margin-bottom: 10px; }
  button { width: 100%; padding: 15px; background: var(--brand-purple); color: white; border: none; border-radius: 8px; font-family: 'Unbounded'; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; }
  button:hover { filter: brightness(1.2); }
  select { width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 8px; margin-bottom: 20px; font-family: 'Unbounded'; }

</style>
</head>
<body>

<div id="app">
  <div v-if="!isAdmin" class="widget-mode">
    
    <div class="top-widget" :class="'theme-' + currentTheme">
      <div v-for="(donor, index) in topDonors" :key="index" class="top-item">
        <span>#{{index + 1}} {{ donor.name }}</span>
        <span style="color: #ffd700;">{{ donor.amount }} ₸</span>
      </div>
    </div>

    <div class="alert-container" :class="{ 'show': isAlertActive }">
      <img v-if="alertMedia" :src="alertMedia" class="alert-img">
      <div class="alert-text">{{ currentAlert?.name }} — <span style="color: #ffd700;">{{ currentAlert?.amount }} ₸</span></div>
      <div class="alert-message">{{ currentAlert?.message }}</div>
    </div>
    
  </div>

  <div v-if="isAdmin" class="admin-panel">
    <h2>Управление виджетом</h2>
    
    <label>Визуальный стиль Топа (OBS):</label>
    <select v-model="currentTheme" @change="saveTheme">
      <option value="universal">Universal (Glass)</option>
      <option value="hudpro">HUD PRO (Cyberpunk)</option>
      <option value="hpp">HPP (Liquid + Переливашки)</option>
    </select>

    <h3>Быстрый вброс с Kaspi</h3>
    <textarea v-model="kaspiText" placeholder="Вставь смс или пуш от Каспи сюда... (например: Перевод 5000тг от Влад Г.)"></textarea>
    <input type="text" v-model="manualMsg" placeholder="Текст для озвучки (необязательно)" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #333; color: white; border: none; border-radius: 8px;">
    <button @click="processKaspi">Отправить Алерт</button>
  </div>
</div>

<script>
// ВСТАВЬ СВОИ ДАННЫЕ FIREBASE СЮДА
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const app = Vue.createApp({
  data() {
    return {
      isAdmin: new URLSearchParams(window.location.search).get('mode') === 'admin',
      
      // Данные виджета
      currentTheme: 'hpp',
      topDonors: [],
      
      // Система алертов
      alertQueue: [],
      isAlertActive: false,
      currentAlert: null,
      alertMedia: 'https://media.giphy.com/media/l41YkxvU8c7J7Bba0/giphy.gif', // Дефолтная гифка
      alertSoundUrl: 'https://www.soundjay.com/buttons/sounds/button-09.mp3', // Дефолтный звук
      
      // Админка
      kaspiText: '',
      manualMsg: ''
    };
  },
  mounted() {
    if (this.isAdmin) document.body.classList.add('admin-mode');

    // Слушаем настройки темы
    db.ref('settings/theme').on('value', snap => {
      if (snap.val()) this.currentTheme = snap.val();
    });

    // Слушаем Топ Донатов
    db.ref('topDonors').on('value', snap => {
      const data = snap.val() || [];
      // Сортируем по убыванию и берем топ-5
      this.topDonors = Object.values(data).sort((a, b) => b.amount - a.amount).slice(0, 5);
    });

    // Слушаем очередь алертов
    db.ref('alertsQueue').on('child_added', snap => {
      const alertData = snap.val();
      this.alertQueue.push({...alertData, key: snap.key});
      this.processQueue();
    });
  },
  methods: {
    // ═════ ЛОГИКА АДМИНКИ ═════
    saveTheme() {
      db.ref('settings/theme').set(this.currentTheme);
    },
    processKaspi() {
      if (!this.kaspiText) return;
      
      // Универсальный парсер для вытаскивания суммы и имени
      let name = "Аноним", amount = 0;
      
      // Пробуем найти сумму (цифры + тг/KZT/₸)
      const amountMatch = this.kaspiText.match(/(\d[\d\s]*)\s*(тг|kzt|₸)/i);
      if (amountMatch) amount = parseInt(amountMatch[1].replace(/\s/g, ''));
      
      // Пробуем найти имя (от Кого)
      const nameMatch = this.kaspiText.match(/от\s+([А-Яа-яA-Za-z\s]+)/i);
      if (nameMatch) name = nameMatch[1].trim();

      if (amount > 0) {
        db.ref('alertsQueue').push({ name, amount, message: this.manualMsg });
        this.updateTopDonors(name, amount);
        this.kaspiText = '';
        this.manualMsg = '';
      } else {
        alert("Не удалось распознать сумму!");
      }
    },
    updateTopDonors(name, amount) {
      db.ref('topDonors').once('value', snap => {
        let donors = snap.val() || {};
        let found = false;
        for (let key in donors) {
          if (donors[key].name === name) {
            donors[key].amount += amount;
            found = true;
            break;
          }
        }
        if (!found) donors[Date.now()] = { name, amount };
        db.ref('topDonors').set(donors);
      });
    },

    // ═════ ЛОГИКА ВИДЖЕТА (OBS) ═════
    processQueue() {
      if (this.isAlertActive || this.alertQueue.length === 0) return;
      
      this.isAlertActive = true;
      this.currentAlert = this.alertQueue.shift();
      db.ref('alertsQueue').child(this.currentAlert.key).remove();

      // 1. Проигрываем звук уведомления (OBS перехватит)
      const sound = new Audio(this.alertSoundUrl);
      sound.volume = 0.5;
      sound.play().catch(e => console.log("Audio play error", e));

      // 2. Ждем 1 секунду и запускаем TTS
      setTimeout(() => {
        this.playTTS(`${this.currentAlert.name} закинул ${this.currentAlert.amount} тенге. ${this.currentAlert.message}`, () => {
          // 3. После окончания озвучки держим алерт еще 3 секунды и скрываем
          setTimeout(() => {
            this.isAlertActive = false;
            this.currentAlert = null;
            setTimeout(() => this.processQueue(), 1000); // Пауза перед следующим
          }, 3000);
        });
      }, 1000);
    },
    playTTS(text, onEndCallback) {
      if (!text || text.trim() === '') {
        onEndCallback();
        return;
      }
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ru-RU';
      utterance.rate = 1.1; // Чуть быстрее для динамики
      utterance.onend = onEndCallback;
      utterance.onerror = onEndCallback;
      window.speechSynthesis.speak(utterance);
    }
  }
});

app.mount('#app');
</script>
</body>
</html>

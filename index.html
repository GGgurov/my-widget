<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIDGET SUPREME FIXED</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Unbounded', sans-serif; }
        body { margin: 0; padding: 0; background: transparent; color: #fff; overflow: hidden; }
        
        .admin-panel { display: grid; grid-template-columns: 400px 1fr; height: 100vh; background: #0f0f0f; position: fixed; inset: 0; z-index: 9999; }
        .sidebar { background: #151515; padding: 20px; overflow-y: auto; border-right: 1px solid #333; }
        .preview-zone { background: #222; position: relative; overflow: hidden; }

        /* ВИДЖЕТЫ */
        .widget-container { position: absolute; transform-origin: top left; }
        
        .glass-box {
            position: relative;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.2);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Анимация блика */
        .glass-box::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg); animation: shine 5s infinite linear;
        }
        @keyframes shine { 0% { left: -150%; } 20% { left: 200%; } 100% { left: 200%; } }

        .progress-bg { background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; transition: width 0.5s ease; position: relative; }

        /* ИНТЕРФЕЙС АДМИНКИ */
        .section-title { font-size: 10px; color: #ff0044; font-weight: 900; text-transform: uppercase; margin: 20px 0 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 9px; color: #888; margin-bottom: 5px; font-weight: 700; }
        input[type="range"], input[type="color"], input[type="text"], input[type="number"] { width: 100%; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; padding: 8px; }
        .row { display: flex; gap: 10px; }
        .btn-main { width: 100%; padding: 15px; background: #ff0044; color: #fff; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 20px; }

        .obs-mode .admin-panel { display: none; }
    </style>
</head>
<body :class="{'obs-mode': isObs}">

<div id="app">
    <div class="admin-panel">
        <div class="sidebar">
            <h2 style="font-weight: 900; font-size: 20px;">V10.2 <span style="color:#ff0044">FIXED</span></h2>
            
            <div class="section-title">Основной виджет</div>
            <div class="row">
                <div class="control-group"><label>Фон 1</label><input type="color" v-model="s.bg1"></div>
                <div class="control-group"><label>Фон 2</label><input type="color" v-model="s.bg2"></div>
            </div>
            <div class="control-group"><label>Прозрачность фона: {{s.bgOp}}</label><input type="range" min="0" max="1" step="0.05" v-model="s.bgOp"></div>
            <div class="control-group"><label>Ширина: {{s.width}}px</label><input type="range" min="200" max="1000" v-model="s.width"></div>
            <div class="row">
                <div class="control-group"><label>Текущий</label><input type="number" v-model="s.current"></div>
                <div class="control-group"><label>Макс</label><input type="text" v-model="s.max"></div>
            </div>

            <div class="section-title">Плашка отжиманий</div>
            <div class="row">
                <div class="control-group"><label>Цвет 1</label><input type="color" v-model="s.pbg1"></div>
                <div class="control-group"><label>Цвет 2</label><input type="color" v-model="s.pbg2"></div>
            </div>
            <div class="control-group"><label>Прозрачность: {{s.pOp}}</label><input type="range" min="0" max="1" step="0.05" v-model="s.pOp"></div>
            <div class="control-group"><label>Акцент (Цифры)</label><input type="color" v-model="s.accent"></div>
            
            <div class="section-title">Общее</div>
            <div class="control-group"><label>Масштаб в OBS: {{s.scale}}</label><input type="range" min="0.5" max="3" step="0.1" v-model="s.scale"></div>
            <div class="control-group"><label>Скругление: {{s.radius}}px</label><input type="range" min="0" max="50" v-model="s.radius"></div>

            <button class="btn-main" @click="save">СОХРАНИТЬ ДЛЯ OBS</button>
        </div>

        <div class="preview-zone">
            <!-- Главный -->
            <div class="widget-container" :style="mainPos" @mousedown="drag('main', $event)">
                <div class="glass-box" :style="mainStyle">
                    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px;">
                        <span style="font-weight:900; font-size:18px;">{{s.title}}</span>
                        <span :style="{color: s.accent, fontWeight:900, fontSize:'22px'}">{{s.current}} / {{s.max}}</span>
                    </div>
                    <div class="progress-bg" style="height:25px;">
                        <div class="progress-bar" :style="barStyle"></div>
                    </div>
                </div>
            </div>

            <!-- Отжимания -->
            <div class="widget-container" v-if="s.showP" :style="pushupPos" @mousedown="drag('pushup', $event)">
                <div class="glass-box" :style="pushupStyle">
                    <div style="display:flex; align-items:center; justify-content:space-between;">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="https://cdn-icons-png.flaticon.com/512/38/38464.png" style="width:30px; filter:invert(1);">
                            <span style="font-weight:900; text-transform:uppercase;">Отжимания:</span>
                        </div>
                        <span :style="{color: s.accent, fontWeight:900}">1 раз - 50тг</span>
                    </div>
                    <div style="margin-top:10px; height:1px; background:rgba(255,255,255,0.2);"></div>
                    <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:14px;">
                        <span>Отжался за сегодня:</span>
                        <span :style="{color: s.accent, fontWeight:900}">{{s.pCount}} Раз(а)</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Режим OBS -->
    <div v-if="isObs" :style="{transform: `scale(${s.scale})`, transformOrigin:'top left'}">
        <div :style="mainPos"><div class="glass-box" :style="mainStyle">
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px;">
                <span style="font-weight:900; font-size:18px;">{{s.title}}</span>
                <span :style="{color: s.accent, fontWeight:900, fontSize:'22px'}">{{s.current}} / {{s.max}}</span>
            </div>
            <div class="progress-bg" style="height:25px;"><div class="progress-bar" :style="barStyle"></div></div>
        </div></div>
        <div v-if="s.showP" :style="pushupPos"><div class="glass-box" :style="pushupStyle">
            <div style="display:flex; align-items:center; justify-content:space-between;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/38/38464.png" style="width:30px; filter:invert(1);">
                    <span style="font-weight:900; text-transform:uppercase;">Отжимания:</span>
                </div>
                <span :style="{color: s.accent, fontWeight:900}">1 раз - 50тг</span>
            </div>
            <div style="margin-top:10px; height:1px; background:rgba(255,255,255,0.2);"></div>
            <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:14px;">
                <span>Отжался за сегодня:</span>
                <span :style="{color: s.accent, fontWeight:900}">{{s.pCount}} Раз(а)</span>
            </div>
        </div></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDuxR5hsWmfIWrjgrsU4zVEnIVppUZxNNU",
    authDomain: "tt-widget-88711.firebaseapp.com",
    projectId: "tt-widget-88711",
    databaseURL: "https://tt-widget-88711-default-rtdb.firebaseio.com",
    appId: "1:997435022478:web:a0ad462f2a7dd074d27ddf"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

Vue.createApp({
    data() {
        return {
            isObs: false,
            s: {
                title: 'СБОР НА ТУРНИР:', current: 2500, max: '10.000',
                width: 500, radius: 15, scale: 1, accent: '#ffd700',
                bg1: '#111111', bg2: '#000000', bgOp: 0.8,
                pbg1: '#3c1473', pbg2: '#240a4a', pOp: 0.9,
                mx: 50, my: 50, px: 50, py: 200,
                showP: true, pCount: 25
            }
        }
    },
    computed: {
        mainPos() { return { left: this.s.mx+'px', top: this.s.my+'px', width: this.s.width+'px' } },
        pushupPos() { return { left: this.s.px+'px', top: this.s.py+'px', width: this.s.width+'px' } },
        mainStyle() {
            return {
                background: `linear-gradient(135deg, ${this.hexToRgba(this.s.bg1, this.s.bgOp)}, ${this.hexToRgba(this.s.bg2, this.s.bgOp)})`,
                borderRadius: this.s.radius+'px', padding: '20px'
            }
        },
        pushupStyle() {
            return {
                background: `linear-gradient(135deg, ${this.hexToRgba(this.s.pbg1, this.s.pOp)}, ${this.hexToRgba(this.s.pbg2, this.s.pOp)})`,
                borderRadius: this.s.radius+'px', padding: '15px'
            }
        },
        barStyle() {
            const p = (this.s.current / parseFloat(this.s.max.replace(/\D/g,''))) * 100;
            return { width: p+'%', background: `linear-gradient(90deg, #8a0022, #ff0044)`, boxShadow: '0 0 15px #ff0044' }
        }
    },
    methods: {
        hexToRgba(hex, opacity) {
            let r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
            return `rgba(${r}, ${g}, ${b}, ${opacity})`;
        },
        save() { db.ref('v10_data').set(this.s).then(() => alert('Сохранено!')); },
        drag(type, e) {
            if (this.isObs) return;
            const startX = e.clientX - (type === 'main' ? this.s.mx : this.s.px);
            const startY = e.clientY - (type === 'main' ? this.s.my : this.s.py);
            const move = (e) => {
                if (type === 'main') { this.s.mx = e.clientX - startX; this.s.my = e.clientY - startY; }
                else { this.s.px = e.clientX - startX; this.s.py = e.clientY - startY; }
            };
            const stop = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', stop); };
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', stop);
        }
    },
    mounted() {
        if (location.search.includes('view=widget')) this.isObs = true;
        db.ref('v10_data').on('value', snap => { if(snap.exists()) this.s = snap.val(); });
    }
}).mount('#app');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPREME WIDGET V10 PRO - MULTI-SANDBOX</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffd700; --silver: #e0e0e0; --bronze: #cd7f32; --primary: #ff0044; }
        * { box-sizing: border-box; outline: none; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        body { margin: 0; padding: 0; font-family: 'Unbounded', sans-serif; background: transparent; color: #fff; overflow: hidden; touch-action: none; }
        
        /* ADMIN LAYOUT */
        .admin-panel { display: grid; grid-template-columns: 420px 1fr; min-height: 100vh; background: #0a0a0a; position: fixed; inset: 0; z-index: 9999; }
        
        /* SIDEBAR */
        .sidebar { background: #111; border-right: 1px solid #222; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .sidebar-header h2 { margin: 0; font-weight: 900; font-size: 20px; }
        .sidebar-header span { color: var(--primary); }
        
        /* PREVIEW ZONE */
        .preview-zone { position: relative; background-color: #151515; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 30px 30px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .widget-scene { position: relative; width: 100%; height: 100%; transform-origin: center center; }

        /* GUIDES */
        .guide { position: absolute; background: #00ffcc; box-shadow: 0 0 10px #00ffcc; z-index: 100; pointer-events: none; opacity: 0.8; display: none; }
        .guide.v { top: -2000px; bottom: -2000px; width: 1px; }
        .guide.h { left: -2000px; right: -2000px; height: 1px; }

        /* DRAGGABLE CARD CORE */
        .draggable-card { position: absolute; cursor: grab; transition: box-shadow 0.2s, transform 0.1s; z-index: 10; user-select: none; touch-action: none; transform-origin: top left; }
        .draggable-card:active { cursor: grabbing; box-shadow: 0 0 40px rgba(255,0,68,0.2) !important; z-index: 99; transform: scale(1.01); }
        .draggable-card.selected { border: 2px solid #00ffcc !important; box-shadow: 0 0 20px rgba(0,255,204,0.3); }

        /* GLASS STYLE (GENERAL) */
        .glass-panel { position: relative; width: 100%; height: 100%; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); overflow: hidden; }

        /* TYPE: GOAL */
        .goal-content { display: flex; flex-direction: column; width: 100%; height: 100%; }
        .goal-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; flex-wrap: wrap; gap: 5px; }
        .progress-box { width: 100%; background: rgba(0,0,0,0.5); overflow: hidden; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .progress-bar { height: 100%; transition: width 0.5s ease-out; position: relative; }
        .progress-bar::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); animation: shimmer 2s infinite linear; }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* TYPE: DONORS */
        .donor-list { list-style: none; padding: 0; margin: 15px 0 0 0; display: flex; flex-direction: column; gap: 8px; }
        .donor-item { display: flex; justify-content: space-between; padding: 10px 15px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
        .rank-1 { background: linear-gradient(90deg, rgba(255,215,0,0.1), rgba(255,215,0,0.02)) !important; border-color: rgba(255,215,0,0.3) !important; color: var(--gold) !important; font-weight: 900; }
        .rank-2 { background: linear-gradient(90deg, rgba(224,224,224,0.08), rgba(224,224,224,0.01)) !important; border-color: rgba(224,224,224,0.2) !important; color: var(--silver) !important; }
        .rank-3 { background: linear-gradient(90deg, rgba(205,127,50,0.06), rgba(205,127,50,0.01)) !important; border-color: rgba(205,127,50,0.2) !important; color: var(--bronze) !important; }

        /* TYPE: CHALLENGE (DUMBBELL) */
        .chal-content { display: flex; flex-direction: column; width: 100%; height: 100%; justify-content: center; }
        .chal-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .chal-brand { display: flex; align-items: center; }
        
        /* FIX: Иконка красится CSS маской, размер независим */
        .chal-icon-mask { background-color: #fff; /* Цвет задается инлайново в Vue */ -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; -webkit-mask-size: contain; mask-size: contain; -webkit-mask-position: center; mask-position: center; flex-shrink: 0; }
        
        .chal-title { font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .chal-value { font-weight: 900; text-align: right; }
        .chal-divider { height: 1px; width: 100%; margin: 8px 0; opacity: 0.1; }
        .chal-label { opacity: 0.8; font-weight: 700; }
        .chal-total { font-weight: 900; text-align: right; }

        /* UI ELEMENTS */
        .card-header { font-size: 10px; color: #888; background: #1a1a1a; padding: 6px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; font-weight: 700; border-left: 2px solid #333; display: flex; justify-content: space-between; align-items: center;}
        .card-header.active-panel { border-left-color: var(--primary); color: #fff; }
        .input-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
        .row { display: flex; gap: 8px; }
        .row > div { flex: 1; }
        
        label { font-size: 9px; color: #aaa; text-transform: uppercase; font-weight: 700; }
        input[type="text"], input[type="number"], select { background: #000; border: 1px solid #222; color: #fff; padding: 8px; border-radius: 4px; font-family: 'Unbounded'; font-size: 11px; width: 100%; }
        input:focus, select:focus { border-color: var(--primary); }
        
        .range-wrapper { display: flex; align-items: center; gap: 8px; }
        input[type="range"] { flex: 1; accent-color: var(--primary); cursor: pointer; margin: 0; }
        .range-val { font-size: 10px; color: #fff; width: 30px; text-align: right; font-variant-numeric: tabular-nums; }
        
        .color-picker-group { display: flex; gap: 5px; flex-wrap: wrap; }
        .color-item { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; min-width: 60px;}
        input[type="color"] { width: 100%; height: 30px; border: 1px solid #222; border-radius: 4px; cursor: pointer; background: transparent; padding: 0; }

        /* BUTTONS */
        .btn { font-family: 'Unbounded'; text-transform: uppercase; font-weight: 700; border: none; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .btn-add { background: #222; color: #fff; padding: 10px; border-radius: 6px; font-size: 11px; width: 100%; border: 1px solid #333; }
        .btn-add:hover { background: #282828; border-color: #444; }
        
        .btn-save { background: linear-gradient(135deg, #ff0044, #cc0036); color: #fff; padding: 15px; border-radius: 8px; font-weight: 900; font-size: 13px; margin-top: auto; box-shadow: 0 4px 15px rgba(255,0,68,0.3); }
        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,0,68,0.4); }
        
        .btn-copy { background: #1a1a1a; color: #aaa; padding: 10px; border-radius: 6px; font-size: 10px; width: 100%; margin-top: 10px; border: 1px solid #222; }
        .btn-copy:hover { background: #222; color: #fff; }
        
        .btn-danger { background: rgba(255,0,0,0.1); color: #ff4444; padding: 4px 8px; border-radius: 4px; font-size: 8px; border: 1px solid rgba(255,0,0,0.2); }
        .btn-danger:hover { background: rgba(255,0,0,0.2); }

        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-input-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        .btn-file { background: #1a1a1a; border: 1px solid #222; color: #ccc; padding: 8px; border-radius: 4px; font-size: 10px; width: 100%; text-align: center; }

        /* EDITABLE TEXT IN PREVIEW */
        .editable { cursor: text; border-bottom: 1px dashed rgba(255,255,255,0.2); display: inline-block; transition: background 0.2s; }
        .editable:hover { background: rgba(255,255,255,0.05); }
        .editable:focus { background: rgba(255,255,255,0.1); outline: none; border-bottom-color: var(--primary); }

        /* OBS MODE */
        .obs-mode .admin-panel { display: none; }
        .obs-mode .editable { border: none !important; background: transparent !important; pointer-events: none; }
        .obs-mode .draggable-card { cursor: default !important; border: none !important; box-shadow: none !important; }

        /* RESPONSIVE ADMIN */
        @media (max-width: 900px) {
            .admin-panel { grid-template-columns: 1fr; grid-template-rows: 40vh 60vh; position: relative; overflow-y: auto; }
            .sidebar { border-right: none; border-top: 1px solid #222; order: 2; height: auto; overflow-y: visible; }
            .preview-zone { order: 1; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #222; }
            .widget-scene { transform: scale(0.8); }
        }
    </style>
</head>
<body>

<div id="app" :class="{'obs-mode': isObs}">
    <div v-if="isObs" class="widget-scene" :style="sceneStyle">
        <div v-for="p in panels" :key="p.id" class="draggable-card" :style="getCardPos(p)">
            <component :is="getComponent(p.type)" :p="p" :is-obs="true"></component>
        </div>
    </div>

    <div v-else class="admin-panel">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>WIDGET <span>PRO</span></h2>
                <div style="font-size: 10px; color: #555;">v10.0</div>
            </div>
            
            <div class="row">
                <button class="btn btn-add" @click="addPanel('goal')">✚ ЦЕЛЬ</button>
                <button class="btn btn-add" @click="addPanel('challenge')">✚ ЧЕЛЛЕНДЖ</button>
            </div>

            <div v-for="(p, index) in panels" :key="p.id">
                <div class="card-header" :class="{'active-panel': selectedPanelId === p.id}" @click="selectedPanelId = p.id" style="cursor:pointer">
                    <span>#{{index + 1}} {{ p.type === 'goal' ? 'ЦЕЛЬ' : 'ЧЕЛЛЕНДЖ' }}</span>
                    <button class="btn btn-danger" @click.stop="removePanel(p.id)">УДАЛИТЬ</button>
                </div>
                
                <div v-if="selectedPanelId === p.id" class="panel-settings" style="padding: 10px 5px; background: #141414; border-radius: 0 0 4px 4px; margin-bottom: 10px;">
                    
                    <template v-if="p.type === 'goal'">
                        <div class="row">
                            <div class="input-group"><label>Текущее</label><input type="number" v-model.number="p.current"></div>
                            <div class="input-group"><label>Цель</label><input type="text" v-model="p.max"></div>
                        </div>
                        <div class="input-group"><label>Топ донатеров (через запятую)</label><input type="text" v-model="p.donorsRaw"></div>
                    </template>

                    <template v-if="p.type === 'challenge'">
                        <div class="input-group">
                            <label>Логотип плашки</label>
                            <div class="file-input-wrapper">
                                <button class="btn-file">Выбрать картинку</button>
                                <input type="file" accept="image/*" @change="uploadIcon($event, p)">
                            </div>
                        </div>
                        <div class="row">
                            <div class="input-group"><label>Размер лого: {{p.iconSize}}px</label>
                                <div class="range-wrapper">
                                    <input type="range" min="10" max="150" v-model.number="p.iconSize">
                                    <span class="range-val">{{p.iconSize}}</span>
                                </div>
                            </div>
                            <div class="input-group"><label>Отступ лого: {{p.iconGap}}px</label>
                                <div class="range-wrapper">
                                    <input type="range" min="0" max="50" v-model.number="p.iconGap">
                                    <span class="range-val">{{p.iconGap}}</span>
                                </div>
                            </div>
                        </div>
                        <div class="input-group"><label>Показать разделитель?</label><input type="checkbox" v-model="p.showDivider" style="accent-color:var(--primary); width:16px; height:16px;"></div>
                    </template>

                    <div class="card-header">Размеры и Скругление</div>
                    <div class="input-group"><label>Ширина: {{p.width}}px</label>
                        <div class="range-wrapper"><input type="range" min="200" max="1000" step="10" v-model.number="p.width"><span class="range-val">{{p.width}}</span></div>
                    </div>
                    <div class="row">
                        <div class="input-group"><label>Padding: {{p.padding}}px</label>
                            <div class="range-wrapper"><input type="range" min="5" max="50" v-model.number="p.padding"><span class="range-val">{{p.padding}}</span></div>
                        </div>
                        <div class="input-group"><label>Радиус: {{p.radius}}px</label>
                            <div class="range-wrapper"><input type="range" min="0" max="50" v-model.number="p.radius"><span class="range-val">{{p.radius}}</span></div>
                        </div>
                    </div>

                    <div class="card-header">Фон (Стекло)</div>
                    <div class="row">
                        <div class="input-group"><label>Цвет фона</label><input type="color" v-model="p.bgColor"></div>
                        <div class="input-group"><label>Прозрачность: {{p.bgOpacity}}</label>
                            <div class="range-wrapper"><input type="range" min="0" max="1" step="0.01" v-model.number="p.bgOpacity"><span class="range-val">{{p.bgOpacity}}</span></div>
                        </div>
                    </div>

                    <div class="card-header">Цвета Текста и Акцентов</div>
                    <div class="color-picker-group">
                        <div class="color-item"><label>Текст</label><input type="color" v-model="p.cText"></div>
                        
                        <template v-if="p.type === 'goal'">
                            <div class="color-item"><label>Бар 1</label><input type="color" v-model="p.cBar1"></div>
                            <div class="color-item"><label>Бар 2</label><input type="color" v-model="p.cBar2"></div>
                            <div class="color-item"><label>Сумма</label><input type="color" v-model="p.cAccent"></div>
                        </template>
                        
                        <template v-if="p.type === 'challenge'">
                            <div class="color-item"><label>Иконка</label><input type="color" v-model="p.cIcon"></div>
                            <div class="color-item"><label>Цифры</label><input type="color" v-model="p.cAccent"></div>
                        </template>
                    </div>

                </div>
            </div> <div class="card-header" style="margin-top:20px;">Глобальные настройки OBS</div>
            <div class="input-group"><label>Масштаб сцены: {{globalScale}}</label>
                <div class="range-wrapper"><input type="range" min="0.5" max="2" step="0.01" v-model.number="globalScale"><span class="range-val">{{globalScale}}</span></div>
            </div>

            <button class="btn btn-save" @click="saveData">ОПУБЛИКОВАТЬ</button>
            <button class="btn btn-copy" @click="copyLink">Скопировать ссылку для OBS</button>
            <div style="font-size: 9px; color: #444; text-align: center; margin-top: 5px;">Двигай плашки справа. Магнит работает автоматически.</div>
        </div>

        <div class="preview-zone">
            <div class="guide v" ref="guideV"></div>
            <div class="guide h" ref="guideH"></div>

            <div class="widget-scene" :style="sceneStyleAdmin">
                <div v-for="p in panels" :key="p.id" 
                     class="draggable-card" 
                     :class="{'selected': selectedPanelId === p.id}"
                     :style="getCardPos(p)"
                     @mousedown="startDrag($event, p)"
                     @touchstart.passive="startDrag($event, p)"
                     @click="selectedPanelId = p.id">
                    
                    <component :is="getComponent(p.type)" :p="p" :is-obs="false"></component>
                </div>
            </div>
        </div>
    </div>
</div>

<template id="tmpl-goal">
    <div class="glass-panel" :style="panelStyle">
        <div class="goal-content">
            <div class="goal-header" :style="{color: p.cText}">
                <span class="editable" :contenteditable="!isObs" @blur="updateText($event, p, 'title')" :style="{fontSize: p.padding*0.8+'px', fontWeight: 700}">{{ p.title }}</span>
                <span :style="{fontSize: p.padding*0.9+'px', fontWeight: 900, color: p.cAccent}">
                    {{ formattedCurrent }} / <span class="editable" :contenteditable="!isObs" @blur="updateText($event, p, 'max')">{{ p.max }}</span>
                </span>
            </div>
            <div class="progress-box" :style="{height: p.padding*0.7+'px', borderRadius: p.radius/2+'px'}">
                <div class="progress-bar" :style="barStyle"></div>
            </div>
            
            <ul v-if="donorList.length" class="donor-list" :style="{fontSize: p.padding*0.65+'px', color: p.cText}">
                <li v-for="(name, i) in donorList" :key="i" class="donor-item" :class="'rank-'+(i+1)" :style="{borderRadius: p.radius/3+'px'}">
                    <span>{{ i==0?'👑 ':i==1?'🥈 ':i==2?'🥉 ':(i+1)+'. ' }}{{ name }}</span>
                </li>
            </ul>
        </div>
    </div>
</template>

<template id="tmpl-challenge">
    <div class="glass-panel" :style="panelStyle">
        <div class="chal-content" :style="{gap: p.iconGap/2 + 'px'}">
            <div class="chal-row">
                <div class="chal-brand" :style="{gap: p.iconGap + 'px'}">
                    <div class="chal-icon-mask" :style="iconMaskStyle"></div>
                    <div class="chal-title editable" :contenteditable="!isObs" @blur="updateText($event, p, 'title')" :style="{color: p.cText, fontSize: p.padding*0.8+'px'}">{{ p.title }}</div>
                </div>
                <div class="chal-value editable" :contenteditable="!isObs" @blur="updateText($event, p, 'value')" :style="{color: p.cAccent, fontSize: p.padding+'px'}">{{ p.value }}</div>
            </div>
            
            <div v-if="p.showDivider" class="chal-divider" :style="{backgroundColor: p.cText}"></div>
            
            <div class="chal-row">
                <div class="chal-label editable" :contenteditable="!isObs" @blur="updateText($event, p, 'label')" :style="{color: p.cText, fontSize: p.padding*0.65+'px'}">{{ p.label }}</div>
                <div class="chal-total editable" :contenteditable="!isObs" @blur="updateText($event, p, 'count')" :style="{color: p.cAccent, fontSize: p.padding*0.9+'px'}">{{ p.count }}</div>
            </div>
        </div>
    </div>
</template>

<script>
const { createApp, ref, computed, onMounted, onBeforeUnmount, watch } = Vue;

// Firebase Config - ОСТАВИЛ ТВОЙ
const firebaseConfig = {
    apiKey: "AIzaSyDuxR5hsWmfIWrjgrsU4zVEnIVppUZxNNU",
    authDomain: "tt-widget-88711.firebaseapp.com",
    projectId: "tt-widget-88711",
    databaseURL: "https://tt-widget-88711-default-rtdb.firebaseio.com",
    storageBucket: "tt-widget-88711.firebasestorage.app",
    messagingSenderId: "997435022478",
    appId: "1:997435022478:web:a0ad462f2a7dd074d27ddf"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const DB_PATH = 'widget_data_v10'; // НОВАЯ ВЕРСИЯ ДАННЫХ ДЛЯ ПОДДЕРЖКИ МНОЖЕСТВА ПЛАШЕК

// Дефолтная иконка гантели (которую ты прислал, переведенная в Base64 для надежности, если ссылка умрет)
const DUMBBELL_ICON = 'https://cdn-icons-png.flaticon.com/512/38/38464.png';

// Хелпер для HEX -> RGBA
const hexToRgba = (hex, opacity) => {
    let c = hex.substring(1).split('');
    if (c.length === 3) c = [c[0], c[0], c[1], c[1], c[2], c[2]];
    c = '0x' + c.join('');
    return `rgba(${(c >> 16) & 255}, ${(c >> 8) & 255}, ${c & 255}, ${opacity})`;
};

// --- КОМПОНЕНТ: ЦЕЛЬ ---
const GoalWidget = {
    template: '#tmpl-goal',
    props: ['p', 'isObs'],
    setup(props) {
        const formattedCurrent = computed(() => (props.p.current || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " "));
        const donorList = computed(() => props.p.donorsRaw ? props.p.donorsRaw.split(',').map(s=>s.trim()).filter(Boolean).slice(0,5) : []);
        
        const progressPercent = computed(() => {
            const m = parseFloat(props.p.max.toString().replace(/[^\d]/g, ''));
            return m > 0 ? Math.min((props.p.current / m) * 100, 100) : 0;
        });

        const panelStyle = computed(() => ({
            padding: props.p.padding + 'px',
            borderRadius: props.p.radius + 'px',
            background: hexToRgba(props.p.bgColor, props.p.bgOpacity),
        }));

        const barStyle = computed(() => ({
            width: progressPercent.value + '%',
            background: `linear-gradient(90deg, ${props.p.cBar1}, ${props.p.cBar2})`,
            boxShadow: `0 0 15px ${props.p.cBar2}88`,
            borderRadius: (props.p.radius/2)+'px'
        }));

        const updateText = (e, p, field) => { if(!props.isObs) p[field] = e.target.textContent; };

        return { formattedCurrent, donorList, panelStyle, barStyle, updateText };
    }
};

// --- КОМПОНЕНТ: ЧЕЛЛЕНДЖ ---
const ChallengeWidget = {
    template: '#tmpl-challenge',
    props: ['p', 'isObs'],
    setup(props) {
        const panelStyle = computed(() => ({
            padding: props.p.padding + 'px',
            borderRadius: props.p.radius + 'px',
            background: hexToRgba(props.p.bgColor, props.p.bgOpacity),
        }));

        // СТИЛЬ ДЛЯ ОКРАШИВАНИЯ ИКОНКИ
        const iconMaskStyle = computed(() => ({
            width: props.p.iconSize + 'px',
            height: props.p.iconSize + 'px',
            backgroundColor: props.p.cIcon, // ЭТО КРАСИТ ИКОНКУ
            '-webkit-mask-image': `url(${props.p.iconUrl || DUMBBELL_ICON})`,
            'mask-image': `url(${props.p.iconUrl || DUMBBELL_ICON})`
        }));

        const updateText = (e, p, field) => { if(!props.isObs) p[field] = e.target.textContent; };

        return { panelStyle, iconMaskStyle, updateText };
    }
};

// --- ГЛАВНОЕ ПРИЛОЖЕНИЕ ---
createApp({
    components: { GoalWidget, ChallengeWidget },
    setup() {
        const isObs = ref(false);
        const panels = ref([]);
        const globalScale = ref(1.0);
        const selectedPanelId = ref(null);
        
        const guideV = ref(null);
        const guideH = ref(null);

        // Фабрики дефолтных настроек
        const createBaseConfig = (type) => ({
            id: Date.now(),
            type,
            x: 50, y: 50,
            width: 400, padding: 20, radius: 15,
            bgColor: '#0f0f0f', bgOpacity: 0.7,
            cText: '#ffffff', cAccent: '#ffd700',
        });

        const addPanel = (type) => {
            let config = createBaseConfig(type);
            if (type === 'goal') {
                Object.assign(config, { title: 'СБОР НА СТРИМ:', current: 0, max: '10 000', donorsRaw: 'Донатер, Привет, Supreme', cBar1: '#8a0022', cBar2: '#ff0044' });
            } else {
                Object.assign(config, { title: 'ОТЖИМАНИЯ', value: '1 раз = 50р', label: 'Всего за сегодня:', count: '0 раз', iconSize: 35, iconGap: 15, cIcon: '#ffffff', iconUrl: DUMBBELL_ICON, showDivider: true });
            }
            panels.value.push(config);
            selectedPanelId.value = config.id;
        };

        const removePanel = (id) => {
            panels.value = panels.value.filter(p => p.id !== id);
            if (selectedPanelId.value === id) selectedPanelId.value = panels.value.length ? panels.value[0].id : null;
        };

        const getComponent = (type) => type === 'goal' ? 'GoalWidget' : 'ChallengeWidget';

        // КОРРЕКТНЫЙ РАСЧЕТ ВЫСОТЫ ПЛАШКИ (приблизительный, т.к. текст может переноситься)
        // Нужен для работы магнита по нижнему краю.
        const estimateHeight = (p) => {
            let h = p.padding * 2;
            if (p.type === 'goal') {
                h += p.padding * 0.9 + 12; // header
                h += p.padding * 0.7; // bar
                const donors = p.donorsRaw ? p.donorsRaw.split(',').filter(Boolean).length : 0;
                if (donors) h += 15 + (Math.min(donors, 5) * (p.padding * 0.65 + 20 + 8));
            } else {
                h += p.padding; // row1 value height
                if(p.showDivider) h += 17;
                h += p.padding * 0.9; // row2 count height
                if(p.iconSize > h - p.padding*2) h = p.iconSize + p.padding*2; // Если иконка огромная
            }
            return h;
        };

        // ДРАГ & ЭДВАНСЕД МАГНИТ
        let dragInfo = null;
        const SNAP_TOLERANCE = 15; // Пиксели чувствительности магнита

        const startDrag = (e, panel) => {
            if (isObs.value) return;
            if (e.target.classList.contains('editable') || e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
            
            selectedPanelId.value = panel.id;
            const event = e.touches ? e.touches[0] : e;
            
            dragInfo = {
                panel,
                startX: event.clientX,
                startY: event.clientY,
                initialX: panel.x,
                initialY: panel.y,
                otherPanels: panels.value.filter(p => p.id !== panel.id).map(p => ({
                    ...p,
                    h: estimateHeight(p), // Предрассчитанная высота
                    cx: p.x + p.width / 2, // Центр X
                    cy: p.y + estimateHeight(p) / 2 // Центр Y
                }))
            };

            document.addEventListener(e.touches ? 'touchmove' : 'mousemove', onDrag, {passive: false});
            document.addEventListener(e.touches ? 'touchend' : 'mouseup', stopDrag);
            if(e.cancelable && e.touches) e.preventDefault();
        };

        const onDrag = (e) => {
            if (!dragInfo) return;
            if(e.cancelable && e.touches) e.preventDefault(); 
            
            const event = e.touches ? e.touches[0] : e;
            const mouseDx = (event.clientX - dragInfo.startX) / globalScale.value;
            const mouseDy = (event.clientY - dragInfo.startY) / globalScale.value;
            
            let newX = dragInfo.initialX + mouseDx;
            let newY = dragInfo.initialY + mouseDy;
            
            const curW = dragInfo.panel.width;
            const curH = estimateHeight(dragInfo.panel);
            
            let snapX = null, snapY = null;
            let showV = false, showH = false;

            // Логика МАГНИТА (Перебор осей других плашек)
            for (const other of dragInfo.otherPanels) {
                // --- ГОР ПРИВЯЗКИ (X) ---
                // Лево-Лево
                if (Math.abs(newX - other.x) < SNAP_TOLERANCE) { newX = other.x; snapX = newX; showV = true; }
                // Право-Право
                else if (Math.abs((newX + curW) - (other.x + other.width)) < SNAP_TOLERANCE) { newX = other.x + other.width - curW; snapX = newX + curW; showV = true; }
                // Центр-Центр
                else if (Math.abs((newX + curW/2) - other.cx) < SNAP_TOLERANCE) { newX = other.cx - curW/2; snapX = other.cx; showV = true; }
                // Право-Лево (прилипание сбоку)
                else if (Math.abs((newX + curW) - other.x) < SNAP_TOLERANCE) { newX = other.x - curW; snapX = other.x; showV = true; }
                // Лево-Право (прилипание сбоку)
                else if (Math.abs(newX - (other.x + other.width)) < SNAP_TOLERANCE) { newX = other.x + other.width; snapX = newX; showV = true; }

                // --- ВЕРТ ПРИВЯЗКИ (Y) ---
                // Топ-Топ
                if (Math.abs(newY - other.y) < SNAP_TOLERANCE) { newY = other.y; snapY = newY; showH = true; }
                // Бот-Бот
                else if (Math.abs((newY + curH) - (other.y + other.h)) < SNAP_TOLERANCE) { newY = other.y + other.h - curH; snapY = newY + curH; showH = true; }
                // Центр-Центр
                else if (Math.abs((newY + curH/2) - other.cy) < SNAP_TOLERANCE) { newY = other.cy - curH/2; snapY = other.cy; showH = true; }
                // Бот-Топ (прилипание снизу/сверху)
                else if (Math.abs((newY + curH) - other.y) < SNAP_TOLERANCE) { newY = other.y - curH; snapY = other.y; showH = true; }
                // Топ-Бот (прилипание снизу/сверху)
                else if (Math.abs(newY - (other.y + other.h)) < SNAP_TOLERANCE) { newY = other.y + other.h; snapY = newY; showH = true; }
            }

            // Управление линиями гидов
            if (showV && guideV.value) { guideV.value.style.display = 'block'; guideV.value.style.left = snapX + 'px'; }
            else if(guideV.value) guideV.value.style.display = 'none';
            
            if (showH && guideH.value) { guideH.value.style.display = 'block'; guideH.value.style.top = snapY + 'px'; }
            else if(guideH.value) guideH.value.style.display = 'none';

            dragInfo.panel.x = Math.round(newX);
            dragInfo.panel.y = Math.round(newY);
        };

        const stopDrag = () => {
            dragInfo = null;
            if(guideV.value) guideV.value.style.display = 'none';
            if(guideH.value) guideH.value.style.display = 'none';
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('touchmove', onDrag);
            document.removeEventListener('mouseup', stopDrag);
            document.removeEventListener('touchend', stopDrag);
        };

        // Загрузка кастомной иконки
        const uploadIcon = (e, panel) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 500 * 1024) { alert("Файл слишком большой! Максимум 500Кб."); return; }
            
            const reader = new FileReader();
            reader.onload = (event) => { panel.iconUrl = event.target.result; }; // Сохраняем как Base64
            reader.readAsDataURL(file);
        };

        // Стили координат и масштаба
        const getCardPos = (p) => ({ left: p.x + 'px', top: p.y + 'px', width: p.width + 'px' });
        const sceneStyleAdmin = computed(() => ({ transform: `scale(${globalScale.value})` })); // В админке скейлим саму сцену
        const sceneStyle = computed(() => ({ transform: `scale(${globalScale.value})`, transformOrigin: 'top left' })); // В OBS от угла

        // Firebase Взаимодействие
        const saveData = () => {
            // Очищаем proxy объекты перед сохранением
            const dataToSave = JSON.parse(JSON.stringify({
                scale: globalScale.value,
                panels: panels.value
            }));
            db.ref(DB_PATH).set(dataToSave)
                .then(() => alert("Опубликовано! Обновите источник в OBS."))
                .catch(err => alert("Ошибка Firebase: " + err.message));
        };

        const loadData = () => {
            db.ref(DB_PATH).once('value', snap => {
                if (snap.exists()) {
                    const data = snap.val();
                    globalScale.value = data.scale || 1.0;
                    panels.value = data.panels || [];
                    if (panels.value.length) selectedPanelId.value = panels.value[0].id;
                } else {
                    // Если данных нет, создаем дефолтную пару
                    addPanel('goal');
                    addPanel('challenge');
                    panels.value[1].y = 200; // Сдвинем вторую вниз
                }
            });
        };

        const copyLink = () => {
            const url = window.location.origin + window.location.pathname + '?view=widget';
            navigator.clipboard.writeText(url).then(() => alert("Ссылка скопирована. Добавьте её в OBS как 'Браузер'."));
        };

        onMounted(() => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('view') === 'widget') isObs.value = true;
            loadData();
            // Слушаем изменения в реальном времени для OBS
            if(isObs.value) db.ref(DB_PATH).on('value', snap => {
                if(snap.exists()){
                    const data = snap.val();
                    globalScale.value = data.scale;
                    panels.value = data.panels;
                }
            });
        });

        return {
            isObs, panels, globalScale, selectedPanelId, guideV, guideH,
            addPanel, removePanel, getComponent, startDrag, getCardPos, 
            sceneStyle, sceneStyleAdmin, uploadIcon, saveData, copyLink
        };
    }
}).mount('#app');
</script>
</body>
</html>

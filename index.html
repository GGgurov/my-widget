<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SUPREME WIDGET BUILDER</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root { --accent-gold: #ffd700; --accent-red: #ff0044; }
        body { margin: 0; padding: 0; font-family: 'Unbounded', sans-serif; background: #050505; color: #fff; overflow-x: hidden; }
        
        /* ВИДЖЕТ */
        .widget-container { display: flex; flex-direction: column; padding: 30px; box-sizing: border-box; transition: all 0.2s ease; }
        .header-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; font-weight: 700; }
        .progress-bar-bg { width: 100%; background: rgba(0, 0, 0, 0.8); border-radius: 50px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 30px; }
        .progress-fill { height: 100%; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .donor-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .donor-item { display: flex; align-items: center; padding: 10px 15px; border-radius: 8px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }

        /* АДМИНКА */
        .dashboard { display: grid; grid-template-columns: 450px 1fr; min-height: 100vh; }
        .control-panel { background: #111; border-right: 1px solid #222; padding: 25px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; max-height: 100vh; }
        .preview-area { display: flex; align-items: center; justify-content: center; background-color: #1a1a1a; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }
        
        .section-title { font-size: 10px; color: var(--accent-gold); letter-spacing: 2px; margin-top: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 9px; color: #777; text-transform: uppercase; font-weight: 700; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 4px; font-family: 'Unbounded'; font-size: 12px; }
        input[type="range"] { padding: 0; }
        
        .obs-mode-body { background: transparent !important; }
        .copy-btn { background: linear-gradient(90deg, var(--accent-red), #8a0022); color: #fff; border: none; padding: 15px; border-radius: 8px; font-family: 'Unbounded'; font-weight: 900; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(255,0,68,0.3); }
        .copy-btn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

<div id="app">
    <div v-if="isObs || !isObs" :class="{'obs-mode-body': isObs, 'dashboard': !isObs}">
        
        <div v-if="!isObs" class="control-panel">
            <h2 style="margin:0; font-weight:900; font-size:20px;">SUPREME EDIT <span style="color:var(--accent-red)">v3</span></h2>
            
            <div class="section-title">Контент</div>
            <div class="input-group"><label>Цель</label><input type="text" v-model="goalTitle"></div>
            <div style="display:flex; gap:10px">
                <div class="input-group" style="flex:1"><label>Собрано</label><input type="number" v-model="currentAmount"></div>
                <div class="input-group" style="flex:1"><label>Нужно</label><input type="text" v-model="maxAmount"></div>
            </div>

            <div class="section-title">Геометрия и Стиль</div>
            <div style="display:flex; gap:10px">
                <div class="input-group" style="flex:1"><label>Масштаб: {{scale}}</label><input type="range" min="0.4" max="2" step="0.05" v-model="scale"></div>
                <div class="input-group" style="flex:1"><label>Ширина: {{width}}px</label><input type="range" min="250" max="1000" v-model="width"></div>
            </div>
            <div style="display:flex; gap:10px">
                <div class="input-group" style="flex:1"><label>Углы: {{radius}}px</label><input type="range" min="0" max="60" v-model="radius"></div>
                <div class="input-group" style="flex:1"><label>Стекло: {{glass}}</label><input type="range" min="0" max="1" step="0.05" v-model="glass"></div>
            </div>

            <div class="section-title">Типографика (Размеры)</div>
            <div style="display:flex; gap:10px">
                <div class="input-group" style="flex:1"><label>Текст: {{fTitle}}px</label><input type="range" min="10" max="40" v-model="fTitle"></div>
                <div class="input-group" style="flex:1"><label>Цифры: {{fSum}}px</label><input type="range" min="10" max="40" v-model="fSum"></div>
            </div>

            <div class="section-title">Цвета и Свечение</div>
            <div style="display:flex; gap:10px">
                <div class="input-group" style="flex:1"><label>Текст</label><input type="color" v-model="tColor"></div>
                <div class="input-group" style="flex:1"><label>Цифры</label><input type="color" v-model="sColor"></div>
            </div>
            <div style="display:flex; gap:10px">
                <div class="input-group" style="flex:1"><label>Град 1</label><input type="color" v-model="c1"></div>
                <div class="input-group" style="flex:1"><label>Град 2</label><input type="color" v-model="c2"></div>
            </div>
            <div class="input-group"><label>Яркость неона: {{glow}}px</label><input type="range" min="0" max="40" v-model="glow"></div>

            <div class="section-title">Донатеры</div>
            <input type="text" v-model="topTitle" placeholder="Заголовок топа">
            <input type="text" v-for="(d, i) in 3" :key="i" v-model="topDonors[i]" :placeholder="'Место ' + (i+1)">

            <button class="copy-btn" @click="copyLink">СКОПИРОВАТЬ ССЫЛКУ</button>
        </div>

        <div :class="{'preview-area': !isObs, 'obs-mode-body': isObs}">
            <div :style="scaleStyle">
                <div class="widget-container" :style="containerStyle">
                    <div class="header-row">
                        <span :style="{fontSize: fTitle+'px', color: tColor}">{{ goalTitle }}</span>
                        <span :style="{fontSize: fSum+'px', color: sColor}">{{ formattedCurrent }} / {{ maxAmount }}</span>
                    </div>
                    <div class="progress-bar-bg" :style="{height: (fSum*0.8)+'px'}">
                        <div class="progress-fill" :style="progressStyle"></div>
                    </div>
                    <div class="top-donors-title" v-if="topTitle" :style="topTitleStyle">{{ topTitle }}</div>
                    <ul class="donor-list">
                        <li class="donor-item" v-for="(d, i) in topDonors" :key="i" v-show="d && d !== 'Пусто'" :style="{fontSize: (fTitle*0.8)+'px', color: tColor}">
                            {{ i + 1 }}) {{ d }}
                        </li>
                    </ul>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
const { createApp, ref, computed, onMounted, watch } = Vue;

createApp({
    setup() {
        const load = (key, def) => {
            const saved = JSON.parse(localStorage.getItem('supremeSettings') || '{}');
            return saved[key] !== undefined ? saved[key] : def;
        };

        const goalTitle = ref(load('goalTitle', 'На мечту:'));
        const currentAmount = ref(load('currentAmount', 4028));
        const maxAmount = ref(load('maxAmount', '7.990тг'));
        const scale = ref(load('scale', 1.0));
        const width = ref(load('width', 500));
        const radius = ref(load('radius', 24));
        const glass = ref(load('glass', 0.6));
        const fTitle = ref(load('fTitle', 20));
        const fSum = ref(load('fSum', 20));
        const tColor = ref(load('tColor', '#ffffff'));
        const sColor = ref(load('sColor', '#ffd700'));
        const c1 = ref(load('c1', '#8a0022'));
        const c2 = ref(load('c2', '#ff0044'));
        const glow = ref(load('glow', 15));
        const topTitle = ref(load('topTitle', 'ТОП 3'));
        const topDonors = ref(load('topDonors', ['Айдын - 750', '', '']));

        const isObs = ref(false);

        watch([goalTitle, currentAmount, maxAmount, scale, width, radius, glass, fTitle, fSum, tColor, sColor, c1, c2, glow, topTitle, topDonors], () => {
            const settings = { goalTitle: goalTitle.value, currentAmount: currentAmount.value, maxAmount: maxAmount.value, scale: scale.value, width: width.value, radius: radius.value, glass: glass.value, fTitle: fTitle.value, fSum: fSum.value, tColor: tColor.value, sColor: sColor.value, c1: c1.value, c2: c2.value, glow: glow.value, topTitle: topTitle.value, topDonors: topDonors.value };
            localStorage.setItem('supremeSettings', JSON.stringify(settings));
        }, { deep: true });

        onMounted(() => {
            const p = new URLSearchParams(window.location.search);
            if (p.get('obs') === '1') {
                isObs.value = true;
                if (p.has('gt')) goalTitle.value = decodeURIComponent(p.get('gt'));
                if (p.has('ca')) currentAmount.value = p.get('ca');
                if (p.has('ma')) maxAmount.value = decodeURIComponent(p.get('ma'));
                if (p.has('sc')) scale.value = p.get('sc');
                if (p.has('wd')) width.value = p.get('wd');
                if (p.has('br')) radius.value = p.get('br');
                if (p.has('gl')) glass.value = p.get('gl');
                if (p.has('ft')) fTitle.value = p.get('ft');
                if (p.has('fs')) fSum.value = p.get('fs');
                if (p.has('tc')) tColor.value = decodeURIComponent(p.get('tc'));
                if (p.has('scol')) sColor.value = decodeURIComponent(p.get('scol'));
                if (p.has('c1')) c1.value = decodeURIComponent(p.get('c1'));
                if (p.has('c2')) c2.value = decodeURIComponent(p.get('c2'));
                if (p.has('gw')) glow.value = p.get('gw');
                if (p.has('tt')) topTitle.value = decodeURIComponent(p.get('tt'));
                if (p.has('d1')) topDonors.value[0] = decodeURIComponent(p.get('d1'));
                if (p.has('d2')) topDonors.value[1] = decodeURIComponent(p.get('d2'));
                if (p.has('d3')) topDonors.value[2] = decodeURIComponent(p.get('d3'));
            }
        });

        const formattedCurrent = computed(() => currentAmount.value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " "));
        const progressPercent = computed(() => {
            let m = parseFloat(maxAmount.value.toString().replace(/[\s.]/g, '').replace(/[^\d]/g, ''));
            return m > 0 ? Math.min((currentAmount.value / m) * 100, 100) : 0;
        });

        const containerStyle = computed(() => ({ width: width.value + 'px', background: `rgba(15,15,15,${glass.value})`, borderRadius: radius.value + 'px', backdropFilter: 'blur(12px)', border: `1px solid ${c1.value}33` }));
        const scaleStyle = computed(() => ({ transform: `scale(${scale.value})` }));
        const progressStyle = computed(() => ({ width: progressPercent.value + '%', background: `linear-gradient(90deg, ${c1.value}, ${c2.value})`, boxShadow: `0 0 ${glow.value}px ${c2.value}aa` }));
        const topTitleStyle = computed(() => ({ borderLeft: `4px solid ${c1.value}`, background: `linear-gradient(90deg, ${c1.value}22, transparent)`, color: tColor.value }));

        const copyLink = () => {
            const u = new URL(window.location.href.split('?')[0]);
            u.searchParams.set('obs', '1');
            u.searchParams.set('gt', encodeURIComponent(goalTitle.value));
            u.searchParams.set('ca', currentAmount.value);
            u.searchParams.set('ma', encodeURIComponent(maxAmount.value));
            u.searchParams.set('sc', scale.value);
            u.searchParams.set('wd', width.value);
            u.searchParams.set('br', radius.value);
            u.searchParams.set('gl', glass.value);
            u.searchParams.set('ft', fTitle.value);
            u.searchParams.set('fs', fSum.value);
            u.searchParams.set('tc', encodeURIComponent(tColor.value));
            u.searchParams.set('scol', encodeURIComponent(sColor.value));
            u.searchParams.set('c1', encodeURIComponent(c1.value));
            u.searchParams.set('c2', encodeURIComponent(c2.value));
            u.searchParams.set('gw', glow.value);
            u.searchParams.set('tt', encodeURIComponent(topTitle.value));
            u.searchParams.set('d1', encodeURIComponent(topDonors.value[0]));
            u.searchParams.set('d2', encodeURIComponent(topDonors.value[1]));
            u.searchParams.set('d3', encodeURIComponent(topDonors.value[2]));
            navigator.clipboard.writeText(u.toString());
            alert('ГОТОВО! Вставляй в TikTok Studio');
        };

        return { goalTitle, currentAmount, maxAmount, scale, width, radius, glass, fTitle, fSum, tColor, sColor, c1, c2, glow, topTitle, topDonors, isObs, formattedCurrent, containerStyle, scaleStyle, progressStyle, topTitleStyle, copyLink };
    }
}).mount('#app');
</script>
</body>
</html>

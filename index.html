<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SUPREME WIDGET V11 PRO - SOUL</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<style>
/* ══════════════════════════════════════
   ROOT VARIABLES & BASE
══════════════════════════════════════ */
:root {
  --gold: #ffd700;
  --silver: #c8c8c8;
  --bronze: #cd7f32;
  --red: #ff0044;
  --bg: #080808;
  --panel: #111111;
  --border: #1e1e1e;
  --border-hi: #2e2e2e;
  --text-dim: #555;
  --text-mid: #888;
  --text: #cccccc;
  --text-bright: #ffffff;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --sidebar-w: 390px;
}

*{box-sizing:border-box;outline:none;margin:0;padding:0;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#222;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#333;}

body{
  font-family:'Unbounded',sans-serif;
  background:transparent;
  color:var(--text-bright);
  overflow:hidden;
}

/* ══════════════════════════════════════
   ADMIN LAYOUT
══════════════════════════════════════ */
.admin-shell{
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  height:100vh;
  background:var(--bg);
  position:fixed;inset:0;
}

/* ── SIDEBAR ── */
.sidebar{
  display:flex;flex-direction:column;
  background:var(--panel);
  border-right:1px solid var(--border);
  overflow:hidden;
}

.sidebar-head{
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--red),#880022);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;letter-spacing:-1px;
}
.logo-name{font-size:13px;font-weight:900;letter-spacing:0.5px;}
.logo-name span{color:var(--red);}
.ver-tag{
  font-size:9px;font-weight:700;color:var(--text-dim);
  background:#151515;padding:3px 7px;border-radius:20px;
  border:1px solid var(--border);letter-spacing:0.5px;
}

/* TABS */
.tabs{
  display:flex;gap:3px;
  padding:10px 12px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tab{
  flex:1;padding:8px 6px;
  border-radius:var(--radius-sm);
  font-family:'Unbounded';font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.5px;
  border:none;cursor:pointer;transition:all .2s;
  color:var(--text-dim);background:transparent;
}
.tab.on{background:var(--red);color:#fff;box-shadow:0 2px 10px rgba(255,0,68,.3);}
.tab:not(.on):hover{color:var(--text);background:#1a1a1a;}

/* SCROLL AREA */
.sidebar-body{
  flex:1;overflow-y:auto;
  padding:12px;
  display:flex;flex-direction:column;gap:8px;
}

/* ── QUICK DONATION (NEW) ── */
.quick-donat {
  background: #110003;
  border: 1px solid var(--red);
  padding: 15px;
  border-radius: var(--radius-md);
  margin-bottom: 5px;
  box-shadow: 0 4px 15px rgba(255,0,68,.1);
}
.quick-donat .sec-name {
  color: var(--red);
  font-size: 11px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.quick-donat input {
  background: #1a0508;
  border-color: #330011;
  font-size: 13px;
}
.quick-donat input:focus { border-color: var(--red); }

/* COLLAPSIBLE SECTION */
.sec-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 13px;
  background:#151515;
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  cursor:pointer;transition:all .2s;
  user-select:none;
}
.sec-head:hover{background:#1a1a1a;border-color:var(--border-hi);}
.sec-head.on{border-color:var(--red);background:#150007;}
.sec-head-l{display:flex;align-items:center;gap:9px;}
.sec-dot{
  width:18px;height:18px;border-radius:50%;
  background:#1e1e1e;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:900;color:var(--text-dim);
  flex-shrink:0;
}
.sec-head.on .sec-dot{background:var(--red);color:#fff;}
.sec-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text);}
.sec-head.on .sec-name{color:#fff;}
.sec-badge{
  font-size:8px;padding:2px 6px;border-radius:20px;
  background:rgba(255,0,68,.12);color:var(--red);
  font-weight:700;text-transform:uppercase;letter-spacing:.3px;
}
.sec-chevron{font-size:9px;color:var(--text-dim);transition:transform .2s;}
.sec-head.on .sec-chevron{transform:rotate(180deg);}

.sec-body{
  padding:13px;
  background:#0c0c0c;
  border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--radius-md) var(--radius-md);
  display:flex;flex-direction:column;gap:11px;
}

/* FORM ELEMENTS */
.fg{display:flex;flex-direction:column;gap:5px;}
.fr{display:flex;gap:9px;}
.fr > *{flex:1;}
label,.lbl{
  font-size:9px;font-weight:700;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:.5px;
}
input[type=text],input[type=number],select,textarea{
  background:#080808;
  border:1px solid var(--border);
  color:var(--text-bright);
  padding:9px 11px;
  border-radius:var(--radius-sm);
  font-family:'Unbounded';font-size:11px;
  width:100%;
  transition:border-color .2s,box-shadow .2s;
}
textarea{resize:vertical;min-height:54px;line-height:1.5;}
input:focus,select:focus,textarea:focus{
  border-color:var(--red);
  box-shadow:0 0 0 2px rgba(255,0,68,.1);
}
.rr{display:flex;align-items:center;gap:8px;}
input[type=range]{flex:1;accent-color:var(--red);cursor:pointer;height:3px;background:var(--border);border-radius:2px;border:none;padding:0;}
.rv{font-size:10px;color:var(--text-bright);min-width:34px;text-align:right;font-variant-numeric:tabular-nums;background:#080808;padding:3px 6px;border-radius:4px;border:1px solid var(--border);}
.color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.ci{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:8px;color:var(--text-dim);font-weight:700;text-transform:uppercase;}
input[type=color]{width:100%;height:30px;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:#000;padding:2px;}
.divider{height:1px;background:var(--border);width:100%;margin:3px 0;}
.sub-lbl{font-size:10px;font-weight:900;color:var(--text-bright);text-transform:uppercase;letter-spacing:.5px;}

/* BUTTONS */
.btn{
  font-family:'Unbounded';text-transform:uppercase;font-weight:700;
  border:none;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
  letter-spacing:.3px;
}
.btn-red{
  background:linear-gradient(135deg,#ff0044,#cc0034);
  color:#fff;padding:15px;border-radius:var(--radius-md);
  font-size:11px;font-weight:900;width:100%;
  box-shadow:0 4px 15px rgba(255,0,68,.2);
}
.btn-red:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(255,0,68,.35);}
.btn-del{
  background:rgba(255,0,0,.07);color:#ff4444;
  padding:5px 8px;border-radius:5px;font-size:8px;
  border:1px solid rgba(255,0,0,.15);
}
.btn-del:hover{background:#ff4444;color:#fff;}
.btn-add-panel{
  background:#151515;color:var(--text);
  padding:11px;border-radius:var(--radius-sm);
  font-size:10px;flex:1;border:1px solid var(--border);
}
.btn-add-panel:hover{background:#1c1c1c;}

/* ── PREVIEW ZONE ── */
.preview-zone{
  position:relative;
  background:#0a0a0a;
  background-image:radial-gradient(#1c1c1c 1px,transparent 1px);
  background-size:22px 22px;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.pz-label{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  font-size:9px;font-weight:700;color:#222;
  text-transform:uppercase;letter-spacing:1.5px;
  pointer-events:none;z-index:5;
}

/* WIDGET PANELS */
.widget-scene{position:relative;width:100%;height:100%;transform-origin:center center;}
.draggable{
  position:absolute;cursor:grab;z-index:10;user-select:none;touch-action:none;
}
.draggable:active{cursor:grabbing;z-index:99;}
.glass{
  position:relative;width:100%;height:100%;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.05);
  overflow:hidden;
}

/* GOAL & LIST CSS */
.goal-wrap{display:flex;flex-direction:column;width:100%;height:100%;}
.goal-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap;gap:4px;}
.prog-track{width:100%;background:rgba(0,0,0,.5);overflow:hidden;border:1px solid rgba(255,255,255,.04);position:relative;height:8px; border-radius: 4px;}
.prog-fill{height:100%;transition:width .5s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.ld-section{margin-top:13px;}
.ld-label{
  display:inline-flex;align-items:center;gap:5px;
  font-size:8px;font-weight:900;
  text-transform:uppercase;letter-spacing:2px;
  padding:4px 10px;border-radius:20px;
  margin-bottom:8px;
  white-space:nowrap;
}
.donor-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px;}
.donor-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.04);}
.rk-0{background:linear-gradient(90deg,rgba(255,215,0,.13),transparent) !important;border-color:rgba(255,215,0,.3) !important;color:var(--gold) !important;font-weight:900;}

/* ALERT ANIMATIONS */
.alert-scene{
  width:100vw;height:100vh;
  position:absolute;inset:0;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:50px;
  pointer-events:none; z-index:999;
}
.alert-card{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  padding:28px 36px; gap:12px; text-align:center;
  min-width:380px;max-width:580px;
  border-radius: 20px;
  background: rgba(10,10,10,0.9);
  border: 1px solid var(--red);
  box-shadow: 0 0 30px rgba(255,0,68,0.3);
}
.a-label{ font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:3px;opacity:.75; }
.a-name{ font-weight:900;text-transform:uppercase;letter-spacing:1px;line-height:1; font-size: 32px;}
.a-amount{ font-weight:900;line-height:1; font-size: 48px; color: var(--gold); }
.a-bar{
  width:80%;height:3px;border-radius:2px;opacity:.4;
  transform-origin:left center;
}
.alert-enter-active{animation:alertIn .65s cubic-bezier(.34,1.56,.64,1) both;}
.alert-leave-active{animation:alertOut .45s ease-in both;}
@keyframes alertIn{
  0%{transform:translateY(70px) scale(.85);opacity:0;}
  100%{transform:translateY(0) scale(1);opacity:1;}
}
@keyframes alertOut{
  0%{transform:translateY(0) scale(1);opacity:1;}
  100%{transform:translateY(-60px) scale(.9);opacity:0;}
}

/* RESPONSIVE (MOBILE) */
@media(max-width:900px){
  .admin-shell{grid-template-columns:1fr;grid-template-rows:60vh 40vh;}
  .sidebar{border-right:none;border-top:1px solid var(--border);order:2;}
  .preview-zone{order:1;border-bottom:1px solid var(--border);}
  .quick-donat { position: sticky; top: 0; z-index: 10; background: #110003; }
}

.toast{
  position:fixed;bottom:22px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:#151515;border:1px solid #00aa44;
  color:#00cc44;padding:11px 18px;
  border-radius:var(--radius-md);
  font-size:10px;font-weight:700;
  transition:all .25s;opacity:0;
  z-index:99999;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="app">

  <div class="alert-scene">
    <transition name="alert">
      <div v-if="alertVis" class="alert-card">
        <div class="a-label" :style="{color: alertCfg.labelColor || '#ff0044'}">{{alertCfg.labelText || 'НОВЫЙ ДОНАТ!'}}</div>
        <div class="a-name">{{curDonation.name}}</div>
        <div class="a-amount">{{curDonation.amount}}</div>
      </div>
    </transition>
  </div>

  <div v-if="mode==='admin'" class="admin-shell">
    
    <div class="preview-zone" ref="previewZone">
      <div class="pz-label">ОКНО В OBS</div>
      
      <div class="widget-scene">
        <div v-for="p in panels" :key="p.id" class="draggable" :style="{
          width: p.width + 'px',
          left: '50px',
          top: '50px'
        }">
          
          <div v-if="p.type==='goal'" class="glass" :style="{
            padding: (p.padding||20)+'px',
            borderRadius: (p.radius||15)+'px',
            backgroundColor: p.bgColor || 'rgba(0,0,0,0.7)'
          }">
            <div class="goal-wrap" :style="{color: p.cText || '#fff'}">
              <div class="goal-top">
                <div :style="{fontSize: (p.titleSize||16)+'px', fontWeight: 900}">СОБРАНО:</div>
                <div :style="{fontSize: (p.titleSize||16)+'px', fontWeight: 900}">{{p.current}} / {{p.max}} ₸</div>
              </div>
              <div class="prog-track">
                <div class="prog-fill" :style="{
                  width: Math.min((p.current / (p.max||1)) * 100, 100) + '%',
                  background: p.cBar1 || '#ff0044'
                }"></div>
              </div>
              
              <div class="ld-section" v-if="p.donorsRaw && p.donorsRaw.trim().length > 0">
                <div class="ld-label" :style="{background: 'rgba(255,0,68,0.2)', color: '#ff0044'}">
                  {{p.lastDonorLabel || 'ПОСЛЕДНИЕ ДОНАТЫ'}}
                </div>
                <ul class="donor-list">
                  <li v-for="(donor, idx) in parsedDonors(p.donorsRaw)" :key="idx" class="donor-item" :class="'rk-'+idx" :style="{fontSize: (p.textSize||14)+'px'}">
                    <span>{{donor.name}}</span>
                    <span>{{donor.amount}}</span>
                  </li>
                </ul>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-head">
        <div class="logo">
          <div class="logo-mark">W</div>
          <div class="logo-name">WIDGET <span>PRO</span></div>
        </div>
        <div class="ver-tag">v11 SOUL</div>
      </div>

      <div class="tabs">
        <button class="tab" :class="{on:tab==='widgets'}" @click="tab='widgets'">🎯 Виджеты & Донат</button>
        <button class="tab" :class="{on:tab==='alert'}" @click="tab='alert'">🎉 Настройки Алерта</button>
      </div>

      <div class="sidebar-body">

        <template v-if="tab==='widgets'">
          
          <div class="quick-donat">
            <div class="sec-name">⚡ БЫСТРЫЙ ДОНАТ (В 1 КЛИК)</div>
            <div class="fr" style="margin-bottom:10px">
              <div class="fg">
                <label>Никнейм</label>
                <input type="text" v-model="quickName" placeholder="Например: Иван">
              </div>
              <div class="fg">
                <label>Сумма (₸)</label>
                <input type="number" v-model.number="quickAmount" placeholder="Только цифры">
              </div>
            </div>
            <button class="btn btn-red" @click="processQuickDonation" style="padding: 12px; font-size: 10px;">
              🔥 ДОБАВИТЬ ВЕЗДЕ (АЛЕРТ + ЦЕЛЬ + СПИСОК)
            </button>
          </div>

          <div class="fr" style="margin-bottom: 5px;">
            <button class="btn btn-add-panel" @click="addPanel('goal')">✚ СОЗДАТЬ ЦЕЛЬ</button>
          </div>

          <div v-for="(p,i) in panels" :key="p.id">
            <div class="sec-head" :class="{on:selId===p.id}" @click="selId=selId===p.id?null:p.id">
              <div class="sec-head-l">
                <div class="sec-dot">{{i+1}}</div>
                <div class="sec-name">🎯 ЦЕЛЬ И СПИСОК</div>
              </div>
            </div>

            <div v-if="selId===p.id" class="sec-body">
              <div class="fr">
                <div class="fg"><label>Текущая сумма</label><input type="number" v-model.number="p.current"></div>
                <div class="fg"><label>Цель (Максимум)</label><input type="number" v-model.number="p.max"></div>
              </div>
              <div class="fg">
                <label>Список донатеров (авто-обновляется!)</label>
                <textarea v-model="p.donorsRaw" placeholder="Иван — 500 ₸&#10;Максим — 300 ₸"></textarea>
              </div>
              <div class="divider"></div>
              <div class="sub-lbl">Дизайн</div>
              <div class="fg"><label>Ширина панели</label>
                <div class="rr"><input type="range" min="200" max="800" v-model.number="p.width"><span class="rv">{{p.width}}</span></div>
              </div>
              <div class="color-grid">
                <div class="ci"><span>Фон</span><input type="color" v-model="p.bgColor"></div>
                <div class="ci"><span>Прогресс</span><input type="color" v-model="p.cBar1"></div>
                <div class="ci"><span>Текст</span><input type="color" v-model="p.cText"></div>
              </div>
            </div>
          </div>
        </template>

        <template v-if="tab==='alert'">
          <div class="sec-head on">
            <div class="sec-head-l">
              <div class="sec-name">🎨 Настройки Алерта</div>
            </div>
          </div>
          <div class="sec-body">
            <div class="fg"><label>Текст надписи</label>
              <input type="text" v-model="alertCfg.labelText" placeholder="НОВЫЙ ДОНАТ!">
            </div>
            <div class="fg"><label>Длительность (сек)</label>
              <div class="rr"><input type="range" min="2" max="15" v-model.number="alertCfg.duration"><span class="rv">{{alertCfg.duration}}s</span></div>
            </div>
            <div class="color-grid">
              <div class="ci"><span>Текст</span><input type="color" v-model="alertCfg.labelColor"></div>
            </div>
          </div>
        </template>

      </div>
    </div>
  </div>

  <div class="toast" :class="{show: toastVis}">{{toastMsg}}</div>

</div>

<script>
const { createApp, ref, onMounted } = Vue;

createApp({
  setup() {
    // Basic States
    const mode = ref('admin'); // 'admin' или 'widget'
    const tab = ref('widgets');
    const selId = ref(null);
    const toastVis = ref(false);
    const toastMsg = ref('');

    // Quick Donation Model
    const quickName = ref('');
    const quickAmount = ref('');

    // Widgets Data
    const panels = ref([
      {
        id: 'goal_1',
        type: 'goal',
        current: 0,
        max: 100000,
        width: 350,
        padding: 20,
        radius: 15,
        cBar1: '#ff0044',
        cText: '#ffffff',
        lastDonorLabel: 'ТОП ДОНАТЕРЫ',
        donorsRaw: ''
      }
    ]);

    // Alert Data
    const alertVis = ref(false);
    const alertCfg = ref({
      labelText: 'НОВЫЙ ДОНАТ!',
      labelColor: '#ff0044',
      duration: 5
    });
    const curDonation = ref({ name: '', amount: '' });
    let alertTimer = null;

    // --- МАГИЯ БЫСТРОГО ДОНАТА ---
    const processQuickDonation = () => {
      if (!quickName.value || !quickAmount.value) {
        showToast('❌ Введите ник и сумму!');
        return;
      }

      const amountVal = Number(quickAmount.value);
      const formattedAmount = `${amountVal} ₸`; // ВСЕГДА ТЕНГЕ

      // 1. Находим цель и обновляем
      const goal = panels.value.find(p => p.type === 'goal');
      if (goal) {
        // Прибавляем сумму
        goal.current = (Number(goal.current) || 0) + amountVal;
        
        // Вставляем нового донатера в начало списка
        let currentList = goal.donorsRaw ? goal.donorsRaw.split('\n').filter(x => x.trim() !== '') : [];
        const newEntry = `${quickName.value} — ${formattedAmount}`;
        currentList.unshift(newEntry);
        
        // Оставляем топ 5, чтобы не засорять виджет
        goal.donorsRaw = currentList.slice(0, 5).join('\n');
      }

      // 2. Запускаем Алерт
      curDonation.value.name = quickName.value;
      curDonation.value.amount = formattedAmount;
      
      triggerAlert();

      // 3. Очищаем инпуты для следующего
      quickName.value = '';
      quickAmount.value = '';
      
      showToast('🔥 Донат добавлен везде!');
    };

    const triggerAlert = () => {
      alertVis.value = false;
      clearTimeout(alertTimer);
      
      setTimeout(() => {
        alertVis.value = true;
        alertTimer = setTimeout(() => {
          alertVis.value = false;
        }, alertCfg.value.duration * 1000);
      }, 100);
    };

    const parsedDonors = (raw) => {
      if(!raw) return [];
      return raw.split('\n').filter(x => x.trim() !== '').map(line => {
        const parts = line.split('—');
        return {
          name: parts[0] ? parts[0].trim() : '',
          amount: parts[1] ? parts[1].trim() : ''
        };
      });
    };

    const addPanel = (type) => {
      panels.value.push({
        id: 'panel_' + Date.now(),
        type: type,
        current: 0, max: 10000, width: 350,
        donorsRaw: ''
      });
    };

    const showToast = (msg) => {
      toastMsg.value = msg;
      toastVis.value = true;
      setTimeout(() => toastVis.value = false, 3000);
    };

    return {
      mode, tab, selId, panels, addPanel,
      quickName, quickAmount, processQuickDonation,
      alertVis, alertCfg, curDonation,
      parsedDonors, toastVis, toastMsg
    }
  }
}).mount('#app');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FINAL ULTIMATE WIDGET</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root { --accent-red: #ff0044; }
        body { margin: 0; padding: 0; font-family: 'Unbounded', sans-serif; background: transparent; color: #fff; }
        
        /* Фон только для админки */
        .dashboard { display: grid; grid-template-columns: 420px 1fr; min-height: 100vh; background: #050505; }
        
        .widget-container { display: flex; flex-direction: column; padding: 30px; box-sizing: border-box; }
        .header-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; font-weight: 700; }
        .progress-bar-bg { width: 100%; background: rgba(0, 0, 0, 0.8); border-radius: 50px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 25px; }
        .progress-fill { height: 100%; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .top-donors-title { display: inline-block; padding: 8px 16px; font-size: 18px; font-weight: 700; border-radius: 4px; }
        .donor-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; }
        .donor-item { display: flex; align-items: center; padding: 10px 15px; border-radius: 8px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }

        /* АДМИНКА */
        .control-panel { background: #111; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; max-height: 100vh; color: #fff; }
        .preview-area { display: flex; align-items: center; justify-content: center; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }
        
        .section-label { font-size: 10px; color: #ffd700; letter-spacing: 1px; margin-top: 10px; text-transform: uppercase; border-bottom: 1px solid #222; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 4px; font-family: 'Unbounded'; font-size: 12px; }
        .copy-btn { background: var(--accent-red); color: #fff; border: none; padding: 15px; border-radius: 8px; font-family: 'Unbounded'; font-weight: 900; cursor: pointer; margin-top: 10px; }
        
        /* Сброс фона для OBS */
        .is-obs-mode { background: transparent !important; }
    </style>
</head>
<body :class="{'is-obs-mode': isObs}">

<div id="app">
    <div :class="{'dashboard': !isObs}">
        
        <div v-if="!isObs" class="control-panel">
            <h3 style="margin:0">FIXED BUILD v4</h3>
            
            <div class="section-label">Контент</div>
            <input type="text" v-model="goalTitle" placeholder="Цель">
            <div style="display:flex; gap:5px">
                <input type="number" v-model="currentAmount" style="width:50%">
                <input type="text" v-model="maxAmount" style="width:50%">
            </div>

            <div class="section-label">Размеры и Отступы</div>
            <label style="font-size:9px">Масштаб: {{scale}}</label><input type="range" min="0.5" max="2" step="0.1" v-model="scale">
            <label style="font-size:9px">Ширина: {{width}}px</label><input type="range" min="300" max="800" v-model="width">
            <label style="font-size:9px">Отступ списка: {{spacing}}px</label><input type="range" min="0" max="50" v-model="spacing">
            
            <div class="section-label">Шрифты</div>
            <label style="font-size:9px">Заголовок: {{fTitle}}px</label><input type="range" min="12" max="40" v-model="fTitle">
            <label style="font-size:9px">Сумма: {{fSum}}px</label><input type="range" min="12" max="40" v-model="fSum">

            <div class="section-label">Цвета</div>
            <div style="display:flex; gap:5px">
                <input type="color" v-model="c1" style="flex:1">
                <input type="color" v-model="c2" style="flex:1">
            </div>
            <label style="font-size:9px">Прозрачность стекла: {{glass}}</label><input type="range" min="0" max="1" step="0.1" v-model="glass">

            <div class="section-label">Топ донатов</div>
            <input type="text" v-model="topTitle">
            <input type="text" v-for="(d, i) in 3" :key="i" v-model="topDonors[i]" :placeholder="'Место '+(i+1)">

            <button class="copy-btn" @click="copyLink">СКОПИРОВАТЬ ССЫЛКУ</button>
        </div>

        <div :class="{'preview-area': !isObs}">
            <div :style="{transform: `scale(${scale})`, transformOrigin: isObs ? 'top left' : 'center'}">
                <div class="widget-container" :style="containerStyle">
                    <div class="header-row">
                        <span :style="{fontSize: fTitle+'px'}">{{ goalTitle }}</span>
                        <span :style="{fontSize: fSum+'px', color: '#ffd700'}">{{ formattedCurrent }} / {{ maxAmount }}</span>
                    </div>
                    <div class="progress-bar-bg" :style="{height: (fSum*0.8)+'px'}">
                        <div class="progress-fill" :style="progressStyle"></div>
                    </div>
                    <div v-if="topTitle" class="top-donors-title" :style="topTitleStyle">{{ topTitle }}</div>
                    <ul class="donor-list" :style="{marginTop: spacing + 'px', gap: (spacing/2) + 'px'}">
                        <li class="donor-item" v-for="(d, i) in topDonors" :key="i" v-show="d && d !== 'Пусто'" :style="{fontSize: (fTitle*0.8)+'px'}">
                            {{ i + 1 }}) {{ d }}
                        </li>
                    </ul>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
const { createApp, ref, computed, onMounted, watch } = Vue;
createApp({
    setup() {
        const goalTitle = ref('На интернет:');
        const currentAmount = ref(4028);
        const maxAmount = ref('7.990тг');
        const scale = ref(1.0);
        const width = ref(500);
        const spacing = ref(20);
        const fTitle = ref(20);
        const fSum = ref(20);
        const glass = ref(0.6);
        const c1 = ref('#8a0022');
        const c2 = ref('#ff0044');
        const topTitle = ref('ТОП 3 ДНЯ');
        const topDonors = ref(['Айдын - 750', '', '']);
        const isObs = ref(false);

        onMounted(() => {
            const p = new URLSearchParams(window.location.search);
            if (p.get('obs') === '1') {
                isObs.value = true;
                if (p.has('gt')) goalTitle.value = decodeURIComponent(p.get('gt'));
                if (p.has('ca')) currentAmount.value = p.get('ca');
                if (p.has('ma')) maxAmount.value = decodeURIComponent(p.get('ma'));
                if (p.has('sc')) scale.value = p.get('sc');
                if (p.has('wd')) width.value = p.get('wd');
                if (p.has('sp')) spacing.value = p.get('sp');
                if (p.has('ft')) fTitle.value = p.get('ft');
                if (p.has('fs')) fSum.value = p.get('fs');
                if (p.has('gl')) glass.value = p.get('gl');
                if (p.has('c1')) c1.value = decodeURIComponent(p.get('c1'));
                if (p.has('c2')) c2.value = decodeURIComponent(p.get('c2'));
                if (p.has('tt')) topTitle.value = decodeURIComponent(p.get('tt'));
                if (p.has('d1')) topDonors.value[0] = decodeURIComponent(p.get('d1'));
                if (p.has('d2')) topDonors.value[1] = decodeURIComponent(p.get('d2'));
                if (p.has('d3')) topDonors.value[2] = decodeURIComponent(p.get('d3'));
            }
        });

        const formattedCurrent = computed(() => currentAmount.value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " "));
        const progressPercent = computed(() => {
            let m = parseFloat(maxAmount.value.toString().replace(/[\s.]/g, '').replace(/[^\d]/g, ''));
            return m > 0 ? Math.min((currentAmount.value / m) * 100, 100) : 0;
        });

        const containerStyle = computed(() => ({ width: width.value + 'px', background: `rgba(15,15,15,${glass.value})`, borderRadius: '24px', backdropFilter: 'blur(10px)', border: `1px solid rgba(255,255,255,0.1)` }));
        const progressStyle = computed(() => ({ width: progressPercent.value + '%', background: `linear-gradient(90deg, ${c1.value}, ${c2.value})`, boxShadow: `0 0 15px ${c2.value}80` }));
        const topTitleStyle = computed(() => ({ borderLeft: `4px solid ${c1.value}`, background: `linear-gradient(90deg, ${c1.value}33, transparent)` }));

        const copyLink = () => {
            const u = new URL(window.location.href.split('?')[0]);
            u.searchParams.set('obs', '1');
            u.searchParams.set('gt', encodeURIComponent(goalTitle.value));
            u.searchParams.set('ca', currentAmount.value);
            u.searchParams.set('ma', encodeURIComponent(maxAmount.value));
            u.searchParams.set('sc', scale.value);
            u.searchParams.set('wd', width.value);
            u.searchParams.set('sp', spacing.value);
            u.searchParams.set('ft', fTitle.value);
            u.searchParams.set('fs', fSum.value);
            u.searchParams.set('gl', glass.value);
            u.searchParams.set('c1', encodeURIComponent(c1.value));
            u.searchParams.set('c2', encodeURIComponent(c2.value));
            u.searchParams.set('tt', encodeURIComponent(topTitle.value));
            u.searchParams.set('d1', encodeURIComponent(topDonors.value[0]));
            u.searchParams.set('d2', encodeURIComponent(topDonors.value[1]));
            u.searchParams.set('d3', encodeURIComponent(topDonors.value[2]));
            navigator.clipboard.writeText(u.toString());
            alert('Ссылка скопирована!');
        };

        return { goalTitle, currentAmount, maxAmount, scale, width, spacing, fTitle, fSum, glass, c1, c2, topTitle, topDonors, isObs, formattedCurrent, containerStyle, progressStyle, topTitleStyle, copyLink };
    }
}).mount('#app');
</script>
</body>
</html>
